<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>

<body>

<h2>China Eastern Login</h2>

<input
  id="email"
  type="email"
  placeholder="Email"
>

<br><br>

<input
  id="password"
  type="password"
  placeholder="Password"
>

<br><br>

<button onclick="login()">
Login
</button>

<p id="msg"></p>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

  apiKey: "AIzaSyAWsXBuQJTBmNKi6gLgnkZUZ4OfK1IRuXo",

  authDomain: "china-eastern.firebaseapp.com",

  projectId: "china-eastern",

  storageBucket: "china-eastern.firebasestorage.app",

  messagingSenderId: "30017158772",

  appId: "1:30017158772:web:874a69fdb75b8d3d315b21",

  measurementId: "G-22T9MHC42Y"
};

const app =
  initializeApp(firebaseConfig);

const auth =
  getAuth(app);

window.login = async function () {

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    window.location.href =
      "index.html";

  } catch (error) {

    document.getElementById("msg").innerText =
      error.message;
  }
};

</script>

</body>
</html>
