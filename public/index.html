<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    MU Lounge Validation
  </title>

  <style>

    body {

      margin: 0;
      padding: 0;

      background: #0f172a;

      font-family:
        Arial,
        sans-serif;

      color: white;

      display: flex;

      justify-content: center;

      align-items: flex-start;

      min-height: 100vh;
    }

    .container {

      width: 100%;
      max-width: 420px;

      padding: 20px;
    }

    .title {

      font-size: 26px;

      font-weight: bold;

      margin-bottom: 8px;
    }

    .subtitle {

      color: #94a3b8;

      margin-bottom: 24px;

      font-size: 14px;

      line-height: 1.5;
    }

    .login-card,
    .card {

      background: #111827;

      border-radius: 16px;

      padding: 18px;

      box-shadow:
        0 0 20px rgba(0,0,0,0.3);
    }

    .login-card {

      margin-top: 50px;
    }

    .search-box {

      display: flex;

      gap: 10px;

      margin-bottom: 20px;
    }

    input {

      width: 100%;

      padding: 12px;

      border: none;

      border-radius: 10px;

      font-size: 16px;

      background: #1e293b;

      color: white;

      margin-bottom: 12px;

      box-sizing: border-box;
    }

    button {

      padding: 12px 18px;

      border: none;

      border-radius: 10px;

      background: #2563eb;

      color: white;

      font-size: 15px;

      cursor: pointer;
    }

    button:hover {

      background: #1d4ed8;
    }

    .card {

      display: none;
    }

    .flight {

      font-size: 20px;

      font-weight: bold;

      margin-bottom: 18px;
    }

    .name {

      font-size: 22px;

      font-weight: bold;

      margin-bottom: 6px;
    }

    .seat {

      color: #cbd5e1;

      margin-bottom: 20px;

      font-size: 15px;
    }

    .section {

      margin-bottom: 18px;
    }

    .label {

      color: #60a5fa;

      font-size: 13px;

      margin-bottom: 5px;

      text-transform: uppercase;
    }

    .value {

      font-size: 16px;

      white-space: pre-line;

      line-height: 1.5;
    }

    .lounge-yes {

      color: #22c55e;

      font-weight: bold;
    }

    .lounge-no {

      color: #ef4444;

      font-weight: bold;
    }

    .error {

      background: #7f1d1d;

      padding: 12px;

      border-radius: 10px;

      display: none;

      margin-top: 20px;

      font-size: 14px;
    }

    #mainApp {

      display: none;
    }

  </style>

</head>

<body>

  <div class="container">

    <!-- LOGIN -->
    <div
      id="loginPage"
      class="login-card"
    >

      <div class="title">
        MU Lounge Validation
      </div>

      <div class="subtitle">
        Internal Access Only
      </div>

      <input
        id="username"
        placeholder="Username"
      >

      <input
        id="password"
        type="password"
        placeholder="Password"
      >

      <button
        onclick="login()"
        style="width:100%;"
      >
        Login
      </button>

      <div
        id="loginError"
        class="error"
      ></div>

    </div>

    <!-- MAIN APP -->
    <div id="mainApp">

      <div class="title">
        MU Lounge Validation
      </div>

      <div class="subtitle">
        Search by BN / Seat / Membership / Name On Boarding Pass
      </div>

      <div class="search-box">

        <input
          id="query"
          placeholder="321 / 20A / MU600285492786 / YAN/JUN"
          style="margin-bottom:0;"
        >

        <button onclick="searchPassenger()">
          Search
        </button>

      </div>

      <div
        id="error"
        class="error"
      ></div>

      <div
        id="card"
        class="card"
      >

        <div
          id="flight"
          class="flight"
        ></div>

        <div
          id="name"
          class="name"
        ></div>

        <div
          id="seat"
          class="seat"
        ></div>

        <!-- Membership -->
        <div class="section">

          <div class="label">
            Membership
          </div>

          <div
            id="ff"
            class="value"
          ></div>

          <div
            id="ffStatus"
            class="value"
            style="margin-top:8px;"
          ></div>

        </div>

        <!-- Ticket -->
        <div
          class="section"
          id="ticketSection"
        >

          <div class="label">
            Ticket
          </div>

          <div
            id="ticket"
            class="value"
          ></div>

        </div>

        <!-- Bags -->
        <div
          class="section"
          id="bagsSection"
        >

          <div class="label">
            Bags
          </div>

          <div
            id="bags"
            class="value"
          ></div>

        </div>

        <!-- Lounge -->
        <div class="section">

          <div class="label">
            Lounge Entitle
          </div>

          <div
            id="lounge"
            class="value"
          ></div>

          <div
            class="label"
            style="margin-top:12px;"
          >
            Lounge Guest
          </div>

          <div
            id="guest"
            class="value"
            style="margin-top:8px;"
          ></div>

        </div>

      </div>

    </div>

  </div>

  <script>

    // ===========================
    // Auto Login Session
    // ===========================
    if (
      localStorage.getItem('mu_logged_in') === 'true'
    ) {

      document.getElementById(
        'loginPage'
      ).style.display = 'none';

      document.getElementById(
        'mainApp'
      ).style.display = 'block';
    }

    // ===========================
    // Login
    // ===========================
    function login() {

      const username =
        document
          .getElementById('username')
          .value
          .trim();

      const password =
        document
          .getElementById('password')
          .value
          .trim();

      if (

        username === 'mu586' &&
        password === 'mulax'

      ) {

        localStorage.setItem(
          'mu_logged_in',
          'true'
        );

        document.getElementById(
          'loginPage'
        ).style.display = 'none';

        document.getElementById(
          'mainApp'
        ).style.display = 'block';
      }

      else {

        const err =
          document.getElementById(
            'loginError'
          );

        err.innerText =
          'Invalid username or password';

        err.style.display =
          'block';
      }
    }

    // ===========================
    // Search Passenger
    // ===========================
    async function searchPassenger() {

      const q =
        document
          .getElementById('query')
          .value
          .trim();

      if (!q) {
        return;
      }

      const card =
        document.getElementById('card');

      const error =
        document.getElementById('error');

      card.style.display = 'none';

      error.style.display = 'none';

      try {

        const res =
          await fetch(
            '/search?q=' +
            encodeURIComponent(q)
          );

        const data =
          await res.json();

        if (data.error) {

          error.innerText =
            data.error;

          error.style.display =
            'block';

          return;
        }

        // Flight
        document.getElementById(
          'flight'
        ).innerText =
          data.flight +
          (
            data.flightDate
              ? '/' + data.flightDate
              : ''
          );

        // Name
        document.getElementById(
          'name'
        ).innerText =
          data.name;

        // Seat + Cabin
        document.getElementById(
          'seat'
        ).innerText =
          'BN' +
          data.bn +
          ' | ' +
          data.seat +
          ' | ' +
          data.cabin +
          ' Class';

        // Membership
        document.getElementById(
          'ff'
        ).innerText =
          (
            data.ffCarrier || 'NONE'
          ) +
          ' ' +
          (
            data.ffNumber || ''
          );

        // Membership Status
        document.getElementById(
          'ffStatus'
        ).innerText =

          data.membershipStatus ||

          (
            data.ffTier
              ? (
                  data.ffTier === 'V'
                    ? 'Platinum'
                    : data.ffTier === 'G'
                    ? 'Gold'
                    : data.ffTier === 'S'
                    ? 'Silver'
                    : 'Regular'
                )
              : 'NONE'
          );

        // PD Passenger
        if (data.pdOnly) {

          document.getElementById(
            'ticketSection'
          ).style.display = 'none';

          document.getElementById(
            'bagsSection'
          ).style.display = 'none';
        }

        // Normal Passenger
        else {

          document.getElementById(
            'ticketSection'
          ).style.display = 'block';

          document.getElementById(
            'bagsSection'
          ).style.display = 'block';

          document.getElementById(
            'ticket'
          ).innerText =
            data.ticketNumber || 'NONE';

          document.getElementById(
            'bags'
          ).innerText =
            data.bagtags?.length
              ? data.bagtags.join('\n')
              : 'NONE';
        }

        // Lounge Entitle
        const lounge =
          document.getElementById(
            'lounge'
          );

        if (
          data.lounge?.eligible
        ) {

          lounge.innerHTML =
            '<span class="lounge-yes">✅ Eligible</span>';
        }

        else {

          lounge.innerHTML =
            '<span class="lounge-no">❌ Not Eligible</span>';
        }

        // Lounge Guest
        const guest =
          document.getElementById(
            'guest'
          );

        if (
          data.lounge?.guest
        ) {

          guest.innerHTML =
            '<span class="lounge-yes">✅ Allowed</span>';
        }

        else {

          guest.innerHTML =
            '<span class="lounge-no">❌ Not Allowed</span>';
        }

        // Show Card
        card.style.display =
          'block';

      } catch (err) {

        error.innerText =
          'Search failed';

        error.style.display =
          'block';
      }
    }

    // Enter Key
    document
      .getElementById('query')
      .addEventListener(
        'keypress',
        function(e) {

          if (e.key === 'Enter') {

            searchPassenger();
          }
        }
      );

  </script>

</body>
</html>
