<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUL System</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; padding:0; background:#0f172a; color:white; font-family:Arial,sans-serif; display:flex; justify-content:center; }
  .container { width:100%; max-width:460px; padding:20px; }
  .title { font-size:30px; font-weight:bold; margin-bottom:6px; }
  .subtitle { color:#94a3b8; font-size:14px; margin-bottom:24px; line-height:1.5; }
  .card,.login-card { background:#111827; border-radius:20px; padding:20px; box-shadow:0 0 25px rgba(0,0,0,0.35); }
  .login-card { margin-top:60px; }
  input { width:100%; padding:14px; margin-bottom:14px; border:none; border-radius:14px; background:#1e293b; color:white; font-size:15px; }
  button { border:none; background:#2563eb; color:white; border-radius:14px; padding:14px; font-size:15px; cursor:pointer; }
  button:hover { background:#1d4ed8; }
  .search-box { display:flex; gap:10px; margin-bottom:20px; }
  .search-box input { margin-bottom:0; }
  .search-box button { min-width:100px; }
  #mainApp { display:none; }
  #card { display:none; }
  .flight { font-size:24px; font-weight:bold; margin-bottom:18px; }
  .name { font-size:28px; font-weight:bold; margin-bottom:10px; }
  .seat { color:#cbd5e1; margin-bottom:22px; font-size:15px; }
  .divider { height:1px; background:rgba(255,255,255,0.08); margin:18px 0; }
  .section { margin-bottom:18px; }
  .label { color:#60a5fa; text-transform:uppercase; font-size:12px; letter-spacing:1px; margin-bottom:6px; }
  .value { white-space:pre-line; line-height:1.6; font-size:16px; }
  .yes { color:#22c55e; font-weight:bold; }
  .no { color:#ef4444; font-weight:bold; }
  .error { display:none; background:#7f1d1d; border-radius:12px; padding:12px; margin-top:15px; font-size:14px; }
</style>
</head>
<body>
<div class="container">
  <!-- LOGIN -->
  <div id="loginPage" class="login-card">
    <div class="title">MUL</div>
    <div class="subtitle">Internal Access Only</div>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()" style="width:100%;">Login</button>
    <div id="loginError" class="error"></div>
  </div>

  <!-- MAIN -->
  <div id="mainApp">
    <div class="title">MUL</div>
    <div class="subtitle">
      Supported Search Modes:<br><br>
      Boarding Number / Full Name / Seat / Ticket / Membership<br>
      For historical search, append /DDMMM (e.g., 127/27APR)
    </div>

    <div class="search-box">
      <input id="query" placeholder="Enter Search">
      <button onclick="searchPassenger()">Search</button>
    </div>

    <div id="error" class="error"></div>

    <!-- CARD -->
    <div id="card" class="card">
      <div id="flight" class="flight"></div>
      <div id="name" class="name"></div>
      <div id="seat" class="seat"></div>

      <div id="membershipSection" class="section" style="display:none;">
        <div class="divider"></div>
        <div class="label">Membership</div>
        <div id="ff" class="value"></div>
        <div id="ffStatus" class="value"></div>
      </div>

      <div id="ticketSection" class="section" style="display:none;">
        <div class="divider"></div>
        <div class="label">Ticket</div>
        <div id="ticket" class="value"></div>
      </div>

      <div id="bagsSection" class="section" style="display:none;">
        <div class="divider"></div>
        <div class="label">Bags</div>
        <div id="bags" class="value"></div>
      </div>

      <div id="inboundSection" class="section" style="display:none;">
        <div class="divider"></div>
        <div class="label">Inbound</div>
        <div id="inbound" class="value"></div>
      </div>

      <div id="outboundSection" class="section" style="display:none;">
        <div class="divider"></div>
        <div class="label">Outbound</div>
        <div id="outbound" class="value"></div>
      </div>

      <div id="ssrSection" class="section" style="display:none;">
        <div class="divider"></div>
        <div class="label">Special Service</div>
        <div id="ssr" class="value"></div>
      </div>

      <div class="section">
        <div class="divider"></div>
        <div class="label">Lounge Access</div>
        <div id="lounge" class="value"></div>
        <div class="label" style="margin-top:18px;">Guest Access</div>
        <div id="guest" class="value"></div>
      </div>
    </div>

  </div>
</div>

<script>
const LOGIN_TIMEOUT = 30*60*1000;
const lastLogin = localStorage.getItem('mu_login_time');
const now = Date.now();
if(localStorage.getItem('mu_logged_in')==='true' && lastLogin && (now-Number(lastLogin))<LOGIN_TIMEOUT){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainApp').style.display='block';
}else{
  localStorage.clear();
}

function login(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  if(username==='mu586' && password==='mulax'){
    localStorage.setItem('mu_logged_in','true');
    localStorage.setItem('mu_login_time',Date.now());
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainApp').style.display='block';
  }else{
    const err = document.getElementById('loginError');
    err.innerText='Invalid username or password';
    err.style.display='block';
  }
}

// =========================
// Search
// =========================
async function searchPassenger(){
  localStorage.setItem('mu_login_time',Date.now());
  let q = document.getElementById('query').value.trim();
  if(!q) return;

  let date = null;
  const dateMatch = q.match(/\/(\d{1,2}[A-Z]{3})$/i);
  if(dateMatch){
    date = dateMatch[1].toUpperCase();
    q = q.replace(/\/\d{1,2}[A-Z]{3}$/i,'').trim();
  }

  try{
    const res = await fetch(`/search?q=${encodeURIComponent(q)}${date ? '&date='+encodeURIComponent(date) : ''}`);
    const data = await res.json();
    const card = document.getElementById('card');
    const error = document.getElementById('error');
    card.style.display='none';
    error.style.display='none';
    if(data.error){
      error.innerText=data.error;
      error.style.display='block';
      return;
    }

    // Flight
    document.getElementById('flight').innerText=`✈️ ${data.flight}/${data.flightDate}`;
    document.getElementById('name').innerText=data.name;
    document.getElementById('seat').innerText=`🎫 BN${data.bn} • ${data.seat} • ${data.cabin}`;

    // Membership
    if(data.ffNumber){
      document.getElementById('membershipSection').style.display='block';
      document.getElementById('ff').innerText=`${data.ffCarrier} ${data.ffNumber}`;
      document.getElementById('ffStatus').innerText=data.membershipStatus||'';
    }else{
      document.getElementById('membershipSection').style.display='none';
    }

    // Ticket
    if(data.ticketNumber){
      document.getElementById('ticketSection').style.display='block';
      document.getElementById('ticket').innerText=data.ticketNumber;
    }else{
      document.getElementById('ticketSection').style.display='none';
    }

    // Bags
    if(data.bagtags && data.bagtags.length){
      document.getElementById('bagsSection').style.display='block';
      document.getElementById('bags').innerText=data.bagtags.join('\n');
    }else{
      document.getElementById('bagsSection').style.display='none';
    }

    // Inbound / Outbound / SSR / Lounge same as before
    document.getElementById('card').style.display='block';
  }catch(err){
    const error = document.getElementById('error');
    error.innerText='Search failed';
    error.style.display='block';
  }
}
document.getElementById('query').addEventListener('keypress',function(e){if(e.key==='Enter'){searchPassenger();}});
</script>

</body>
</html>
