<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUL SYSTEM</title>
<style>
  body { font-family: Arial, sans-serif; background: #111; color: #eee; margin: 0; padding: 20px; }
  .container { max-width: 700px; margin: auto; }
  h1 { text-align: center; color: #1E90FF; }
  .search-box { display: flex; margin-bottom: 15px; gap: 10px; }
  input[type="text"] { flex: 1; padding: 8px; font-size: 16px; border-radius: 5px; border: none; }
  button { padding: 8px 12px; font-size: 16px; border-radius: 5px; border: none; background-color: #1E90FF; color: #fff; cursor: pointer; }
  button:hover { background-color: #0b60a0; }
  #history-picker { display: none; margin-bottom: 15px; }
  #results { margin-top: 20px; }
  .card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 0 8px rgba(0,0,0,0.5); }
  .card h2 { margin: 0 0 5px 0; font-size: 18px; color: #1E90FF; }
  .card p { margin: 4px 0; }
  .inline { display: inline-block; margin-right: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>MUL SYSTEM</h1>

  <div class="search-box">
    <input type="text" id="query" placeholder="Search by BN / Seat / Membership / Name On Boarding Pass">
    <button id="searchBtn">Search</button>
    <button id="toggleHistory">History Search</button>
  </div>

  <input type="date" id="history-picker">

  <div id="results"></div>
</div>

<script>
const searchBtn = document.getElementById('searchBtn');
const queryInput = document.getElementById('query');
const resultsDiv = document.getElementById('results');
const toggleHistoryBtn = document.getElementById('toggleHistory');
const historyPicker = document.getElementById('history-picker');

let isHistoryMode = false;

toggleHistoryBtn.addEventListener('click', () => {
  isHistoryMode = !isHistoryMode;
  historyPicker.style.display = isHistoryMode ? 'inline-block' : 'none';
});

// Helper function to fetch passenger info
async function fetchPassenger(query, date = null) {
  let url = `/search?q=${encodeURIComponent(query)}`;
  if (date) {
    url += `&date=${date}`;
  }
  const res = await fetch(url);
  const data = await res.json();
  return data;
}

// Format card
function renderPassenger(pax) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h2>✈️ ${pax.flightNumber || pax.flight} ${pax.flightDate || ''}</h2>
    <p>👤 ${pax.name}</p>
    <p class="inline">🎫 ${pax.bn} • ${pax.seat} • ${pax.class}</p>
    ${pax.membershipNumber ? `<p class="inline">🎟 Membership: ${pax.membershipNumber}${pax.membershipStatus ? ' • ' + pax.membershipStatus : ''}</p>` : ''}
    ${pax.ticketNumber ? `<p class="inline">🎫 Ticket: ${pax.ticketNumber}</p>` : ''}
    ${pax.bags && pax.bags.length ? `<p>🧳 Bags:<br>${pax.bags.join('<br>')}</p>` : ''}
    ${pax.inbound ? `<p>🛬 Inbound: ${pax.inbound.flight}/${pax.inbound.date} from ${pax.inbound.origin}</p>` : ''}
    ${pax.outbound ? `<p>🛫 Outbound: ${pax.outbound.flight}/${pax.outbound.date} to ${pax.outbound.destination} ${pax.outbound.seat ? '| ' + pax.outbound.seat : ''}</p>` : ''}
    ${pax.loungeAccess != null ? `<p>🛋 Lounge Access: ${pax.loungeAccess ? '✅ Eligible' : '❌ Not Allowed'}</p>` : ''}
    ${pax.guestAccess != null ? `<p>👥 Guest Access: ${pax.guestAccess ? '✅ Allowed' : '❌ Not Allowed'}</p>` : ''}
    ${pax.specialServices && pax.specialServices.length ? `<p>⭐ Special Services: ${pax.specialServices.join(', ')}</p>` : ''}
  `;
  resultsDiv.appendChild(card);
}

searchBtn.addEventListener('click', async () => {
  resultsDiv.innerHTML = '';
  const query = queryInput.value.trim();
  if (!query) return alert('Please enter a query.');
  const date = isHistoryMode ? historyPicker.value : null;
  const data = await fetchPassenger(query, date);
  if (data.error) {
    resultsDiv.innerHTML = `<p>${data.error}</p>`;
    return;
  }
  renderPassenger(data);
});
</script>
</body>
</html>
