<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    MU Lounge Validation
  </title>

  <style>

    body {

      margin: 0;
      padding: 0;

      background: #0f172a;

      font-family:
        Arial,
        sans-serif;

      color: white;

      display: flex;

      justify-content: center;

      align-items: flex-start;

      min-height: 100vh;
    }

    .container {

      width: 100%;
      max-width: 500px;

      padding: 30px;
    }

    .title {

      font-size: 32px;

      font-weight: bold;

      margin-bottom: 10px;
    }

    .subtitle {

      color: #94a3b8;

      margin-bottom: 30px;
    }

    .search-box {

      display: flex;

      gap: 10px;

      margin-bottom: 25px;
    }

    input {

      flex: 1;

      padding: 14px;

      border: none;

      border-radius: 10px;

      font-size: 18px;

      background: #1e293b;

      color: white;
    }

    button {

      padding: 14px 22px;

      border: none;

      border-radius: 10px;

      background: #2563eb;

      color: white;

      font-size: 16px;

      cursor: pointer;
    }

    button:hover {

      background: #1d4ed8;
    }

    .card {

      background: #111827;

      border-radius: 16px;

      padding: 24px;

      box-shadow:
        0 0 20px rgba(0,0,0,0.3);

      display: none;
    }

    .flight {

      font-size: 22px;

      font-weight: bold;

      margin-bottom: 20px;
    }

    .name {

      font-size: 26px;

      font-weight: bold;

      margin-bottom: 8px;
    }

    .seat {

      color: #cbd5e1;

      margin-bottom: 24px;
    }

    .section {

      margin-bottom: 20px;
    }

    .label {

      color: #60a5fa;

      font-size: 14px;

      margin-bottom: 6px;

      text-transform: uppercase;
    }

    .value {

      font-size: 18px;

      white-space: pre-line;
    }

    .lounge-yes {

      color: #22c55e;

      font-weight: bold;
    }

    .lounge-no {

      color: #ef4444;

      font-weight: bold;
    }

    .error {

      background: #7f1d1d;

      padding: 14px;

      border-radius: 10px;

      display: none;

      margin-top: 20px;
    }

  </style>

</head>

<body>

  <div class="container">

    <div class="title">
      MU Lounge Validation
    </div>

    <div class="subtitle">
      Search by BN / Seat / Name
    </div>

    <div class="search-box">

      <input
        id="query"
        placeholder="321 / 20A / HUANG"
      >

      <button onclick="searchPassenger()">
        Search
      </button>

    </div>

    <div
      id="error"
      class="error"
    ></div>

    <div
      id="card"
      class="card"
    >

      <div
        id="flight"
        class="flight"
      ></div>

      <div
        id="name"
        class="name"
      ></div>

      <div
        id="seat"
        class="seat"
      ></div>

      <div class="section">

        <div class="label">
          FF
        </div>

        <div
          id="ff"
          class="value"
        ></div>

      </div>

      <div class="section">

        <div class="label">
          Ticket
        </div>

        <div
          id="ticket"
          class="value"
        ></div>

      </div>

      <div class="section">

        <div class="label">
          Bags
        </div>

        <div
          id="bags"
          class="value"
        ></div>

      </div>

      <div class="section">

        <div class="label">
          Lounge Guest
        </div>

        <div
          id="lounge"
          class="value"
        ></div>

      </div>

    </div>

  </div>

  <script>

    async function searchPassenger() {

      const q =
        document
          .getElementById('query')
          .value
          .trim();

      if (!q) {
        return;
      }

      const card =
        document.getElementById('card');

      const error =
        document.getElementById('error');

      card.style.display =
        'none';

      error.style.display =
        'none';

      try {

        const res =
          await fetch(
            '/search?q=' +
            encodeURIComponent(q)
          );

        const data =
          await res.json();

        if (data.error) {

          error.innerText =
            data.error;

          error.style.display =
            'block';

          return;
        }

        // Flight
        document.getElementById(
          'flight'
        ).innerText =
          data.flight +
          '/' +
          data.flightDate;

        // Name
        document.getElementById(
          'name'
        ).innerText =
          data.name;

        // Seat
        document.getElementById(
          'seat'
        ).innerText =
          'BN' +
          data.bn +
          ' | ' +
          data.seat;

        // FF
        document.getElementById(
          'ff'
        ).innerText =
          (
            data.ffCarrier || 'NONE'
          ) +
          ' ' +
          (
            data.ffNumber || ''
          );

        // Ticket
        document.getElementById(
          'ticket'
        ).innerText =
          data.ticketNumber || 'NONE';

        // Bags
        document.getElementById(
          'bags'
        ).innerText =
          data.bagtags?.length
            ? data.bagtags.join('\n')
            : 'NONE';

        // Lounge
        const lounge =
          document.getElementById(
            'lounge'
          );

        if (
          data.lounge?.guest
        ) {

          lounge.innerHTML =
            '<span class="lounge-yes">✅ Allowed</span>';
        }

        else if (
          data.lounge?.eligible
        ) {

          lounge.innerHTML =
            '<span class="lounge-no">❌ Not Allowed</span>';
        }

        else {

          lounge.innerHTML =
            '<span class="lounge-no">❌ Not Allowed</span>';
        }

        // Show Card
        card.style.display =
          'block';

      } catch (err) {

        error.innerText =
          'Search failed';

        error.style.display =
          'block';
      }
    }

    // Enter key
    document
      .getElementById('query')
      .addEventListener(
        'keypress',
        function(e) {

          if (e.key === 'Enter') {

            searchPassenger();
          }
        }
      );

  </script>

</body>
</html>
