<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MU Lounge Validation</title>

  <style>

    body {

      margin: 0;

      padding: 0;

      background:
        linear-gradient(
          135deg,
          #020617,
          #0f172a
        );

      font-family:
        Arial,
        sans-serif;

      color: white;

      min-height: 100vh;
    }

    .container {

      max-width: 1400px;

      margin: 20px auto;

      padding: 20px 40px;
    }

    .login-box {

      width: 420px;

      margin: 120px auto;

      background:
        rgba(15,23,42,0.95);

      border:
        1px solid rgba(255,255,255,0.08);

      border-radius: 24px;

      padding: 36px;

      box-shadow:
        0 20px 50px rgba(0,0,0,0.4);
    }

    .login-title {

      font-size: 42px;

      font-weight: 800;

      margin-bottom: 30px;

      text-align: center;
    }

    input {

      width: 100%;

      box-sizing: border-box;

      border: none;

      outline: none;
    }

    .login-input {

      height: 62px;

      background: #1e293b;

      border-radius: 16px;

      padding: 0 20px;

      color: white;

      font-size: 18px;

      margin-bottom: 18px;
    }

    .login-button {

      width: 100%;

      height: 62px;

      border: none;

      border-radius: 16px;

      background: #2563eb;

      color: white;

      font-size: 20px;

      font-weight: 700;

      cursor: pointer;
    }

    .dashboard-title {

      font-size: 62px;

      font-weight: 900;

      margin-bottom: 10px;

      letter-spacing: -2px;
    }

    .dashboard-subtitle {

      color: #94a3b8;

      font-size: 22px;

      margin-bottom: 40px;
    }

    .search-row {

      display: flex;

      gap: 18px;

      align-items: center;
    }

    .search-input {

      flex: 1;

      height: 92px;

      background: #1e293b;

      border:
        2px solid rgba(255,255,255,0.35);

      border-radius: 22px;

      color: white;

      font-size: 44px;

      font-weight: 700;

      padding: 0 30px;
    }

    .search-button {

      width: 170px;

      height: 92px;

      border: none;

      border-radius: 22px;

      background: #2563eb;

      color: white;

      font-size: 28px;

      font-weight: 700;

      cursor: pointer;
    }

    .card {

      margin-top: 34px;

      background:
        rgba(15,23,42,0.95);

      border:
        1px solid rgba(255,255,255,0.08);

      border-radius: 28px;

      padding: 36px;

      max-width: 680px;

      box-shadow:
        0 20px 50px rgba(0,0,0,0.4);

      display: none;
    }

    .flight {

      font-size: 34px;

      font-weight: 900;

      margin-bottom: 28px;
    }

    .name {

      font-size: 52px;

      font-weight: 900;

      margin-bottom: 10px;
    }

    .seat {

      font-size: 28px;

      color: #cbd5e1;

      margin-bottom: 34px;
    }

    .section {

      margin-bottom: 28px;
    }

    .label {

      color: #60a5fa;

      font-size: 22px;

      margin-bottom: 8px;

      text-transform: uppercase;
    }

    .value {

      font-size: 34px;

      font-weight: 700;

      line-height: 1.5;
    }

    .lounge-yes {

      color: #10b981;

      font-weight: 800;
    }

    .lounge-no {

      color: #ef4444;

      font-weight: 800;
    }

    .error {

      color: #ef4444;

      text-align: center;

      margin-top: 14px;

      font-size: 18px;
    }

  </style>

</head>

<body>

  <div class="container">

    <!-- LOGIN -->
    <div
      class="login-box"
      id="loginBox"
    >

      <div class="login-title">
        Login
      </div>

      <input
        type="text"
        id="username"
        class="login-input"
        placeholder="Username"
      />

      <input
        type="password"
        id="password"
        class="login-input"
        placeholder="Password"
      />

      <button
        class="login-button"
        onclick="login()"
      >
        Login
      </button>

      <div
        class="error"
        id="loginError"
      ></div>

    </div>

    <!-- APP -->
    <div
      id="app"
      style="display:none;"
    >

      <div class="dashboard-title">
        MU Lounge Validation
      </div>

      <div class="dashboard-subtitle">
        Search by BN / Seat / Name
      </div>

      <!-- SEARCH -->
      <div class="search-row">

        <input
          type="text"
          id="query"
          class="search-input"
          onkeydown="if(event.key==='Enter') searchPassenger()"
        />

        <button
          class="search-button"
          onclick="searchPassenger()"
        >
          Search
        </button>

      </div>

      <!-- CARD -->
      <div
        class="card"
        id="card"
      >

        <div
          class="flight"
          id="flight"
        ></div>

        <div
          class="name"
          id="name"
        ></div>

        <div
          class="seat"
          id="seat"
        ></div>

        <div class="section">

          <div class="label">
            Membership
          </div>

          <div
            class="value"
            id="ff"
          ></div>

        </div>

        <div class="section">

          <div class="label">
            Membership Status
          </div>

          <div
            class="value"
            id="ffStatus"
          ></div>

        </div>

        <div
          class="section"
          id="ticketRow"
        >

          <div class="label">
            Ticket
          </div>

          <div
            class="value"
            id="ticket"
          ></div>

        </div>

        <div
          class="section"
          id="bagsRow"
        >

          <div class="label">
            Bags
          </div>

          <div
            class="value"
            id="bags"
          ></div>

        </div>

        <div class="section">

          <div class="label">
            Lounge Entitle
          </div>

          <div
            class="value"
            id="lounge"
          ></div>

        </div>

        <div class="section">

          <div class="label">
            Lounge Guest
          </div>

          <div
            class="value"
            id="guest"
          ></div>

        </div>

      </div>

    </div>

  </div>

  <script>

    // ===========================
    // Login
    // ===========================
    function login() {

      const user =
        document.getElementById(
          'username'
        ).value;

      const pass =
        document.getElementById(
          'password'
        ).value;

      if (
        user === 'mu586' &&
        pass === 'mulax'
      ) {

        localStorage.setItem(
          'loggedIn',
          'true'
        );

        localStorage.setItem(
          'lastActivity',
          Date.now()
        );

        showApp();
      }

      else {

        document.getElementById(
          'loginError'
        ).innerText =
          'Invalid username or password';
      }
    }

    // ===========================
    // Show App
    // ===========================
    function showApp() {

      document.getElementById(
        'loginBox'
      ).style.display =
        'none';

      document.getElementById(
        'app'
      ).style.display =
        'block';
    }

    // ===========================
    // Session Timeout
    // ===========================
    function checkSession() {

      const loggedIn =
        localStorage.getItem(
          'loggedIn'
        );

      if (!loggedIn) {
        return;
      }

      const last =
        Number(
          localStorage.getItem(
            'lastActivity'
          )
        );

      if (
        Date.now() - last >
        15 * 60 * 1000
      ) {

        localStorage.removeItem(
          'loggedIn'
        );

        location.reload();
      }
    }

    // Activity tracking
    document.addEventListener(
      'click',
      () => {

        localStorage.setItem(
          'lastActivity',
          Date.now()
        );
      }
    );

    document.addEventListener(
      'keydown',
      () => {

        localStorage.setItem(
          'lastActivity',
          Date.now()
        );
      }
    );

    setInterval(
      checkSession,
      10000
    );

    // Restore session
    if (
      localStorage.getItem(
        'loggedIn'
      )
    ) {

      showApp();
    }

    // ===========================
    // Search
    // ===========================
    async function searchPassenger() {

      const q =
        document.getElementById(
          'query'
        ).value.trim();

      if (!q) {
        return;
      }

      const res =
        await fetch(
          '/search?q=' +
          encodeURIComponent(q)
        );

      const data =
        await res.json();

      if (data.error) {

        alert(data.error);

        return;
      }

      const card =
        document.getElementById(
          'card'
        );

      // =========================
      // PD Passenger
      // =========================
      if (data.pdOnly) {

        document.getElementById(
          'flight'
        ).innerText =
          `${data.flight || 'MU586'}/${data.flightDate || 'UNKNOWN'}`;

        document.getElementById(
          'name'
        ).innerText =
          data.name || 'UNKNOWN';

        document.getElementById(
          'seat'
        ).innerText =
          'BN' +
          (data.bn || '---') +
          ' | ' +
          (data.seat || '---') +
          ' | ' +
          (data.cabin || 'Unknown') +
          ' Class';

        document.getElementById(
          'ff'
        ).innerText =
          (
            data.ffCarrier || 'NONE'
          ) +
          ' ' +
          (
            data.ffNumber || ''
          );

        document.getElementById(
          'ffStatus'
        ).innerText =
          data.ffTier === 'V'
            ? 'Platinum'
            : data.ffTier === 'G'
            ? 'Gold'
            : data.ffTier === 'S'
            ? 'Silver'
            : data.ffTier === 'C'
            ? 'Regular'
            : 'NONE';

        // Hide Ticket/Bags
        document.getElementById(
          'ticketRow'
        ).style.display =
          'none';

        document.getElementById(
          'bagsRow'
        ).style.display =
          'none';

        // Lounge
        document.getElementById(
          'lounge'
        ).innerHTML =
          data.lounge?.eligible
            ? '<span class="lounge-yes">✅ Eligible</span>'
            : '<span class="lounge-no">❌ Not Eligible</span>';

        // Guest
        document.getElementById(
          'guest'
        ).innerHTML =
          data.lounge?.guest
            ? '<span class="lounge-yes">✅ Allowed</span>'
            : '<span class="lounge-no">❌ Not Allowed</span>';

        card.style.display =
          'block';

        return;
      }

      // =========================
      // FB Passenger
      // =========================

      document.getElementById(
        'ticketRow'
      ).style.display =
        'block';

      document.getElementById(
        'bagsRow'
      ).style.display =
        'block';

      document.getElementById(
        'flight'
      ).innerText =
        `${data.flight}/${data.flightDate}`;

      document.getElementById(
        'name'
      ).innerText =
        data.name;

      document.getElementById(
        'seat'
      ).innerText =
        `BN${data.bn} | ${data.seat} | ${data.cabin} Class`;

      document.getElementById(
        'ff'
      ).innerText =
        `${data.ffCarrier || 'NONE'} ${data.ffNumber || ''}`;

      document.getElementById(
        'ffStatus'
      ).innerText =
        data.ffTier === 'V'
          ? 'Platinum'
          : data.ffTier === 'G'
          ? 'Gold'
          : data.ffTier === 'S'
          ? 'Silver'
          : data.ffTier === 'C'
          ? 'Regular'
          : 'NONE';

      document.getElementById(
        'ticket'
      ).innerText =
        data.ticketNumber || 'NONE';

      document.getElementById(
        'bags'
      ).innerText =
        data.bagtags?.length
          ? data.bagtags.join('\n')
          : 'NONE';

      document.getElementById(
        'lounge'
      ).innerHTML =
        data.lounge?.eligible
          ? '<span class="lounge-yes">✅ Eligible</span>'
          : '<span class="lounge-no">❌ Not Eligible</span>';

      document.getElementById(
        'guest'
      ).innerHTML =
        data.lounge?.guest
          ? '<span class="lounge-yes">✅ Allowed</span>'
          : '<span class="lounge-no">❌ Not Allowed</span>';

      card.style.display =
        'block';
    }

  </script>

</body>
</html>
