<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    MUFC System
  </title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;
      padding: 0;

      background: #0f172a;

      color: white;

      font-family:
        Arial,
        sans-serif;

      min-height: 100vh;

      display: flex;

      justify-content: center;
    }

    .container {

      width: 100%;

      max-width: 460px;

      padding: 20px;
    }

    .title {

      font-size: 30px;

      font-weight: bold;

      margin-bottom: 6px;
    }

    .subtitle {

      color: #94a3b8;

      font-size: 14px;

      margin-bottom: 24px;

      line-height: 1.5;
    }

    .card,
    .login-card {

      background: #111827;

      border-radius: 20px;

      padding: 20px;

      box-shadow:
        0 0 25px rgba(0,0,0,0.35);
    }

    .login-card {

      margin-top: 60px;
    }

    input {

      width: 100%;

      padding: 14px;

      margin-bottom: 14px;

      border: none;

      border-radius: 14px;

      background: #1e293b;

      color: white;

      font-size: 15px;
    }

    button {

      border: none;

      background: #2563eb;

      color: white;

      border-radius: 14px;

      padding: 14px;

      font-size: 15px;

      cursor: pointer;
    }

    button:hover {

      background: #1d4ed8;
    }

    .search-box {

      display: flex;

      gap: 10px;

      margin-bottom: 20px;
    }

    .search-box input {

      margin-bottom: 0;
    }

    .search-box button {

      min-width: 100px;
    }

    #mainApp {

      display: none;
    }

    #card {

      display: none;
    }

    .flight {

      font-size: 24px;

      font-weight: bold;

      margin-bottom: 18px;
    }

    .name {

      font-size: 28px;

      font-weight: bold;

      margin-bottom: 10px;
    }

    .seat {

      color: #cbd5e1;

      margin-bottom: 22px;

      font-size: 15px;
    }

    .divider {

      height: 1px;

      background: rgba(255,255,255,0.08);

      margin:
        18px 0;
    }

    .section {

      margin-bottom: 18px;
    }
    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .grid-two .section {
      margin-bottom: 0;
    }

    .label {

      color: #60a5fa;

      text-transform: uppercase;

      font-size: 12px;

      letter-spacing: 1px;

      margin-bottom: 6px;
    }

    .value {

      white-space: pre-line;

      line-height: 1.6;

      font-size: 16px;
    }

    .yes {

      color: #22c55e;

      font-weight: bold;
    }

    .no {

      color: #ef4444;

      font-weight: bold;
    }

    .error {

      display: none;

      background: #7f1d1d;

      border-radius: 12px;

      padding: 12px;

      margin-top: 15px;

      font-size: 14px;
    }
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      margin-bottom: 14px;
    }

    .app-header .title {
      margin-bottom: 0;
    }

    .guide-panel {
      display: none;
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 16px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.7;
    }

    .flight-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .flight-row .flight {
      margin-bottom: 0;
    }

    .doc-icon-btn {
      display: none;
      padding: 6px 8px;
      font-size: 20px;
      line-height: 1;
      border-radius: 10px;
      background: transparent;
      min-width: auto;
    }

    .doc-icon-btn:hover {
      background: rgba(51, 65, 85, 0.75);
    }

    .mini-btn {
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 10px;
      background: #334155;
      white-space: nowrap;
    }

    .mini-btn:hover {
      background: #475569;
    }

    .doc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
    }

    .doc-item-label {
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .doc-item-value {
      font-size: 15px;
      color: #f8fafc;
      word-break: break-word;
    }

  </style>

</head>

<body>

  <div class="container">

    <!-- LOGIN -->
    <div
      id="loginPage"
      class="login-card"
    >

      <div class="title">
        MUFC
      </div>

      <div class="subtitle">
        Internal Access Only
      </div>

      <input
        id="username"
        placeholder="Username"
      >

      <input
        id="password"
        type="password"
        placeholder="Password"
      >

      <button
        onclick="login()"
        style="width:100%;"
      >
        Login
      </button>

      <div
        id="loginError"
        class="error"
      ></div>

    </div>

    <!-- MAIN -->
    <div id="mainApp">

      <div class="app-header">
        <div class="title">
          MUFC
        </div>

        <button
          id="guideToggleBtn"
          class="mini-btn"
          onclick="toggleGuidePanel()"
        >
          Search Guide
        </button>
      </div>

      <div
        id="guidePanel"
        class="guide-panel"
      >
        <b>Search By:</b><br>
        Boarding Number<br>
        Full Name On Boarding Pass<br>
        Seat Number<br>
        Ticket Number<br>
        Membership Number
      </div>

      <div class="search-box">

        <input
          id="query"
          placeholder="Enter Search"
        >

        <button onclick="searchPassenger()">
          Search
        </button>

      </div>

      <div
        id="error"
        class="error"
      ></div>

      <!-- CARD -->
      <div
        id="card"
        class="card"
      >
        <div class="flight-row">
          <div
            id="flight"
            class="flight"
          ></div>

          <button
            id="docToggleBtn"
            class="doc-icon-btn"
            onclick="toggleDocPanel()"
            title="Show Docs"
            aria-label="Show Docs"
          >
            🪪
          </button>
        </div>

        <div
          id="name"
          class="name"
        ></div>

        <div
          id="seat"
          class="seat"
        ></div>

        <div
          id="docSection"
          class="section"
          style="display:none;"
        >
          <div class="divider"></div>
          <div class="label">Travel Docs</div>
          <div id="docContent" class="value"></div>
        </div>

        <div class="grid-two">
        <!-- Membership -->
        <div
          id="membershipSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Membership
          </div>

          <div
            id="ff"
            class="value"
          ></div>

          <div
            id="ffStatus"
            class="value"
          ></div>

        </div>

        <!-- Ticket -->
        <div
          id="ticketSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Ticket
          </div>

          <div
            id="ticket"
            class="value"
          ></div>

        </div>

        <!-- Bags -->
        <div
          id="bagsSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Bags
          </div>

          <div
            id="bags"
            class="value"
          ></div>

        </div>

        <!-- Inbound -->
        <div
          id="inboundSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Inbound
          </div>

          <div
            id="inbound"
            class="value"
          ></div>

        </div>

        <!-- Outbound -->
        <div
          id="outboundSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Outbound
          </div>

          <div
            id="outbound"
            class="value"
          ></div>

        </div>

        <!-- SSR -->
        <div
          id="ssrSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Special Service
          </div>

          <div
            id="ssr"
            class="value"
          ></div>

        </div>

        <!-- Special Meal -->
        <div
          id="mealSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Special Meal
          </div>

          <div
            id="meal"
            class="value"
          ></div>

        </div>

        <!-- Paid Service -->
        <div
          id="paidSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Paid Service
          </div>

          <div
            id="paid"
            class="value"
          ></div>

        </div>

        <!-- Lounge -->
        <div class="section">

          <div class="divider"></div>

          <div class="label">
            Lounge Access
          </div>

          <div
            id="lounge"
            class="value"
          ></div>

          <div
            class="label"
            style="margin-top:18px;"
          >
            Guest Access
          </div>

          <div
            id="guest"
            class="value"
          ></div>

        </div>
        </div>

      </div>

    </div>

  </div>

  <script>
    let docPanelOpen = false;
    let guidePanelOpen = false;

    function toggleGuidePanel() {
      const panel = document.getElementById('guidePanel');
      const btn = document.getElementById('guideToggleBtn');
      guidePanelOpen = !guidePanelOpen;
      panel.style.display = guidePanelOpen ? 'block' : 'none';
      btn.innerText = guidePanelOpen ? 'Hide Guide' : 'Search Guide';
    }

    function toggleDocPanel() {
      const sec = document.getElementById('docSection');
      docPanelOpen = !docPanelOpen;
      sec.style.display = docPanelOpen ? 'block' : 'none';
    }

    function cleanDocText(value) {
      return (value || '')
        .toString()
        .replace(/PAXLST\s*:?[^\n]*/gi, '')
        .replace(/PAX\s*INFO\s*:/gi, '')
        .replace(/PASSPORT\s*:/gi, '')
        .trim();
    }

    function getDocParts(raw) {
      const text = cleanDocText(raw)
        .replace(/\s+/g, ' ')
        .trim();

      if (!text) return [];

      const slashParts = text
        .split('/')
        .map(x => x.trim())
        .filter(Boolean);

      const docsIndex = slashParts.findIndex(x => x.toUpperCase().includes('DOCS'));

      if (docsIndex >= 0) {
        const first = slashParts[docsIndex].toUpperCase();
        const normalizedFirst = first === 'DOCS' ? [] : [first.replace(/^.*DOCS/, '')].filter(Boolean);
        return normalizedFirst.concat(slashParts.slice(docsIndex + 1));
      }

      return slashParts;
    }

    function formatDocDate(value) {
      if (!value) return '';
      return value.toString().trim().toUpperCase();
    }

    function buildDocHtml(data) {
      const rawSources = [
        data.paxInfoRaw,
        data.passportRaw
      ].filter(Boolean);

      const raw = rawSources.map(cleanDocText).filter(Boolean).join(' / ');
      const parts = getDocParts(raw);

      let doc = {
        nationality: '',
        dob: '',
        gender: '',
        passport: '',
        expiry: ''
      };

      // Common DOCS format:
      // DOCS/P/ISSUING COUNTRY/PASSPORT/NATIONALITY/DOB/GENDER/EXPIRY/LAST/FIRST
      if (parts.length >= 8 && parts[0].toUpperCase() === 'P') {
        doc.passport = parts[2] || '';
        doc.nationality = parts[3] || parts[1] || '';
        doc.dob = formatDocDate(parts[4]);
        doc.gender = parts[5] || '';
        doc.expiry = formatDocDate(parts[6]);
      }

      // Fallback: search useful patterns if the source format is different.
      if (!doc.passport) {
        const passMatch = raw.match(/\b[A-Z0-9]{6,12}\b/);
        doc.passport = passMatch ? passMatch[0] : '';
      }

      if (!doc.dob || !doc.expiry) {
        const dateMatches = raw.match(/\b\d{2}[A-Z]{3}\d{2,4}\b/g) || [];
        doc.dob = doc.dob || dateMatches[0] || '';
        doc.expiry = doc.expiry || dateMatches[1] || '';
      }

      if (!doc.gender) {
        const genderMatch = raw.match(/(?:^|\/)\s*([MF])\s*(?:\/|$)/i);
        doc.gender = genderMatch ? genderMatch[1].toUpperCase() : '';
      }

      const rows = [
        ['Nationality', doc.nationality],
        ['DOB', doc.dob],
        ['Gender', doc.gender],
        ['Passport No.', doc.passport],
        ['Expiry Date', doc.expiry]
      ].filter(row => row[1]);

      if (!rows.length) return '';

      return '<div class="doc-grid">' + rows.map(row => `
        <div>
          <div class="doc-item-label">${row[0]}</div>
          <div class="doc-item-value">${row[1]}</div>
        </div>
      `).join('') + '</div>';
    }

    // ===========================
    // Session Timeout
    // ===========================
    const LOGIN_TIMEOUT =
      30 * 60 * 1000;

    const lastLogin =
      localStorage.getItem(
        'mu_login_time'
      );

    const now =
      Date.now();

    if (

      localStorage.getItem(
        'mu_logged_in'
      ) === 'true'

      &&

      lastLogin

      &&

      (now - Number(lastLogin))
        < LOGIN_TIMEOUT

    ) {

      document.getElementById(
        'loginPage'
      ).style.display = 'none';

      document.getElementById(
        'mainApp'
      ).style.display = 'block';
    }

    else {

      localStorage.clear();
    }

    // ===========================
    // Login
    // ===========================
    function login() {

      const username =
        document
          .getElementById('username')
          .value
          .trim();

      const password =
        document
          .getElementById('password')
          .value
          .trim();

      if (

        username === 'mu586' &&
        password === 'mulax'

      ) {

        localStorage.setItem(
          'mu_logged_in',
          'true'
        );

        localStorage.setItem(
          'mu_login_time',
          Date.now()
        );

        document.getElementById(
          'loginPage'
        ).style.display = 'none';

        document.getElementById(
          'mainApp'
        ).style.display = 'block';
      }

      else {

        const err =
          document.getElementById(
            'loginError'
          );

        err.innerText =
          'Invalid username or password';

        err.style.display =
          'block';
      }
    }

    // ===========================
    // Search
    // ===========================
    async function searchPassenger() {

      localStorage.setItem(
        'mu_login_time',
        Date.now()
      );

      let q =
        document
          .getElementById('query')
          .value
          .trim();

      if (!q) {
        return;
      }

      const upper =
        q.toUpperCase();

      if (
        upper.startsWith('FB ')
      ) {

        q =
          q.substring(3).trim();
      }

      else if (
        upper.startsWith('RN ')
      ) {

        q =
          q.substring(3).trim();
      }

      else if (
        upper.startsWith('FSN ')
      ) {

        q =
          q.substring(4).trim();
      }

      else if (
        upper.startsWith('ETKD ')
      ) {

        q =
          q.substring(5).trim();
      }

      else if (
        upper.startsWith('FF ')
      ) {

        q =
          q.substring(3).trim();
      }

      const card =
        document.getElementById('card');

      const error =
        document.getElementById('error');

      card.style.display =
        'none';

      error.style.display =
        'none';

      try {

        const res =
          await fetch(
            '/search?q=' +
            encodeURIComponent(q)
          );

        const data =
          await res.json();

        if (data.error) {

          error.innerText =
            data.error;

          error.style.display =
            'block';

          return;
        }

        // Flight
        document.getElementById(
          'flight'
        ).innerText =
          `✈ ${data.flight}/${data.flightDate}`;

        // Name
        document.getElementById(
          'name'
        ).innerText =
          data.name;

        // Seat
        document.getElementById(
          'seat'
        ).innerText =
          `🎫 BN${data.bn} • ${data.seat} • ${data.cabin}`;

        // Docs button/panel
        const docBtn = document.getElementById('docToggleBtn');
        const docSec = document.getElementById('docSection');
        const docContent = document.getElementById('docContent');
        const docHtml = buildDocHtml(data);

        if (docHtml) {
          docBtn.style.display = 'inline-block';
          docContent.innerHTML = docHtml;
          docPanelOpen = false;
          docSec.style.display = 'none';
        } else {
          docBtn.style.display = 'none';
          docSec.style.display = 'none';
          docContent.innerHTML = '';
        }

        // Membership
        if (data.ffNumber) {

          document.getElementById(
            'membershipSection'
          ).style.display =
            'block';

          document.getElementById(
            'ff'
          ).innerText =

            `${data.ffCarrier} ${data.ffNumber}`;

          document.getElementById(
            'ffStatus'
          ).innerText =

            data.membershipStatus ||

            (
              data.ffTier === 'V'
                ? 'Platinum'
                : data.ffTier === 'G'
                ? 'Gold'
                : data.ffTier === 'S'
                ? 'Silver'
                : data.ffTier === 'C'
                ? 'Regular'
                : data.ffTier === '1'
                ? 'Elite'
                : data.ffTier === '2'
                ? 'Elite Plus'
                : ''
            );
        }

        else {

          document.getElementById(
            'membershipSection'
          ).style.display =
            'none';
        }

        // Ticket
        if (data.ticketNumber) {

          document.getElementById(
            'ticketSection'
          ).style.display =
            'block';

          document.getElementById(
            'ticket'
          ).innerText =
            data.ticketNumber;
        }

        else {

          document.getElementById(
            'ticketSection'
          ).style.display =
            'none';
        }

        // Bags
        if (
          data.bagtags &&
          data.bagtags.length
        ) {

          document.getElementById(
            'bagsSection'
          ).style.display =
            'block';

          document.getElementById(
            'bags'
          ).innerText =
            data.bagtags.join('\n');
        }

        else {

          document.getElementById(
            'bagsSection'
          ).style.display =
            'none';
        }

        // Inbound
        if (data.inbound) {

          document.getElementById(
            'inboundSection'
          ).style.display =
            'block';

          document.getElementById(
            'inbound'
          ).innerText =

            `${data.inbound.flight}/${data.inbound.date}\nFrom ${data.inbound.origin}`;
        }

        else {

          document.getElementById(
            'inboundSection'
          ).style.display =
            'none';
        }

        // Outbound
        if (data.outbound) {

          document.getElementById(
            'outboundSection'
          ).style.display =
            'block';

          document.getElementById(
            'outbound'
          ).innerText =

            `${data.outbound.flight}/${data.outbound.date}` +

            (data.outbound.bn
              ? ` • BN${data.outbound.bn}`
              : '') +

            (data.outbound.seat
              ? ` • ${data.outbound.seat}`
              : '') +

            `\nTo ${data.outbound.destination}`;
        }

        else {

          document.getElementById(
            'outboundSection'
          ).style.display =
            'none';
        }

        // Special Service
        if (data.specialServices && data.specialServices.length) {
          document.getElementById('ssrSection').style.display = 'block';
          document.getElementById('ssr').innerText = data.specialServices.join(', ');
        } else {
          document.getElementById('ssrSection').style.display = 'none';
        }

        // Special Meal
        if (data.specialMeals && data.specialMeals.length) {
          document.getElementById('mealSection').style.display = 'block';
          document.getElementById('meal').innerText = data.specialMeals.join(', ');
        } else {
          document.getElementById('mealSection').style.display = 'none';
        }

        // Paid Service
        if (data.paidProductsShort && data.paidProductsShort.length) {
          document.getElementById('paidSection').style.display = 'block';
          document.getElementById('paid').innerText = data.paidProductsShort.join('\n');
        } else if (data.paidProducts && data.paidProducts.length) {
          document.getElementById('paidSection').style.display = 'block';
          document.getElementById('paid').innerText = data.paidProducts.join('\n');
        } else {
          document.getElementById('paidSection').style.display = 'none';
        }

        // Lounge
        document.getElementById(
          'lounge'
        ).innerHTML =

          data.lounge?.eligible

            ? '<span class="yes">✅ Eligible</span>'

            : '<span class="no">❌ Not Eligible</span>';

        // Guest
        document.getElementById(
          'guest'
        ).innerHTML =

          data.lounge?.guest

            ? '<span class="yes">✅ Allowed</span>'

            : '<span class="no">❌ Not Allowed</span>';

        // Show
        card.style.display =
          'block';

      }

      catch (err) {

        error.innerText =
          'Search failed';

        error.style.display =
          'block';
      }
    }

    // ===========================
    // Enter Key
    // ===========================
    document
      .getElementById('query')
      .addEventListener(
        'keypress',
        function(e) {

          if (e.key === 'Enter') {

            searchPassenger();
          }
        }
      );

  </script>

</body>
</html>
