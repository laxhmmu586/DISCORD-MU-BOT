```html
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lounge Checker</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      padding: 30px;
    }

    .box {
      max-width: 500px;
      margin: auto;
      background: #1e1e1e;
      padding: 25px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      font-size: 18px;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .result {
      margin-top: 25px;
      line-height: 1.8;
      font-size: 18px;
    }

    .good {
      color: #00ff99;
    }

    .bad {
      color: #ff5555;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>🛋 Lounge Checker</h1>

  <input
    type="text"
    id="search"
    placeholder="Enter FB / RN / Ticket"
  />

  <button onclick="lookup()">
    CHECK
  </button>

  <div class="result" id="result"></div>

</div>

<script>

async function lookup() {

  const q = document.getElementById("search").value;

  const res = await fetch(`/lookup?q=${q}`);

  const data = await res.json();

  if (data.error) {

    document.getElementById("result").innerHTML =
      "❌ Not Found";

    return;
  }

  document.getElementById("result").innerHTML = `
    👤 ${data.name}<br><br>

    🎫 ${data.bn} | ${data.seat}<br><br>

    💳 FF<br>
    ${data.ffNumber}<br>
    ${data.tier}<br><br>

    🎟 Ticket<br>
    ${data.ticket}<br><br>

    🛋 Lounge Guest<br>
    ${
      data.guestAllowed
        ? '<span class="good">✅ Allowed</span>'
        : '<span class="bad">❌ Not Allowed</span>'
    }
  `;
}

</script>

</body>
</html>
```
