<script>

  // ===========================
  // Auto Login (30 Min Timeout)
  // ===========================
  const LOGIN_TIMEOUT =
    30 * 60 * 1000;

  const lastLogin =
    localStorage.getItem(
      'mu_login_time'
    );

  const now =
    Date.now();

  if (

    localStorage.getItem(
      'mu_logged_in'
    ) === 'true'

    &&

    lastLogin

    &&

    (now - Number(lastLogin))
      < LOGIN_TIMEOUT

  ) {

    document.getElementById(
      'loginPage'
    ).style.display = 'none';

    document.getElementById(
      'mainApp'
    ).style.display = 'block';
  }

  else {

    localStorage.removeItem(
      'mu_logged_in'
    );

    localStorage.removeItem(
      'mu_login_time'
    );
  }

  // ===========================
  // Login
  // ===========================
  function login() {

    const username =
      document
        .getElementById('username')
        .value
        .trim();

    const password =
      document
        .getElementById('password')
        .value
        .trim();

    if (

      username === 'mu586' &&
      password === 'mulax'

    ) {

      localStorage.setItem(
        'mu_logged_in',
        'true'
      );

      localStorage.setItem(
        'mu_login_time',
        Date.now()
      );

      document.getElementById(
        'loginPage'
      ).style.display = 'none';

      document.getElementById(
        'mainApp'
      ).style.display = 'block';
    }

    else {

      const err =
        document.getElementById(
          'loginError'
        );

      err.innerText =
        'Invalid username or password';

      err.style.display =
        'block';
    }
  }

  // ===========================
  // Search Passenger
  // ===========================
  async function searchPassenger() {

    // Refresh Session Timer
    localStorage.setItem(
      'mu_login_time',
      Date.now()
    );

    let q =
      document
        .getElementById('query')
        .value
        .trim();

    if (!q) {
      return;
    }

    // ===========================
    // eTerm Search Mode
    // ===========================
    const upper =
      q.toUpperCase();

    // FB 174
    if (
      upper.startsWith('FB ')
    ) {

      q =
        q.substring(3).trim();
    }

    // RN CHEN/YUHUI
    else if (
      upper.startsWith('RN ')
    ) {

      q =
        q.substring(3).trim();
    }

    // FSN 32A
    else if (
      upper.startsWith('FSN ')
    ) {

      q =
        q.substring(4).trim();
    }

    // ETKD 781xxxx
    else if (
      upper.startsWith('ETKD ')
    ) {

      q =
        q.substring(5).trim();
    }

    // FF MU600xxxx
    else if (
      upper.startsWith('FF ')
    ) {

      q =
        q.substring(3).trim();
    }

    const card =
      document.getElementById('card');

    const error =
      document.getElementById('error');

    card.style.display = 'none';

    error.style.display = 'none';

    try {

      const res =
        await fetch(
          '/search?q=' +
          encodeURIComponent(q)
        );

      const data =
        await res.json();

      if (data.error) {

        error.innerText =
          data.error;

        error.style.display =
          'block';

        return;
      }

      // Flight
      document.getElementById(
        'flight'
      ).innerText =
        `✈️ ${data.flight}/${data.flightDate}`;

      // Name
      document.getElementById(
        'name'
      ).innerText =
        data.name;

      // Seat
      document.getElementById(
        'seat'
      ).innerText =
        `🎫 BN${data.bn} • ${data.seat} • ${data.cabin}`;

      // Membership
      if (data.ffNumber) {

        document.getElementById(
          'membershipSection'
        ).style.display =
          'block';

        document.getElementById(
          'ff'
        ).innerText =

          `${data.ffCarrier} ${data.ffNumber}`;

        document.getElementById(
          'ffStatus'
        ).innerText =

          data.membershipStatus ||

          (
            data.ffTier === 'V'
              ? 'Platinum'
              : data.ffTier === 'G'
              ? 'Gold'
              : data.ffTier === 'S'
              ? 'Silver'
              : ''
          );
      }

      else {

        document.getElementById(
          'membershipSection'
        ).style.display =
          'none';
      }

      // Ticket
      if (data.ticketNumber) {

        document.getElementById(
          'ticketSection'
        ).style.display =
          'block';

        document.getElementById(
          'ticket'
        ).innerText =
          data.ticketNumber;
      }

      else {

        document.getElementById(
          'ticketSection'
        ).style.display =
          'none';
      }

      // Bags
      if (
        data.bagtags &&
        data.bagtags.length
      ) {

        document.getElementById(
          'bagsSection'
        ).style.display =
          'block';

        document.getElementById(
          'bags'
        ).innerText =

          data.bagtags.join('\n');
      }

      else {

        document.getElementById(
          'bagsSection'
        ).style.display =
          'none';
      }

      // Inbound
      if (data.inbound) {

        document.getElementById(
          'inboundSection'
        ).style.display =
          'block';

        document.getElementById(
          'inbound'
        ).innerText =

          `${data.inbound.flight}/${data.inbound.date}\nFrom ${data.inbound.origin}`;
      }

      else {

        document.getElementById(
          'inboundSection'
        ).style.display =
          'none';
      }

      // Outbound
      if (data.outbound) {

        document.getElementById(
          'outboundSection'
        ).style.display =
          'block';

        document.getElementById(
          'outbound'
        ).innerText =

          `${data.outbound.flight}/${data.outbound.date}` +

          (data.outbound.bn
            ? ` • BN${data.outbound.bn}`
            : '') +

          (data.outbound.seat
            ? ` • ${data.outbound.seat}`
            : '') +

          `\nTo ${data.outbound.destination}`;
      }

      else {

        document.getElementById(
          'outboundSection'
        ).style.display =
          'none';
      }

      // SSR
      if (
        data.specialServices &&
        data.specialServices.length
      ) {

        document.getElementById(
          'ssrSection'
        ).style.display =
          'block';

        document.getElementById(
          'ssr'
        ).innerText =

          data.specialServices.join(
            '\n'
          );
      }

      else {

        document.getElementById(
          'ssrSection'
        ).style.display =
          'none';
      }

      // Lounge
      const lounge =
        document.getElementById(
          'lounge'
        );

      lounge.innerHTML =

        data.lounge?.eligible

          ? '<span class="lounge-yes">✅ Eligible</span>'

          : '<span class="lounge-no">❌ Not Eligible</span>';

      // Guest
      const guest =
        document.getElementById(
          'guest'
        );

      guest.innerHTML =

        data.lounge?.guest

          ? '<span class="lounge-yes">✅ Allowed</span>'

          : '<span class="lounge-no">❌ Not Allowed</span>';

      // Show Card
      card.style.display =
        'block';

    } catch (err) {

      error.innerText =
        'Search failed';

      error.style.display =
        'block';
    }
  }

  // ===========================
  // Enter Key
  // ===========================
  document
    .getElementById('query')
    .addEventListener(
      'keypress',
      function(e) {

        if (e.key === 'Enter') {

          searchPassenger();
        }
      }
    );

</script>
