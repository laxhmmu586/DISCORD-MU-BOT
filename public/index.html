<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MU Lounge Validator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #1b1b1b;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      color: #1E90FF;
    }
    #loginSection, #searchSection, #resultSection {
      width: 100%;
      max-width: 600px;
      margin-top: 20px;
    }
    input, select, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }
    button {
      background-color: #1E90FF;
      color: #fff;
      cursor: pointer;
    }
    .card {
      background-color: #2b2b2b;
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
      line-height: 1.5;
    }
    .card h2 {
      margin: 5px 0;
    }
    .section {
      margin-top: 10px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <h1>MU Lounge Validator</h1>

  <!-- Login Section -->
  <div id="loginSection">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>

  <!-- Search Section -->
  <div id="searchSection" class="hidden">
    <input type="text" id="searchInput" placeholder="Enter BN, Seat, Membership or Name on Boarding Pass">
    <button id="searchBtn">Search</button>
  </div>

  <!-- Result Section -->
  <div id="resultSection"></div>

  <script>
    const loginSection = document.getElementById('loginSection');
    const searchSection = document.getElementById('searchSection');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultSection = document.getElementById('resultSection');

    const USERNAME = 'mu586';
    const PASSWORD = 'mulax';

    let loginTimer;

    document.getElementById('loginBtn').addEventListener('click', () => {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();

      if(user === USERNAME && pass === PASSWORD){
        loginSection.classList.add('hidden');
        searchSection.classList.remove('hidden');
        startLogoutTimer();
      } else {
        alert('Invalid credentials');
      }
    });

    function startLogoutTimer() {
      if(loginTimer) clearTimeout(loginTimer);
      loginTimer = setTimeout(() => {
        alert('Session expired. Please login again.');
        location.reload();
      }, 30*60*1000); // 30 minutes
    }

    // Search button
    searchBtn.addEventListener('click', () => {
      startLogoutTimer();
      const query = searchInput.value.trim();
      if(!query) return alert('Please enter a search value');

      fetch(`/search?q=${encodeURIComponent(query)}`)
        .then(res => res.json())
        .then(data => displayResult(data))
        .catch(err => console.error(err));
    });

    function displayResult(data){
      resultSection.innerHTML = '';

      if(data.error){
        resultSection.innerHTML = `<div class="card">${data.error}</div>`;
        return;
      }

      const card = document.createElement('div');
      card.className = 'card';

      // Flight + Date
      const flightDate = data.flightDate ? `/${data.flightDate}` : '';
      card.innerHTML += `<h2>✈️ ${data.flight}${flightDate}</h2>`;

      // Passenger Name
      card.innerHTML += `<div class="section">👤 ${data.name}</div>`;

      // BN / Seat / Class
      card.innerHTML += `<div class="section">🎫 ${data.bn} • ${data.seat} • ${data.class}</div>`;

      // Membership
      if(data.membershipNumber){
        const status = data.membershipStatus || '';
        card.innerHTML += `<div class="section">🎟 Membership: ${data.ffCarrier} ${data.membershipNumber} • ${status}</div>`;
      }

      // Ticket
      if(data.ticketNumber) card.innerHTML += `<div class="section">🎟 Ticket: ${data.ticketNumber}</div>`;

      // Bags
      if(data.bagtags && data.bagtags.length > 0){
        card.innerHTML += `<div class="section">🧳 Bags:<br>${data.bagtags.join('<br>')}</div>`;
      }

      // Inbound / Outbound
      if(data.inbound) card.innerHTML += `<div class="section">Inbound: ${data.inbound}</div>`;
      if(data.outbound) card.innerHTML += `<div class="section">Outbound: ${data.outbound}</div>`;

      // SSR
      if(data.ssr && data.ssr.length > 0){
        card.innerHTML += `<div class="section">SSR: ${data.ssr.join(', ')}</div>`;
      }

      // Lounge Access
      card.innerHTML += `<div class="section">🛋 Lounge Access: ${data.loungeAccess ? '✅ Eligible' : '❌ Not Eligible'}</div>`;
      card.innerHTML += `<div class="section">👥 Guest Access: ${data.guestAccess ? '✅ Allowed' : '❌ Not Allowed'}</div>`;

      resultSection.appendChild(card);
    }
  </script>

</body>
</html>
