<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    MU Lounge Validation
  </title>

  <style>

    body {

      margin: 0;
      padding: 0;

      background: #0f172a;

      font-family:
        Arial,
        sans-serif;

      color: white;

      min-height: 100vh;
    }

    /* ========================= */
    /* Login Screen */
    /* ========================= */

    #loginScreen {

      width: 100%;
      min-height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;
    }

    .login-box {

      width: 320px;

      background: #111827;

      padding: 30px;

      border-radius: 16px;

      box-shadow:
        0 0 20px rgba(0,0,0,0.3);
    }

    .login-title {

      font-size: 28px;

      font-weight: bold;

      margin-bottom: 20px;
    }

    .login-input {

      width: 100%;

      padding: 14px;

      margin-bottom: 14px;

      border: none;

      border-radius: 10px;

      background: #1e293b;

      color: white;

      font-size: 16px;

      box-sizing: border-box;
    }

    .login-button {

      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 10px;

      background: #2563eb;

      color: white;

      font-size: 16px;

      cursor: pointer;
    }

    .login-error {

      color: #ef4444;

      margin-top: 14px;

      display: none;
    }

    /* ========================= */
    /* Main App */
    /* ========================= */

    #mainApp {

      display: none;

      justify-content: center;

      padding-top: 20px;
    }

    .container {

      width: 100%;
      max-width: 500px;

      padding: 30px;
    }

    .title {

      font-size: 32px;

      font-weight: bold;

      margin-bottom: 10px;
    }

    .subtitle {

      color: #94a3b8;

      margin-bottom: 30px;
    }

    .search-box {

      display: flex;

      gap: 10px;

      margin-bottom: 25px;
    }

    .search-input {

      flex: 1;

      padding: 14px;

      border: none;

      border-radius: 10px;

      font-size: 18px;

      background: #1e293b;

      color: white;
    }

    .search-button {

      padding: 14px 22px;

      border: none;

      border-radius: 10px;

      background: #2563eb;

      color: white;

      font-size: 16px;

      cursor: pointer;
    }

    .search-button:hover {

      background: #1d4ed8;
    }

    .card {

      background: #111827;

      border-radius: 16px;

      padding: 24px;

      box-shadow:
        0 0 20px rgba(0,0,0,0.3);

      display: none;
    }

    .flight {

      font-size: 22px;

      font-weight: bold;

      margin-bottom: 20px;
    }

    .name {

      font-size: 26px;

      font-weight: bold;

      margin-bottom: 8px;
    }

    .seat {

      color: #cbd5e1;

      margin-bottom: 24px;

      font-size: 17px;
    }

    .section {

      margin-bottom: 22px;
    }

    .label {

      color: #60a5fa;

      font-size: 14px;

      margin-bottom: 6px;

      text-transform: uppercase;
    }

    .value {

      font-size: 18px;

      white-space: pre-line;
    }

    .lounge-yes {

      color: #22c55e;

      font-weight: bold;
    }

    .lounge-no {

      color: #ef4444;

      font-weight: bold;
    }

    .error {

      background: #7f1d1d;

      padding: 14px;

      border-radius: 10px;

      display: none;

      margin-top: 20px;
    }

  </style>

</head>

<body>

  <!-- ========================= -->
  <!-- Login Screen -->
  <!-- ========================= -->

  <div id="loginScreen">

    <div class="login-box">

      <div class="login-title">
        Login
      </div>

      <input
        id="username"
        class="login-input"
        placeholder="Username"
      >

      <input
        id="password"
        type="password"
        class="login-input"
        placeholder="Password"
      >

      <button
        class="login-button"
        onclick="login()"
      >
        Login
      </button>

      <div
        id="loginError"
        class="login-error"
      >
        Invalid username or password
      </div>

    </div>

  </div>

  <!-- ========================= -->
  <!-- Main App -->
  <!-- ========================= -->

  <div id="mainApp">

    <div class="container">

      <div class="title">
        MU Lounge Validation
      </div>

      <div class="subtitle">
        Search by BN / Seat / Full Name on Boarding Pass
      </div>

      <div class="search-box">

        <input
          id="query"
          class="search-input"
          placeholder="321 / 20A / HUANG/ZEYUANMR"
        >

        <button
          class="search-button"
          onclick="searchPassenger()"
        >
          Search
        </button>

      </div>

      <div
        id="error"
        class="error"
      ></div>

      <div
        id="card"
        class="card"
      >

        <div
          id="flight"
          class="flight"
        ></div>

        <div
          id="name"
          class="name"
        ></div>

        <div
          id="seat"
          class="seat"
        ></div>

        <!-- Membership -->
        <div class="section">

          <div class="label">
            Membership
          </div>

          <div
            id="ff"
            class="value"
          ></div>

          <div
            id="ffStatus"
            class="value"
            style="margin-top:10px;"
          ></div>

        </div>

        <!-- Ticket -->
        <div class="section">

          <div class="label">
            Ticket
          </div>

          <div
            id="ticket"
            class="value"
          ></div>

        </div>

        <!-- Bags -->
        <div class="section">

          <div class="label">
            Bags
          </div>

          <div
            id="bags"
            class="value"
          ></div>

        </div>

        <!-- Lounge -->
        <div class="section">

          <div class="label">
            Lounge Entitle
          </div>

          <div
            id="lounge"
            class="value"
          ></div>

          <div
            class="label"
            style="margin-top:14px;"
          >
            Lounge Guest
          </div>

          <div
            id="guest"
            class="value"
            style="margin-top:10px;"
          ></div>

        </div>

      </div>

    </div>

  </div>

  <script>

    // =========================
    // Auto Logout Timer
    // =========================
    let logoutTimer;

    function resetLogoutTimer() {

      clearTimeout(logoutTimer);

      logoutTimer = setTimeout(() => {

        localStorage.removeItem(
          'muLoggedIn'
        );

        location.reload();

      }, 15 * 60 * 1000); // 15 minutes
    }

    // =========================
    // Login
    // =========================
    function login() {

      const username =
        document
          .getElementById('username')
          .value
          .trim();

      const password =
        document
          .getElementById('password')
          .value
          .trim();

      if (
        username === 'mu586' &&
        password === 'mulax'
      ) {

        localStorage.setItem(
          'muLoggedIn',
          'true'
        );

        document
          .getElementById('loginScreen')
          .style.display =
            'none';

        document
          .getElementById('mainApp')
          .style.display =
            'flex';

        resetLogoutTimer();
      }

      else {

        document
          .getElementById('loginError')
          .style.display =
            'block';
      }
    }

    // =========================
    // Auto Login
    // =========================
    window.onload = function() {

      if (
        localStorage.getItem(
          'muLoggedIn'
        ) === 'true'
      ) {

        document
          .getElementById('loginScreen')
          .style.display =
            'none';

        document
          .getElementById('mainApp')
          .style.display =
            'flex';

        resetLogoutTimer();
      }
    };

    // =========================
    // User Activity
    // =========================
    [
      'click',
      'mousemove',
      'keypress',
      'scroll',
      'touchstart'
    ].forEach(event => {

      document.addEventListener(
        event,
        resetLogoutTimer
      );
    });

    // =========================
    // Search Passenger
    // =========================
    async function searchPassenger() {

      const q =
        document
          .getElementById('query')
          .value
          .trim();

      if (!q) {
        return;
      }

      const card =
        document.getElementById('card');

      const error =
        document.getElementById('error');

      card.style.display =
        'none';

      error.style.display =
        'none';

      try {

        const res =
          await fetch(
            '/search?q=' +
            encodeURIComponent(q)
          );

        const data =
          await res.json();

        if (data.error) {

          error.innerText =
            data.error;

          error.style.display =
            'block';

          return;
        }

        // Flight
        document.getElementById(
          'flight'
        ).innerText =
          data.flight +
          '/' +
          data.flightDate;

        // Name
        document.getElementById(
          'name'
        ).innerText =
          data.name;

        // Seat + Cabin
        document.getElementById(
          'seat'
        ).innerText =
          'BN' +
          data.bn +
          ' | ' +
          data.seat +
          ' | ' +
          data.cabin +
          ' Class';

        // Membership
        document.getElementById(
          'ff'
        ).innerText =
          (
            data.ffCarrier || 'NONE'
          ) +
          ' ' +
          (
            data.ffNumber || ''
          );

        // Membership Status
        document.getElementById(
          'ffStatus'
        ).innerText =
          data.ffTier
            ? (
                data.ffTier === 'V'
                  ? 'Platinum'
                  : data.ffTier === 'G'
                  ? 'Gold'
                  : data.ffTier === 'S'
                  ? 'Silver'
                  : 'Regular'
              )
            : 'NONE';

        // Ticket
        document.getElementById(
          'ticket'
        ).innerText =
          data.ticketNumber || 'NONE';

        // Bags
        document.getElementById(
          'bags'
        ).innerText =
          data.bagtags?.length
            ? data.bagtags.join('\n')
            : 'NONE';

        // Lounge Entitle
        const lounge =
          document.getElementById(
            'lounge'
          );

        if (
          data.lounge?.eligible
        ) {

          lounge.innerHTML =
            '<span class="lounge-yes">✅ Eligible</span>';
        }

        else {

          lounge.innerHTML =
            '<span class="lounge-no">❌ Not Eligible</span>';
        }

        // Lounge Guest
        const guest =
          document.getElementById(
            'guest'
          );

        if (
          data.lounge?.guest
        ) {

          guest.innerHTML =
            '<span class="lounge-yes">✅ Allowed</span>';
        }

        else {

          guest.innerHTML =
            '<span class="lounge-no">❌ Not Allowed</span>';
        }

        // Show Card
        card.style.display =
          'block';

      } catch (err) {

        error.innerText =
          'Search failed';

        error.style.display =
          'block';
      }
    }

    // =========================
    // Enter Key
    // =========================
    document
      .addEventListener(
        'keypress',
        function(e) {

          if (e.key === 'Enter') {

            if (
              document
                .getElementById('loginScreen')
                .style.display !== 'none'
            ) {

              login();
            }

            else {

              searchPassenger();
            }
          }
        }
      );

  </script>

</body>
</html>
