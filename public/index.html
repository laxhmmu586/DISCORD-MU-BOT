<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MU Lounge</title>

  <style>

    body {

      margin: 0;

      padding: 0;

      background: #111827;

      font-family:
        Arial,
        sans-serif;

      color: white;
    }

    .container {

      max-width: 500px;

      margin: 40px auto;

      padding: 20px;
    }

    .login-box,
    .search-box,
    .card {

      background: #1f2937;

      border-radius: 12px;

      padding: 20px;

      margin-bottom: 20px;
    }

    h1 {

      text-align: center;

      margin-bottom: 20px;
    }

    input {

      width: 100%;

      padding: 12px;

      border: none;

      border-radius: 8px;

      margin-bottom: 12px;

      box-sizing: border-box;

      font-size: 16px;
    }

    button {

      width: 100%;

      padding: 12px;

      background: #2563eb;

      color: white;

      border: none;

      border-radius: 8px;

      font-size: 16px;

      cursor: pointer;
    }

    button:hover {

      background: #1d4ed8;
    }

    .row {

      margin-bottom: 16px;
    }

    .label {

      font-size: 13px;

      color: #9ca3af;

      margin-bottom: 4px;
    }

    .value {

      font-size: 17px;

      font-weight: bold;

      word-break: break-word;
    }

    .lounge-yes {

      color: #10b981;

      font-weight: bold;
    }

    .lounge-no {

      color: #ef4444;

      font-weight: bold;
    }

    .error {

      color: #ef4444;

      text-align: center;

      margin-top: 10px;
    }

  </style>

</head>

<body>

  <div class="container">

    <!-- LOGIN -->
    <div
      class="login-box"
      id="loginBox"
    >

      <h1>MU Login</h1>

      <input
        type="text"
        id="username"
        placeholder="Username"
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
      />

      <button onclick="login()">
        Login
      </button>

      <div
        class="error"
        id="loginError"
      ></div>

    </div>

    <!-- APP -->
    <div
      id="app"
      style="display:none;"
    >

      <!-- SEARCH -->
      <div class="search-box">

        <input
          type="text"
          id="query"
          placeholder="Search by BN / Seat / Full Name on Boarding Pass / Membership"
          onkeydown="if(event.key==='Enter') searchPassenger()"
        />

        <button onclick="searchPassenger()">
          Search
        </button>

      </div>

      <!-- CARD -->
      <div
        class="card"
        id="card"
        style="display:none;"
      >

        <div class="row">

          <div class="label">
            Flight
          </div>

          <div
            class="value"
            id="flight"
          ></div>

        </div>

        <div class="row">

          <div class="label">
            Passenger
          </div>

          <div
            class="value"
            id="name"
          ></div>

        </div>

        <div class="row">

          <div class="label">
            Seat
          </div>

          <div
            class="value"
            id="seat"
          ></div>

        </div>

        <div class="row">

          <div class="label">
            Membership
          </div>

          <div
            class="value"
            id="ff"
          ></div>

        </div>

        <div class="row">

          <div class="label">
            Membership Status
          </div>

          <div
            class="value"
            id="ffStatus"
          ></div>

        </div>

        <div
          class="row"
          id="ticketRow"
        >

          <div class="label">
            Ticket
          </div>

          <div
            class="value"
            id="ticket"
          ></div>

        </div>

        <div
          class="row"
          id="bagsRow"
        >

          <div class="label">
            Bags
          </div>

          <div
            class="value"
            id="bags"
          ></div>

        </div>

        <div class="row">

          <div class="label">
            Lounge Entitle
          </div>

          <div
            class="value"
            id="lounge"
          ></div>

        </div>

        <div class="row">

          <div class="label">
            Lounge Guest
          </div>

          <div
            class="value"
            id="guest"
          ></div>

        </div>

      </div>

    </div>

  </div>

  <script>

    // ===========================
    // Login
    // ===========================
    function login() {

      const user =
        document.getElementById(
          'username'
        ).value;

      const pass =
        document.getElementById(
          'password'
        ).value;

      if (
        user === 'mu586' &&
        pass === 'mulax'
      ) {

        localStorage.setItem(
          'loggedIn',
          'true'
        );

        localStorage.setItem(
          'lastActivity',
          Date.now()
        );

        showApp();
      }

      else {

        document.getElementById(
          'loginError'
        ).innerText =
          'Invalid username or password';
      }
    }

    // ===========================
    // Show App
    // ===========================
    function showApp() {

      document.getElementById(
        'loginBox'
      ).style.display =
        'none';

      document.getElementById(
        'app'
      ).style.display =
        'block';
    }

    // ===========================
    // Auto Logout
    // ===========================
    function checkSession() {

      const loggedIn =
        localStorage.getItem(
          'loggedIn'
        );

      if (!loggedIn) {
        return;
      }

      const last =
        Number(
          localStorage.getItem(
            'lastActivity'
          )
        );

      const now =
        Date.now();

      // 15 mins
      if (
        now - last >
        15 * 60 * 1000
      ) {

        localStorage.removeItem(
          'loggedIn'
        );

        location.reload();
      }
    }

    // Activity
    document.addEventListener(
      'click',
      () => {

        localStorage.setItem(
          'lastActivity',
          Date.now()
        );
      }
    );

    document.addEventListener(
      'keydown',
      () => {

        localStorage.setItem(
          'lastActivity',
          Date.now()
        );
      }
    );

    setInterval(
      checkSession,
      10000
    );

    // Auto login restore
    if (
      localStorage.getItem(
        'loggedIn'
      )
    ) {

      showApp();
    }

    // ===========================
    // Search
    // ===========================
    async function searchPassenger() {

      const q =
        document.getElementById(
          'query'
        ).value.trim();

      if (!q) {
        return;
      }

      const res =
        await fetch(
          '/search?q=' +
          encodeURIComponent(q)
        );

      const data =
        await res.json();

      const card =
        document.getElementById(
          'card'
        );

      if (data.error) {

        alert(data.error);

        return;
      }

      // =========================
      // PD Passenger
      // =========================
      if (data.pdOnly) {

        document.getElementById(
          'flight'
        ).innerText =
          'PD Passenger';

        document.getElementById(
          'name'
        ).innerText =
          data.name || 'UNKNOWN';

        document.getElementById(
          'seat'
        ).innerText =
          'BN' +
          (data.bn || '---') +
          ' | ' +
          (data.seat || '---') +
          ' | ' +
          (data.cabin || 'Unknown') +
          ' Class';

        document.getElementById(
          'ff'
        ).innerText =
          (
            data.ffCarrier || 'NONE'
          ) +
          ' ' +
          (
            data.ffNumber || ''
          );

        document.getElementById(
          'ffStatus'
        ).innerText =
          data.ffTier === 'V'
            ? 'Platinum'
            : data.ffTier === 'G'
            ? 'Gold'
            : data.ffTier === 'S'
            ? 'Silver'
            : data.ffTier === 'C'
            ? 'Regular'
            : 'NONE';

        // Hide Ticket
        document.getElementById(
          'ticketRow'
        ).style.display =
          'none';

        // Hide Bags
        document.getElementById(
          'bagsRow'
        ).style.display =
          'none';

        // Lounge
        const lounge =
          document.getElementById(
            'lounge'
          );

        if (
          data.lounge?.eligible
        ) {

          lounge.innerHTML =
            '<span class="lounge-yes">✅ Eligible</span>';
        }

        else {

          lounge.innerHTML =
            '<span class="lounge-no">❌ Not Eligible</span>';
        }

        // Guest
        const guest =
          document.getElementById(
            'guest'
          );

        if (
          data.lounge?.guest
        ) {

          guest.innerHTML =
            '<span class="lounge-yes">✅ Allowed</span>';
        }

        else {

          guest.innerHTML =
            '<span class="lounge-no">❌ Not Allowed</span>';
        }

        card.style.display =
          'block';

        return;
      }

      // =========================
      // Normal FB Passenger
      // =========================

      // Show Ticket
      document.getElementById(
        'ticketRow'
      ).style.display =
        'block';

      // Show Bags
      document.getElementById(
        'bagsRow'
      ).style.display =
        'block';

      document.getElementById(
        'flight'
      ).innerText =
        `${data.flight}/${data.flightDate}`;

      document.getElementById(
        'name'
      ).innerText =
        data.name;

      document.getElementById(
        'seat'
      ).innerText =
        `BN${data.bn} | ${data.seat} | ${data.cabin} Class`;

      document.getElementById(
        'ff'
      ).innerText =
        `${data.ffCarrier || 'NONE'} ${data.ffNumber || ''}`;

      document.getElementById(
        'ffStatus'
      ).innerText =
        data.ffTier === 'V'
          ? 'Platinum'
          : data.ffTier === 'G'
          ? 'Gold'
          : data.ffTier === 'S'
          ? 'Silver'
          : data.ffTier === 'C'
          ? 'Regular'
          : 'NONE';

      document.getElementById(
        'ticket'
      ).innerText =
        data.ticketNumber || 'NONE';

      document.getElementById(
        'bags'
      ).innerText =
        data.bagtags?.length
          ? data.bagtags.join('\n')
          : 'NONE';

      document.getElementById(
        'lounge'
      ).innerHTML =
        data.lounge?.eligible
          ? '<span class="lounge-yes">✅ Eligible</span>'
          : '<span class="lounge-no">❌ Not Eligible</span>';

      document.getElementById(
        'guest'
      ).innerHTML =
        data.lounge?.guest
          ? '<span class="lounge-yes">✅ Allowed</span>'
          : '<span class="lounge-no">❌ Not Allowed</span>';

      card.style.display =
        'block';
    }

  </script>

</body>
</html>
