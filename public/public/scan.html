<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manual Boarding</title>
  <style>
    :root { --brand:#123a73; --brand-soft:#eaf2ff; --line:#d7e1ec; --ink:#172033; --muted:#667085; --ok:#087443; --danger:#b42318; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; font-family:Inter,Arial,"Noto Sans SC",sans-serif; background:linear-gradient(135deg,#eaf4ff,#fdfefe); color:var(--ink); }
    header { display:flex; align-items:center; justify-content:space-between; gap:18px; padding:18px clamp(18px,4vw,52px); background:rgba(255,255,255,.92); border-bottom:1px solid var(--line); }
    .brand { font-weight:900; color:var(--brand); letter-spacing:.08em; text-decoration:none; }
    .header-right { display:flex; align-items:center; gap:14px; margin-left:auto; }
    .boarding-pill { border:1px solid rgba(18,58,115,.18); border-radius:999px; padding:10px 14px; color:var(--brand); background:var(--brand-soft); font-size:12px; font-weight:950; letter-spacing:.08em; text-decoration:none; text-transform:uppercase; }
    .user-menu-wrap { position:relative; }
    .icon-button { width:42px; height:42px; display:grid; place-items:center; border:1px solid rgba(18,58,115,.18); border-radius:50%; padding:0; background:#fff; color:var(--brand); cursor:pointer; box-shadow:0 8px 22px rgba(18,58,115,.08); }
    .icon-button svg { width:23px; height:23px; }
    .user-menu { position:absolute; right:0; top:calc(100% + 10px); min-width:190px; display:grid; gap:8px; padding:12px; border:1px solid var(--line); border-radius:16px; background:#fff; box-shadow:0 18px 42px rgba(22,48,76,.16); z-index:10; }
    .user-menu[hidden] { display:none; }
    .user-menu a, .user-menu button { width:100%; border:0; border-radius:12px; padding:10px 12px; background:#f4f7fb; color:var(--brand); font:inherit; font-weight:850; text-align:left; text-decoration:none; cursor:pointer; }
    main { width:min(860px,94vw); margin:28px auto; display:grid; gap:18px; }
    .mode-picker { width:min(940px,94vw); }
    .mode-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:24px; }
    .mode-card { min-height:230px; display:grid; align-content:center; justify-items:center; gap:16px; border:1px solid rgba(18,58,115,.26); border-radius:24px; background:linear-gradient(160deg,rgba(255,255,255,.92),rgba(234,242,255,.72)); box-shadow:0 22px 52px rgba(18,58,115,.12), inset 0 1px 0 rgba(255,255,255,.85); color:var(--brand); text-align:center; transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease; }
    .mode-card:not(.is-disabled) { cursor:pointer; }
    .mode-card:not(.is-disabled):hover { transform:translateY(-3px); border-color:rgba(18,58,115,.54); box-shadow:0 28px 64px rgba(18,58,115,.18), inset 0 1px 0 rgba(255,255,255,.92); }
    .mode-card.is-disabled { cursor:not-allowed; opacity:.68; filter:saturate(.72); }
    .mode-icon { width:84px; height:84px; display:grid; place-items:center; border-radius:24px; background:rgba(18,58,115,.08); color:var(--brand); }
    .mode-icon svg { width:58px; height:58px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .mode-title { margin:0; color:var(--brand); font-size:24px; font-weight:950; letter-spacing:.08em; text-transform:uppercase; }
    .mode-note { margin:0; color:var(--muted); font-size:13px; font-weight:850; text-transform:uppercase; letter-spacing:.04em; }
    .scan-workspace[hidden], .mode-picker[hidden] { display:none; }
    .card { background:#fff; border:1px solid var(--line); border-radius:22px; box-shadow:0 18px 42px rgba(22,48,76,.08); padding:22px; }
    video { width:100%; max-height:58vh; border-radius:18px; background:#111; object-fit:cover; }
    button,a.button { border:0; border-radius:999px; padding:12px 18px; font-weight:850; cursor:pointer; background:var(--brand); color:white; text-decoration:none; }
    .mode-card { border:1px solid rgba(18,58,115,.26); border-radius:24px; padding:22px; background:linear-gradient(160deg,rgba(255,255,255,.92),rgba(234,242,255,.72)); }
    button.secondary { background:#e8eef7; color:var(--brand); }
    .actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:14px; }
    .status { min-height:28px; font-weight:900; }
    .status.ok { color:var(--ok); } .status.err { color:var(--danger); }
    .result { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .result div { padding:12px; border:1px solid var(--line); border-radius:14px; background:#fbfdff; }
    .result b { display:block; color:var(--muted); font-size:12px; text-transform:uppercase; }
    @media (max-width:640px){ .result{grid-template-columns:1fr} .mode-grid{grid-template-columns:1fr} .mode-card{min-height:190px} }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">MUFC</a>
    <div class="header-right">
      <a class="boarding-pill" href="scan.html" aria-current="page">M-Boarding</a>
      <div class="user-menu-wrap">
        <button class="icon-button" id="user-menu-button" type="button" aria-label="Open account menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 12.5a4.25 4.25 0 1 0 0-8.5 4.25 4.25 0 0 0 0 8.5Z" stroke="currentColor" stroke-width="2.1"/><path d="M4.25 20.25a8.25 8.25 0 0 1 15.5 0" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/></svg>
        </button>
        <div class="user-menu" id="user-menu" hidden>
          <a href="index.html#change-password">Change Password</a>
          <button id="scan-logout" type="button">Logout</button>
        </div>
      </div>
    </div>
  </header>
  <main class="mode-picker" id="mode-picker">
    <section class="mode-grid" aria-label="Scan mode selection">
      <button class="mode-card" id="manual-mode" type="button" aria-label="Open manual boarding">
        <span class="mode-icon" aria-hidden="true"><svg viewBox="0 0 64 64"><path d="M13 12h38a5 5 0 0 1 5 5v30a5 5 0 0 1-5 5H13a5 5 0 0 1-5-5V17a5 5 0 0 1 5-5Z"/><path d="M19 22h26"/><path d="M19 32h18"/><path d="M19 42h26"/><path d="M48 22h.01"/><path d="M43 32h.01"/></svg></span>
        <span class="mode-title">Manual Boarding</span>
      </button>
      <button class="mode-card is-disabled" type="button" aria-disabled="true" tabindex="-1">
        <span class="mode-icon" aria-hidden="true"><svg viewBox="0 0 64 64"><path d="M10 27h44a5 5 0 0 1 5 5v17a5 5 0 0 1-5 5H10a5 5 0 0 1-5-5V32a5 5 0 0 1 5-5Z"/><path d="M15 27 25 8l23 12-4 7"/><path d="M34 27 44 15l15 12"/><path d="M24 41h18"/></svg></span>
        <span class="mode-title">Box</span>
        <span class="mode-note">Not available</span>
      </button>
    </section>
  </main>
  <main class="scan-workspace" id="scan-workspace" hidden>
    <section class="card">
      <h1>Manual Boarding</h1>
      <div class="camera-wrap"><video id="preview" muted playsinline></video><div class="aim-box" aria-hidden="true"></div></div>
      <div class="actions"><button id="start" type="button">Start Scan</button><button class="secondary" id="stop" type="button">Stop</button></div>
      <p class="status" id="status">Ready.</p>
      <div class="result" id="result" hidden></div>
    </section>
    <section class="card">
      <h2>Add NBRD</h2>
      <form class="nbrd-form" id="nbrd-form">
        <div class="field-grid">
          <label>BN<input id="nbrd-bn" name="bn" inputmode="numeric" pattern="\d{1,4}" placeholder="94 or 0094" required /></label>
          <label>NBRD Message<textarea id="nbrd-message" name="message" placeholder="CKIN NBRD CTC LAKE" required></textarea></label>
        </div>
        <div class="actions"><button type="submit">Add NBRD</button></div>
      </form>
    </section>
  </main>
  <div class="dialog-backdrop" id="message-dialog" hidden><div class="dialog-card" role="dialog" aria-modal="true" aria-labelledby="dialog-title"><div class="dialog-icon" id="dialog-icon" hidden></div><h2 id="dialog-title">Message</h2><p id="dialog-message"></p><button id="dialog-ok" type="button">OK</button></div></div>
  <div class="dialog-backdrop" id="password-dialog" hidden><form class="dialog-card" id="password-form" role="dialog" aria-modal="true" aria-labelledby="password-title"><h2 id="password-title">Change password</h2><input id="new-password" type="password" autocomplete="new-password" placeholder="New password" minlength="6" required /><input id="confirm-password" type="password" autocomplete="new-password" placeholder="Confirm password" minlength="6" required /><button type="submit">Update password</button><button class="secondary" id="password-cancel" type="button">Cancel</button></form></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="/__/firebase/init.js"></script>
  <script src="https://unpkg.com/@zxing/browser@latest"></script>
  <script>
    const auth = window.firebase?.apps?.length && window.firebase?.auth ? firebase.auth() : null;
    const AUTH_SESSION_STARTED_KEY = 'mufc_auth_session_started_at';
    const AUTH_LAST_ACTIVITY_KEY = 'mufc_auth_last_activity_at';
    const AUTH_SESSION_LIMIT_MS = 60 * 60 * 1000;
    function loginUrl() {
      const url = new URL('login.html', window.location.href);
      url.searchParams.set('next', `${window.location.pathname}${window.location.search}${window.location.hash}`);
      return url.href;
    }
    function hasActiveAuthSession() {
      const lastActivityAt = Number(sessionStorage.getItem(AUTH_LAST_ACTIVITY_KEY) || sessionStorage.getItem(AUTH_SESSION_STARTED_KEY) || 0);
      return Boolean(lastActivityAt && Date.now() - lastActivityAt < AUTH_SESSION_LIMIT_MS);
    }
    function markAuthActivity() {
      sessionStorage.setItem(AUTH_LAST_ACTIVITY_KEY, String(Date.now()));
    }
    function requireLogin() {
      if (!auth) { window.location.replace(loginUrl()); return; }
      auth.onAuthStateChanged(async (user) => {
        if (!user || !hasActiveAuthSession()) {
          sessionStorage.removeItem(AUTH_SESSION_STARTED_KEY);
          sessionStorage.removeItem(AUTH_LAST_ACTIVITY_KEY);
          if (user) await auth.signOut();
          window.location.replace(loginUrl());
          return;
        }
        markAuthActivity();
      });
    }
    requireLogin();
    const apiBase = (window.MU_API_BASE || 'https://api.mufcapp.net').replace(/\/$/, '');
    const modePicker = document.querySelector('#mode-picker');
    const scanWorkspace = document.querySelector('#scan-workspace');
    document.querySelector('#manual-mode').addEventListener('click', () => { modePicker.hidden = true; scanWorkspace.hidden = false; });
    const userMenuButton = document.querySelector('#user-menu-button');
    const userMenu = document.querySelector('#user-menu');
    userMenuButton?.addEventListener('click', () => { const open = userMenu.hidden; userMenu.hidden = !open; userMenuButton.setAttribute('aria-expanded', String(open)); });
    document.querySelector('#scan-logout')?.addEventListener('click', () => { window.location.href = 'login.html'; });
    const statusEl = document.querySelector('#status');
    const resultEl = document.querySelector('#result');
    const preview = document.querySelector('#preview');
    const dialog = document.querySelector('#message-dialog');
    const dialogMessage = document.querySelector('#dialog-message');
    const dialogIcon = document.querySelector('#dialog-icon');
    const dialogOk = document.querySelector('#dialog-ok');
    const passwordDialog = document.querySelector('#password-dialog');
    const passwordForm = document.querySelector('#password-form');
    const passwordCancel = document.querySelector('#password-cancel');
    const newPasswordInput = document.querySelector('#new-password');
    const confirmPasswordInput = document.querySelector('#confirm-password');
    const userMenuButton = document.querySelector('#user-menu-button');
    const userMenu = document.querySelector('#user-menu');
    const changePasswordButton = document.querySelector('#change-password');
    const logoutButton = document.querySelector('#logout');
    let controls = null;
    let scanBusy = false;
    let lastScanText = '';
    let lastScanAt = 0;
    const cameraConstraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: { ideal: 'continuous' },
        advanced: [{ focusMode: 'continuous' }]
      },
      audio: false
    };
    function setStatus(text, cls = '') { statusEl.textContent = text; statusEl.className = `status ${cls}`.trim(); }
    async function applyCameraFocus() {
      const track = preview.srcObject?.getVideoTracks?.()[0];
      if (!track?.applyConstraints) return;
      const capabilities = track.getCapabilities?.() || {};
      const constraints = { advanced: [] };
      if (Array.isArray(capabilities.focusMode) && capabilities.focusMode.includes('continuous')) constraints.advanced.push({ focusMode: 'continuous' });
      if (Array.isArray(capabilities.exposureMode) && capabilities.exposureMode.includes('continuous')) constraints.advanced.push({ exposureMode: 'continuous' });
      if (Array.isArray(capabilities.whiteBalanceMode) && capabilities.whiteBalanceMode.includes('continuous')) constraints.advanced.push({ whiteBalanceMode: 'continuous' });
      if (capabilities.zoom && Number.isFinite(capabilities.zoom.min) && Number.isFinite(capabilities.zoom.max)) {
        const targetZoom = Math.min(capabilities.zoom.max, Math.max(capabilities.zoom.min, 1.4));
        constraints.advanced.push({ zoom: targetZoom });
      }
      if (!constraints.advanced.length) return;
      await track.applyConstraints(constraints).catch(() => {});
    }
    function showMessage(message, title = 'Message', type = '') {
      document.querySelector('#dialog-title').textContent = title;
      dialogMessage.textContent = message;
      const icons = { success:'✓', infant:'✓', warning:'!', error:'✕' };
      dialogIcon.hidden = !icons[type];
      dialogIcon.textContent = icons[type] || '';
      dialogIcon.className = `dialog-icon ${type || ''}`.trim();
      dialog.hidden = false;
      dialogOk.focus();
    }
    function hideMessage() { dialog.hidden = true; }
    dialogOk.addEventListener('click', hideMessage);
    userMenuButton.addEventListener('click', () => {
      const isOpen = userMenu.hidden;
      userMenu.hidden = !isOpen;
      userMenuButton.setAttribute('aria-expanded', String(isOpen));
    });
    document.addEventListener('click', (event) => {
      if (userMenu.hidden || event.target.closest('.header-actions')) return;
      userMenu.hidden = true;
      userMenuButton.setAttribute('aria-expanded', 'false');
    });
    changePasswordButton.addEventListener('click', () => {
      userMenu.hidden = true;
      userMenuButton.setAttribute('aria-expanded', 'false');
      newPasswordInput.value = '';
      confirmPasswordInput.value = '';
      passwordDialog.hidden = false;
      newPasswordInput.focus();
    });
    passwordCancel.addEventListener('click', () => { passwordDialog.hidden = true; });
    passwordForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const nextPassword = newPasswordInput.value;
      if (nextPassword !== confirmPasswordInput.value) { showMessage('Passwords do not match.', 'Change password', 'error'); return; }
      try {
        await auth.currentUser.updatePassword(nextPassword);
        passwordDialog.hidden = true;
        showMessage('Password updated successfully.', 'Success', 'success');
      } catch (err) {
        showMessage(err.message || 'Unable to update password. Please login again and retry.', 'Change password', 'error');
      }
    });
    logoutButton.addEventListener('click', async () => {
      sessionStorage.removeItem(AUTH_SESSION_STARTED_KEY);
      sessionStorage.removeItem(AUTH_LAST_ACTIVITY_KEY);
      await auth?.signOut?.();
      window.location.replace(loginUrl());
    });
    function renderResult(data) { resultEl.hidden = false; resultEl.innerHTML = `<div><b>Flight</b>${data.flight || '0586'}</div><div><b>Seat</b>${data.seat || ''}</div><div><b>BN</b>${data.bn || ''}</div>${data.isInfant ? '<div><b>Type</b>INFANT</div>' : ''}`; }
    async function saveScan(rawScan) {
      const res = await fetch(`${apiBase}/cbs-scan`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ rawScan }) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const message = data.code === 'WRONG_FLIGHT' ? 'wrong flight' : (data.code === 'NBRD_MESSAGE' ? `NBRD message${data.detail ? `\n${data.detail}` : ''}` : (data.code === 'DUPLICATE_BN' ? `Duplicate BN: ${(String(rawScan).match(/(?:^|\D)(?:0*INF|0*\d{1,3}[A-Z])(\d{3,4})\b/i)?.[1] || '').slice(-3)}` : (data.error || 'Scan failed')));
        const type = data.code === 'WRONG_FLIGHT' || data.code === 'DUPLICATE_BN' ? 'error' : (data.code === 'NBRD_MESSAGE' ? 'warning' : '');
        showMessage(message, 'Message', type);
        throw new Error(message);
      }
      renderResult(data);
      const scanType = data.isInfant ? 'infant' : 'success';
      setStatus(data.isInfant ? `Saved INFANT BN ${data.bn}` : `Saved BN ${data.bn} / Seat ${data.seat}`, 'ok');
      showMessage(data.isInfant ? `Input successful infant BN ${data.bn}` : `Input successful BN ${data.bn}`, data.isInfant ? 'Infant' : 'Success', scanType);
    }
    async function handleText(text) { try { setStatus('Saving...'); await saveScan(text); } catch (err) { setStatus(err.message, 'err'); } finally { setTimeout(() => { if (controls) setStatus('Scanning'); }, 900); } }
    document.querySelector('#nbrd-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const bnInput = document.querySelector('#nbrd-bn');
      const messageInput = document.querySelector('#nbrd-message');
      const bn = String(bnInput.value || '').replace(/\D/g, '');
      const detail = String(messageInput.value || '').trim();
      if (!/^\d{1,4}$/.test(bn)) { showMessage('BN must be 1 to 4 digits.'); return; }
      if (!detail) { showMessage('NBRD message is required.'); return; }
      try {
        setStatus('Saving NBRD...');
        const res = await fetch(`${apiBase}/cbs-scan/nbrd-bns`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ entries:[{ bn, detail }] }) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'NBRD save failed');
        bnInput.value = '';
        messageInput.value = '';
        setStatus(`Saved NBRD BN ${String(bn).padStart(4, '0').slice(-3)}`, 'ok');
        showMessage(`NBRD saved BN ${String(bn).padStart(4, '0').slice(-3)}`, 'Success', 'success');
      } catch (err) {
        setStatus(err.message || 'NBRD save failed', 'err');
        showMessage(err.message || 'NBRD save failed');
      }
    });
    document.querySelector('#start').addEventListener('click', async () => {
      try {
        if (!window.ZXingBrowser) throw new Error('ZXing library did not load.');
        const Reader = ZXingBrowser.BrowserPDF417Reader || ZXingBrowser.BrowserMultiFormatReader;
        const reader = new Reader();
        const decode = typeof reader.decodeFromConstraints === 'function'
          ? reader.decodeFromConstraints.bind(reader, cameraConstraints)
          : reader.decodeFromVideoDevice.bind(reader, undefined);
        controls = await decode(preview, (result, error) => {
          if (!result || scanBusy) return;
          const text = result.getText();
          const now = Date.now();
          if (text === lastScanText && now - lastScanAt < 2500) return;
          scanBusy = true;
          lastScanText = text;
          lastScanAt = now;
          setStatus('Code detected. Saving before next scan...');
          handleText(text).finally(() => { setTimeout(() => { scanBusy = false; if (controls) setStatus('Scanning'); }, 1500); });
        });
        await applyCameraFocus();
        setStatus('Scanning');
      } catch (err) { setStatus(err.message, 'err'); showMessage(err.message); }
    });
    document.querySelector('#stop').addEventListener('click', () => { controls?.stop(); controls = null; setStatus('Stopped.'); });
  </script>
</body>
</html>
