<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lounge Validation</title>
  <style>
    * { box-sizing: border-box; }
    html { background: #020a12; }
    body {
      position: relative;
      isolation: isolate;
      margin: 0;
      padding: 0;
      background: transparent;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
    }
    body::before {
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.34), transparent 22rem),
        linear-gradient(90deg, rgba(0, 0, 0, 0.28), transparent 34%, transparent 66%, rgba(0, 0, 0, 0.36));
      z-index: -1;
    }
    body::after {
      inset: -6vmax;
      background: url("assets/space-earth-night-4k.svg") center / cover no-repeat;
      transform-origin: 50% 82%;
      animation: slowEarthTurn 96s linear infinite alternate;
      z-index: -2;
    }
    @keyframes slowEarthTurn {
      from { transform: scale(1.04) rotate(-0.75deg) translate3d(-1.2%, 0, 0); }
      to { transform: scale(1.08) rotate(0.75deg) translate3d(1.2%, -0.6%, 0); }
    }
    @media (prefers-reduced-motion: reduce) {
      body::after { animation: none; transform: scale(1.05); }
    }
    .container { width: 100%; max-width: 460px; padding: 20px; }
    .title { font-size: 30px; font-weight: bold; margin-bottom: 6px; }
    .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .card { background: rgba(17, 24, 39, 0.82); backdrop-filter: blur(14px); border-radius: 20px; padding: 20px; box-shadow: 0 0 25px rgba(0,0,0,0.35); }
    .flight { font-size: 24px; font-weight: bold; margin-bottom: 18px; }
    .name { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
    .seat { color: #cbd5e1; margin-bottom: 22px; font-size: 15px; }
    .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 18px 0; }
    .grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .section { margin-bottom: 18px; }
    .grid-two .section { margin-bottom: 0; }
    .label { color: #60a5fa; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; margin-bottom: 6px; }
    .value { white-space: pre-line; line-height: 1.6; font-size: 16px; }
    .yes { color: #22c55e; font-weight: bold; }
    .no { color: #ef4444; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Lounge Validation</div>
    <div class="subtitle">Lounge eligibility view.</div>

    <div class="card">
      <div class="flight">✈️ MU586/21MAY</div>
      <div class="name">XU/FENGJUAN</div>
      <div class="seat">🎫 BN201 • 8A • Business</div>

      <div class="grid-two">
        <div class="section">
          <div class="label">Ticket</div>
          <div class="value">MU 624015393886</div>
        </div>
        <div class="section">
          <div class="label">Membership</div>
          <div class="value">Platinum</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="grid-two">
        <div class="section">
          <div class="label">inbound</div>
          <div class="value">Lounge Access
<span class="yes">✅ Eligible</span></div>
        </div>
        <div class="section">
          <div class="label">outbound</div>
          <div class="value">Guest Access
<span class="no">❌ Not Allowed</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
