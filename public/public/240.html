<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>240-Hour Visa-Free Transit Verification</title>
  <style>
    :root{--brand:#123a73;--line:#d7e1ec;--ink:#172033;--muted:#667085;--ok:#087443;--danger:#b42318;--rail:#2563eb}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,"Noto Sans SC",sans-serif;background:linear-gradient(135deg,#eaf4ff,#fdfefe);color:var(--ink)}header{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px clamp(18px,4vw,52px);background:rgba(255,255,255,.92);border-bottom:1px solid var(--line)}.brand{font-weight:900;color:var(--brand);letter-spacing:.08em;text-decoration:none}main{width:min(920px,94vw);margin:28px auto;display:grid;gap:18px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 42px rgba(22,48,76,.08);padding:22px}.camera-wrap{position:relative;overflow:hidden;border-radius:18px;background:#111}video{display:block;width:100%;max-height:50vh;background:#111;object-fit:cover}.aim-box{position:absolute;left:50%;top:50%;width:min(78%,560px);height:34%;transform:translate(-50%,-50%);border:3px solid rgba(255,255,255,.92);border-radius:18px;box-shadow:0 0 0 999px rgba(0,0,0,.28);pointer-events:none}button,a.button{border:0;border-radius:999px;padding:12px 18px;font-weight:850;cursor:pointer;background:var(--brand);color:white;text-decoration:none}button.secondary{background:#e8eef7;color:var(--brand)}button.danger{background:#fee4e2;color:var(--danger)}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}.status{min-height:28px;font-weight:900}.status.ok{color:var(--ok)}.status.err,.error{color:var(--danger)}.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;align-items:start}label{display:grid;gap:8px;min-width:0;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}.airport-code{min-height:56px;display:flex;align-items:center;font:inherit;font-weight:950;color:var(--ink)}input,select{width:100%;max-width:100%;min-width:0;height:56px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;color:var(--ink);font:inherit;font-weight:750;background:#fbfdff;-webkit-appearance:none;appearance:none}form{display:grid;gap:16px}.itinerary{position:relative;display:grid;gap:12px;margin-top:4px;padding-left:30px}.itinerary::before{content:"";position:absolute;left:6px;top:28px;bottom:28px;width:3px;border-radius:999px;background:var(--rail)}.stop{position:relative;display:grid;grid-template-columns:80px 160px minmax(0,1fr) auto;gap:12px;align-items:center;min-height:56px}.stop.from-row{grid-template-columns:80px minmax(0,1fr) auto}.stop::before{content:"";position:absolute;left:-28.5px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:999px;background:white;border:3px solid var(--rail);box-shadow:0 0 0 2px #fff}.stop input.invalid{border-color:var(--danger);background:#fff7f6}.stop-title{font-weight:950;color:var(--brand)}.help{margin:0;color:var(--muted);font-weight:750}.form-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.form-title-row h2{margin:0}.form-title-row button{padding:10px 16px}.attachments{display:grid;grid-template-columns:repeat(4,minmax(100px,1fr));gap:10px}.attachment-items{display:contents}.attachment-tile{position:relative;display:grid;gap:5px;align-content:start;min-height:104px;border:1px dashed #c6d5e6;border-radius:12px;padding:6px;background:#fff;cursor:pointer;transition:border-color .2s ease,box-shadow .2s ease,transform .2s ease}.attachment-tile:hover,.attachment-tile:focus-within{border-color:var(--brand);box-shadow:0 10px 24px rgba(18,58,115,.12);transform:translateY(-1px)}.attachment-tile input[type=file]{position:absolute;inline-size:1px;block-size:1px;opacity:0;overflow:hidden;pointer-events:none}.attachment-preview{position:relative;display:grid;place-items:center;height:76px;border-radius:10px;overflow:hidden;background:#eef5fe;color:var(--brand);font-weight:900}.attachment-upload .attachment-preview::before{content:"+";display:grid;place-items:center;width:34px;height:34px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--brand);font-size:28px;line-height:1;box-shadow:0 8px 18px rgba(22,48,76,.1)}.attachment-preview img{width:100%;height:100%;object-fit:cover;display:block}.attachment-remove{position:absolute;top:2px;right:2px;z-index:2;display:grid;place-items:center;width:24px;height:24px;border:1px solid rgba(255,255,255,.85);border-radius:999px;padding:0;background:#d92d20;color:#fff;font-size:16px;line-height:1;box-shadow:0 4px 10px rgba(22,48,76,.22)}.attachment-document{display:grid;place-items:center;width:48px;height:48px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--brand);font-size:13px;letter-spacing:.06em;box-shadow:0 8px 18px rgba(22,48,76,.1)}.attachment-filename{min-height:16px;text-align:center;color:var(--muted);font-size:11px;font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.dialog-backdrop{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:22px;background:rgba(12,20,32,.48)}.dialog-backdrop[hidden]{display:none}.dialog-card{width:min(420px,92vw);border-radius:28px;background:rgba(255,255,255,.96);box-shadow:0 22px 70px rgba(0,0,0,.28);padding:28px;text-align:center}.dialog-card h2{margin:0 0 12px}.dialog-card p{white-space:pre-line;font-size:18px;font-weight:850}.dialog-card button{width:100%}@media(max-width:640px){.field-grid{grid-template-columns:minmax(0,1fr)}.attachments{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.attachment-tile{min-height:94px;padding:5px}.attachment-preview{height:66px}.attachment-upload .attachment-preview::before{width:30px;height:30px;font-size:24px}.attachment-filename{font-size:10px}.itinerary{padding-left:30px}.itinerary::before{left:6px}.stop{grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;align-items:center}.stop.from-row{grid-template-columns:minmax(0,1fr)}.stop-title{grid-column:1/-1;line-height:1.2}.stop input,.airport-code{height:56px;min-height:56px}.stop button.danger{grid-column:1/-1;width:64px;justify-self:start}.stop::before{left:-28.5px;top:calc(100% - 28px)}}
  </style>
</head>
<body>
<header><a class="brand" href="index.html">MUFC</a></header>
<main>
<section class="card"><h1>240-Hour Visa-Free Transit Verification</h1><div class="camera-wrap"><video id="preview" muted playsinline></video><div class="aim-box"></div></div><div class="actions"><button id="start" type="button">Start Scan</button><button class="secondary" id="stop" type="button">Stop</button></div><p class="status" id="status">Scan is optional. You can enter passenger details manually.</p></section>
<section class="card"><div class="form-title-row"><h2>240 Form</h2><button class="secondary" id="clearForm" type="button">Clear</button></div><form id="form"><div class="field-grid"><label>Passenger Name<input id="passengerName" required></label><label>Seat Number<input id="seatNumber" required></label><label>BN Number<input id="bnNumber" maxlength="3" inputmode="numeric" required></label><label>Passport Nationality Code<select id="nationalityCode" required></select></label><label>Passport Expiration Date<input id="passportExpiry" type="date" required><span class="error" id="passportError"></span></label></div><label>Whole itinerary</label><div class="itinerary" id="itinerary"></div><div class="actions"><button type="button" id="addStop">+ Add Stop</button></div><label>Attachments</label><div class="attachments" id="attachments"><div class="attachment-items" data-attachment-items></div><label class="attachment-tile attachment-upload"><span class="attachment-preview"></span><span class="attachment-filename">Add attachment</span><input id="attachmentInput" type="file" accept="image/*,.pdf" multiple></label></div><p class="error" id="itineraryError"></p><div class="actions"><button type="submit">Submit</button></div></form></section>
</main><div class="dialog-backdrop" id="dialog" hidden><div class="dialog-card"><h2 id="dialogTitle">Message</h2><p id="dialogMessage"></p><button id="dialogOk" type="button">OK</button></div></div>
<script>
const apiBase=(window.MU_API_BASE||'https://api.mufcapp.net').replace(/\/$/,'');
const zxingSources=['https://cdn.jsdelivr.net/npm/@zxing/browser@latest','https://unpkg.com/@zxing/browser@latest'];let zxingLoadPromise=null;function loadScannerLib(){if(window.ZXingBrowser)return Promise.resolve(window.ZXingBrowser);if(zxingLoadPromise)return zxingLoadPromise;zxingLoadPromise=zxingSources.reduce((promise,src)=>promise.catch(()=>new Promise((resolve,reject)=>{const script=document.createElement('script');script.src=src;script.async=true;script.onload=()=>window.ZXingBrowser?resolve(window.ZXingBrowser):reject(new Error('Scanner library unavailable.'));script.onerror=()=>reject(new Error('Scanner library load failed.'));document.head.appendChild(script)})),Promise.reject()).catch(err=>{zxingLoadPromise=null;throw err});return zxingLoadPromise}
const usAirports=`ATL ANC AUS BDL BNA BOS BWI CHS CLE CLT CMH CVG DAL DCA DEN DFW DTW EWR FLL HNL HOU IAD IAH IND JAX JFK LAS LAX LGA MCI MCO MDW MEM MIA MSP MSY OAK ONT ORD PBI PDX PHL PHX PIT RDU RSW SAN SAT SEA SFO SJC SLC SMF SNA STL TPA`.split(/\s+/);
const allowedChina=`PEK PKX TSN TVS YDK CDE SJW LCT BPE ZQZ XNT HDG DAT TYC TYN DDG DLC CHG SHE YKH JNZ CNI AOG HRB SHA PVG NKG NTG CZX XNY XUZ YTY WUX HIA YNZ LYG AZJ YIW NGB JDE HGH WNZ HSN JUZ HYN JUH HFE FDA AQG WHA FUG TXN SQJ XMN JJN WUS FOC LCX KHN JDZ DOY LYI WEH RIZ TNA JNG CBZ WEF YNT HZA TAO XAI NNY HQQ LYA CGO WDS YIH ENH WUH HPG SHS XFN EHU YYA CGD DYG HJJ LLF DXJ HNY WGN HCZ CSX FUO CAN HUZ MXZ SWA SZX ZHA ZUH LZL YJR HSC BHY NNG LZH KWL WUZ HCJ YLX SYX DXQ HAK BAR WXN WSK LIA YGA CKG CQW JIQ YBP CTU TFU LZO LPF ACX KJH AVA BFJ WMT LLB KWE ZYI TEN HZH LJG DLU NLH SYM WNH KMG JHG JMJ DFA AKA ENY UYN HZG XIY`.split(/\s+/);
const countryCodes='USA CAN ALB AND AUT BEL BIH BGR HRV CYP CZE DNK EST FIN FRA DEU GRC HUN ISL IRL ITA LVA LIE LTU LUX MLT MCO MNE NLD MKD NOR POL PRT ROU RUS SRB SVK SVN ESP SWE CHE GBR UKR ARG BRA CHL MEX BRN IDN JPN QAT SGP KOR ARE AUS NZL'.split(' ');
const nationality=document.querySelector('#nationalityCode'); countryCodes.forEach(c=>nationality.add(new Option(c,c)));
const statusEl=document.querySelector('#status'), preview=document.querySelector('#preview'), itineraryEl=document.querySelector('#itinerary'), attachmentsEl=document.querySelector('#attachments'), passErr=document.querySelector('#passportError'), itinErr=document.querySelector('#itineraryError');let controls=null,scanBusy=false,submitting=false;
function setStatus(t,c=''){statusEl.textContent=t;statusEl.className=`status ${c}`.trim()}function show(m,t='Message'){dialogTitle.textContent=t;dialogMessage.textContent=m;dialogOk.hidden=false;dialog.hidden=false}function showLoading(m='Submitting...'){dialogTitle.textContent='Submitting';dialogMessage.textContent=m;dialogOk.hidden=true;dialog.hidden=false}dialogOk.onclick=()=>dialog.hidden=true;
function parseScan(raw){const s=String(raw||'');const compact=s.replace(/\s+/g,' ');const seg=s.match(/(?:^|\D)(0*INF|0*\d{1,3}[A-Z])(\d{3,4})\b/i);const name=(s.match(/M1([A-Z][A-Z\/-]{2,40}?)(?:\s{2,}|[A-Z0-9]{6}\s|MU\s*\d{3,4})/i)?.[1]||'').replace(/\//g,' ').trim();return{passengerName:name,seatNumber:seg?(seg[1].toUpperCase().replace(/^0+(?=\d)/,'')):'',bnNumber:seg?seg[2].slice(-3):''}}
function fillScan(d){if(d.passengerName)passengerName.value=d.passengerName;if(d.seatNumber)seatNumber.value=d.seatNumber;if(d.bnNumber)bnNumber.value=d.bnNumber.slice(-3);setStatus(`Scanned BN ${d.bnNumber||''}`,'ok')}
function stopRow(v='',fixed=false,label='TO',needsDate=true){const row=document.createElement('div');row.className=`stop ${needsDate?'':'from-row'}`.trim();const dateCell=needsDate?'<input class="stop-date" type="date" required>':'';row.innerHTML=fixed?`<div class="stop-title">${label}</div>${dateCell}<div class="airport-code" data-code="${v}">${v}</div><button class="danger" type="button" hidden>−</button>`:`<div class="stop-title">${label}</div>${dateCell}<input class="stop-code" value="${v}" required><button class="danger" type="button">−</button>`;row.querySelector('button').onclick=()=>{row.remove();validateItinerary()};const codeInput=row.querySelector('.stop-code');if(codeInput)codeInput.oninput=e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z]/g,'');validateItinerary()};const dateInput=row.querySelector('.stop-date');if(dateInput)dateInput.onchange=validateItinerary;itineraryEl.appendChild(row)}
function resetItinerary(){itineraryEl.innerHTML='';stopRow('LAX',true,'From',false);stopRow('PVG',true,'TO',false);stopRow('',false,'TO')}
resetItinerary();addStop.onclick=()=>stopRow('',false,'TO');
const attachmentInput=document.querySelector('#attachmentInput'),attachmentItems=attachmentsEl.querySelector('[data-attachment-items]');let selectedAttachments=[];
function attachmentObjectUrl(img){return img?.dataset.objectUrl||''}
function clearAttachmentPreviews(){attachmentItems.querySelectorAll('img[data-object-url]').forEach(img=>URL.revokeObjectURL(attachmentObjectUrl(img)));attachmentItems.innerHTML='';selectedAttachments=[];if(attachmentInput)attachmentInput.value=''}
function createAttachmentTile(file,index){const tile=document.createElement('div');tile.className='attachment-tile attachment-thumb';const removeButton=document.createElement('button');removeButton.className='attachment-remove';removeButton.type='button';removeButton.setAttribute('aria-label',`Remove ${file.name}`);removeButton.textContent='×';removeButton.onclick=event=>{event.preventDefault();event.stopPropagation();selectedAttachments.splice(index,1);renderAttachmentPreviews()};const preview=document.createElement('span');preview.className='attachment-preview';if(file.type?.startsWith('image/')){const url=URL.createObjectURL(file),img=document.createElement('img');img.alt=file.name;img.dataset.objectUrl=url;img.src=url;preview.appendChild(img)}else{const icon=document.createElement('span');icon.className='attachment-document';icon.textContent='DOC';preview.appendChild(icon)}const filename=document.createElement('span');filename.className='attachment-filename';filename.textContent=file.name;tile.append(removeButton,preview,filename);return tile}
function renderAttachmentPreviews(){attachmentItems.querySelectorAll('img[data-object-url]').forEach(img=>URL.revokeObjectURL(attachmentObjectUrl(img)));attachmentItems.innerHTML='';selectedAttachments.forEach((file,index)=>attachmentItems.appendChild(createAttachmentTile(file,index)))}
attachmentInput.onchange=()=>{const files=Array.from(attachmentInput.files||[]);if(!files.length)return;selectedAttachments=[...selectedAttachments,...files];renderAttachmentPreviews();attachmentInput.value=''};
clearForm.onclick=()=>{if(submitting)return;passengerName.value='';seatNumber.value='';bnNumber.value='';nationality.selectedIndex=0;passportExpiry.value='';passErr.textContent='';itinErr.textContent='';resetItinerary();clearAttachmentPreviews();setStatus('Cleared. Manual entry is available.');dialog.hidden=true};
function values(){return [...itineraryEl.querySelectorAll('.stop-code,.airport-code')].map(i=>(i.value||i.dataset.code||'').trim().toUpperCase()).filter(Boolean)}
function itineraryDates(){return [...itineraryEl.querySelectorAll('.stop-date')].map(i=>i.value)}
function imageName(name){return String(name||'attachment.jpg').replace(/\.[^.]+$/, '')+'.jpg'}
function fileName(name){return String(name||'attachment').replace(/[^a-z0-9_.-]/gi,'_').slice(0,80)||'attachment'}
function readFile(file){return new Promise((resolve,reject)=>{if(!file.type?.startsWith('image/')){const rawReader=new FileReader();rawReader.onload=()=>resolve({name:fileName(file.name),type:file.type||'application/octet-stream',data:String(rawReader.result||'').split(',')[1]||''});rawReader.onerror=()=>reject(new Error('Attachment file load failed.'));rawReader.readAsDataURL(file);return}const reader=new FileReader();reader.onload=()=>{const img=new Image();img.onload=()=>{const max=1000,scale=Math.min(1,max/img.width,max/img.height),canvas=document.createElement('canvas');canvas.width=Math.max(1,Math.round(img.width*scale));canvas.height=Math.max(1,Math.round(img.height*scale));canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);resolve({name:imageName(file.name),type:'image/jpeg',data:canvas.toDataURL('image/jpeg',.6).split(',')[1]||''})};img.onerror=()=>reject(new Error('Attachment image load failed.'));img.src=String(reader.result)};reader.onerror=()=>reject(new Error('Attachment file load failed.'));reader.readAsDataURL(file)})}
async function attachments(){return Promise.all(selectedAttachments.map(readFile))}
function dateValue(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function validatePassport(){passErr.textContent='';if(!passportExpiry.value)return false;const min=new Date();min.setMonth(min.getMonth()+3);const exp=new Date(`${passportExpiry.value}T00:00:00Z`);if(exp<min){passErr.textContent='Passport must be valid for at least 3 months.';return false}return true}
function validateItinerary(){const fields=[...itineraryEl.querySelectorAll('input')];fields.forEach(i=>i.classList.remove('invalid'));const v=values();itinErr.textContent='';const dateFields=[...itineraryEl.querySelectorAll('.stop-date')];const emptyDate=dateFields.find(i=>!i.value);if(emptyDate){emptyDate.classList.add('invalid');itinErr.textContent='Please select dates for each destination stop.';return false}const outOfOrder=dateFields.find((field,index)=>index>0&&field.value<dateFields[index-1].value);if(outOfOrder){outOfOrder.classList.add('invalid');itinErr.textContent='Destination dates must be in chronological order.';return false}const finalDate=dateFields.at(-1);const maxFinal=new Date();maxFinal.setDate(maxFinal.getDate()+12);const maxFinalValue=dateValue(maxFinal);if(finalDate&&finalDate.value>=maxFinalValue){finalDate.classList.add('invalid');itinErr.textContent='Final destination date is over 10 days.';return false}const invalidCodeRows=[...itineraryEl.querySelectorAll('.stop')].filter(row=>{const code=(row.querySelector('.stop-code')?.value||row.querySelector('.airport-code')?.dataset.code||'').trim().toUpperCase();if(code.length!==3){row.querySelector('.stop-code')?.classList.add('invalid');return true}return false});if(invalidCodeRows.length){itinErr.textContent='Airport codes must be exactly 3 letters.';return false}const last=v[v.length-1]||'';const middleRows=[...itineraryEl.querySelectorAll('.stop')].slice(1,-1);const bad=[];middleRows.forEach(row=>{const code=(row.querySelector('.stop-code')?.value||row.querySelector('.airport-code')?.dataset.code||'').trim().toUpperCase();if(code&&!allowedChina.includes(code)){bad.push(code);row.querySelector('.stop-code')?.classList.add('invalid')}});if(bad.length){itinErr.textContent=`Not in whitelist: ${bad.join(', ')}`;return false}if(!last||allowedChina.includes(last)||last==='USA'||usAirports.includes(last)){itineraryEl.querySelectorAll('.stop-code').forEach((i,idx,arr)=>{if(idx===arr.length-1)i.classList.add('invalid')});itinErr.textContent='Final destination must be a third-country airport outside China and the United States.';return false}return true}passportExpiry.onchange=validatePassport;bnNumber.oninput=e=>{e.target.value=e.target.value.replace(/\D/g,'').slice(-3)};
form.onsubmit=async e=>{e.preventDefault();if(submitting)return;if(!validatePassport()|!validateItinerary())return;const submitButton=form.querySelector('button[type=submit]');try{submitting=true;if(submitButton)submitButton.disabled=true;setStatus('Submitting...');showLoading('Please wait. Do not submit again.');const payload={passengerName:passengerName.value.trim(),seatNumber:seatNumber.value.trim().toUpperCase(),bnNumber:bnNumber.value.trim(),nationalityCode:nationalityCode.value,passportExpiry:passportExpiry.value,itinerary:values(),itineraryDates:itineraryDates(),attachments:await attachments()};const res=await fetch(`${apiBase}/transit-240`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||'Submit failed');setStatus('Submitted.','ok');clearAttachmentPreviews();show('240 record submitted.','Success')}catch(err){const msg=String(err?.message||err||'Submit failed');const friendly=/load failed/i.test(msg)?'Submit failed. Please retry; if attachments are large, remove one and submit again.':msg;setStatus(friendly,'err');show(friendly,'Error')}finally{submitting=false;if(submitButton)submitButton.disabled=false}};
start.onclick=async()=>{try{const ZXing=await loadScannerLib();const Reader=ZXing.BrowserPDF417Reader||ZXing.BrowserMultiFormatReader;const reader=new Reader();controls=await reader.decodeFromConstraints({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false},preview,(result)=>{if(!result||scanBusy)return;scanBusy=true;fillScan(parseScan(result.getText()));setTimeout(()=>scanBusy=false,1600)});setStatus('Scanning')}catch(err){console.warn('Optional scan unavailable:',err);setStatus('Scanner unavailable. Manual entry is available.')}};stop.onclick=()=>{controls?.stop();controls=null;setStatus('Stopped. Manual entry is available.')};
</script></body></html>
