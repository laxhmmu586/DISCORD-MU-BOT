<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>240-hour visa-free transit application</title>
  <style>
    :root{--brand:#123a73;--line:#d7e1ec;--ink:#172033;--muted:#667085;--ok:#087443;--danger:#b42318;--rail:#2563eb}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,"Noto Sans SC",sans-serif;background:linear-gradient(135deg,#eaf4ff,#fdfefe);color:var(--ink)}header{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px clamp(18px,4vw,52px);background:rgba(255,255,255,.92);border-bottom:1px solid var(--line)}.brand{font-weight:900;color:var(--brand);letter-spacing:.08em;text-decoration:none}main{width:min(920px,94vw);margin:28px auto;display:grid;gap:18px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 42px rgba(22,48,76,.08);padding:22px}.camera-wrap{position:relative;overflow:hidden;border-radius:18px;background:#111}video{display:block;width:100%;max-height:50vh;background:#111;object-fit:cover}.aim-box{position:absolute;left:50%;top:50%;width:min(78%,560px);height:34%;transform:translate(-50%,-50%);border:3px solid rgba(255,255,255,.92);border-radius:18px;box-shadow:0 0 0 999px rgba(0,0,0,.28);pointer-events:none}button,a.button{border:0;border-radius:999px;padding:12px 18px;font-weight:850;cursor:pointer;background:var(--brand);color:white;text-decoration:none}button.secondary{background:#e8eef7;color:var(--brand)}button.danger{background:#fee4e2;color:var(--danger)}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}.status{min-height:28px;font-weight:900}.status.ok{color:var(--ok)}.status.err,.error{color:var(--danger)}.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;align-items:start}label{display:grid;gap:8px;min-width:0;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}.airport-code{min-height:56px;display:flex;align-items:center;font:inherit;font-weight:950;color:var(--ink)}input,select{width:100%;max-width:100%;min-width:0;height:56px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;color:var(--ink);font:inherit;font-weight:750;background:#fbfdff;-webkit-appearance:none;appearance:none}form{display:grid;gap:16px}.itinerary{position:relative;display:grid;gap:12px;margin-top:4px;padding-left:30px}.itinerary::before{content:"";position:absolute;left:9px;top:28px;bottom:28px;width:3px;border-radius:999px;background:var(--rail)}.stop{position:relative;display:grid;grid-template-columns:80px 160px minmax(0,1fr) auto;gap:12px;align-items:center;min-height:56px}.stop.from-row{grid-template-columns:80px minmax(0,1fr) auto}.stop::before{content:"";position:absolute;left:-27px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:999px;background:white;border:4px solid var(--rail);box-shadow:0 0 0 2px #fff}.stop input.invalid{border-color:var(--danger);background:#fff7f6}.stop-title{font-weight:950;color:var(--brand)}.help{margin:0;color:var(--muted);font-weight:750}.attachments{display:grid;gap:10px}.attachment-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center}.attachment-row input{padding:12px}.attachment-row button{height:44px;padding:10px 14px}.dialog-backdrop{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:22px;background:rgba(12,20,32,.48)}.dialog-backdrop[hidden]{display:none}.dialog-card{width:min(420px,92vw);border-radius:28px;background:rgba(255,255,255,.96);box-shadow:0 22px 70px rgba(0,0,0,.28);padding:28px;text-align:center}.dialog-card h2{margin:0 0 12px}.dialog-card p{white-space:pre-line;font-size:18px;font-weight:850}.dialog-card button{width:100%}@media(max-width:640px){.field-grid{grid-template-columns:minmax(0,1fr)}.attachment-row{grid-template-columns:minmax(0,1fr) auto}.itinerary{padding-left:30px}.itinerary::before{left:10px}.stop{grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;align-items:center}.stop.from-row{grid-template-columns:minmax(0,1fr)}.stop-title{grid-column:1/-1;line-height:1.2}.stop input,.airport-code{height:56px;min-height:56px}.stop button.danger{grid-column:1/-1;width:64px;justify-self:start}.stop::before{left:-28px;top:calc(100% - 28px)}}
  </style>
</head>
<body>
<header><a class="brand" href="index.html">MUFC</a></header>
<main>
<section class="card"><h1>240-hour visa-free transit application</h1><div class="camera-wrap"><video id="preview" muted playsinline></video><div class="aim-box"></div></div><div class="actions"><button id="start" type="button">Start Scan</button><button class="secondary" id="stop" type="button">Stop</button></div><p class="status" id="status">Ready.</p></section>
<section class="card"><h2>240 Form</h2><form id="form"><div class="field-grid"><label>Passenger Name<input id="passengerName" required></label><label>Seat Number<input id="seatNumber" required></label><label>BN Number<input id="bnNumber" maxlength="3" inputmode="numeric" required></label><label>Passport Nationality Code<select id="nationalityCode" required></select></label><label>Passport Expiration Date<input id="passportExpiry" type="date" required><span class="error" id="passportError"></span></label></div><label>Itinerary</label><div class="itinerary" id="itinerary"></div><label>Attachments</label><div class="attachments" id="attachments"></div><div class="actions"><button type="button" id="addAttachment">+ Attachment</button></div><p class="error" id="itineraryError"></p><div class="actions"><button type="button" id="addStop">+ Add Stop</button><button type="submit">Submit</button></div></form></section>
</main><div class="dialog-backdrop" id="dialog" hidden><div class="dialog-card"><h2 id="dialogTitle">Message</h2><p id="dialogMessage"></p><button id="dialogOk" type="button">OK</button></div></div>
<script src="https://unpkg.com/@zxing/browser@latest"></script>
<script>
const apiBase=(window.MU_API_BASE||'https://api.mufcapp.net').replace(/\/$/,'');
const usAirports=`ATL ANC AUS BDL BNA BOS BWI CHS CLE CLT CMH CVG DAL DCA DEN DFW DTW EWR FLL HNL HOU IAD IAH IND JAX JFK LAS LAX LGA MCI MCO MDW MEM MIA MSP MSY OAK ONT ORD PBI PDX PHL PHX PIT RDU RSW SAN SAT SEA SFO SJC SLC SMF SNA STL TPA`.split(/\s+/);
const allowedChina=`PEK PKX TSN TVS YDK CDE SJW LCT BPE ZQZ XNT HDG DAT TYC TYN DDG DLC CHG SHE YKH JNZ CNI AOG HRB SHA PVG NKG NTG CZX XNY XUZ YTY WUX HIA YNZ LYG AZJ YIW NGB JDE HGH WNZ HSN JUZ HYN JUH HFE FDA AQG WHA FUG TXN SQJ XMN JJN WUS FOC LCX KHN JDZ DOY LYI WEH RIZ TNA JNG CBZ WEF YNT HZA TAO XAI NNY HQQ LYA CGO WDS YIH ENH WUH HPG SHS XFN EHU YYA CGD DYG HJJ LLF DXJ HNY WGN HCZ CSX FUO CAN HUZ MXZ SWA SZX ZHA ZUH LZL YJR HSC BHY NNG LZH KWL WUZ HCJ YLX SYX DXQ HAK BAR WXN WSK LIA YGA CKG CQW JIQ YBP CTU TFU LZO LPF ACX KJH AVA BFJ WMT LLB KWE ZYI TEN HZH LJG DLU NLH SYM WNH KMG JHG JMJ DFA AKA ENY UYN HZG XIY`.split(/\s+/);
const countryCodes='USA CAN ALB AND AUT BEL BIH BGR HRV CYP CZE DNK EST FIN FRA DEU GRC HUN ISL IRL ITA LVA LIE LTU LUX MLT MCO MNE NLD MKD NOR POL PRT ROU RUS SRB SVK SVN ESP SWE CHE GBR UKR ARG BRA CHL MEX BRN IDN JPN QAT SGP KOR ARE AUS NZL'.split(' ');
const nationality=document.querySelector('#nationalityCode'); countryCodes.forEach(c=>nationality.add(new Option(c,c)));
const statusEl=document.querySelector('#status'), preview=document.querySelector('#preview'), itineraryEl=document.querySelector('#itinerary'), attachmentsEl=document.querySelector('#attachments'), passErr=document.querySelector('#passportError'), itinErr=document.querySelector('#itineraryError');let controls=null,scanBusy=false;
function setStatus(t,c=''){statusEl.textContent=t;statusEl.className=`status ${c}`.trim()}function show(m,t='Message'){dialogTitle.textContent=t;dialogMessage.textContent=m;dialog.hidden=false}dialogOk.onclick=()=>dialog.hidden=true;
function parseScan(raw){const s=String(raw||'');const compact=s.replace(/\s+/g,' ');const seg=s.match(/(?:^|\D)(0*INF|0*\d{1,3}[A-Z])(\d{3,4})\b/i);const name=(s.match(/M1([A-Z][A-Z\/-]{2,40}?)(?:\s{2,}|[A-Z0-9]{6}\s|MU\s*\d{3,4})/i)?.[1]||'').replace(/\//g,' ').trim();return{passengerName:name,seatNumber:seg?(seg[1].toUpperCase().replace(/^0+(?=\d)/,'')):'',bnNumber:seg?seg[2].slice(-3):''}}
function fillScan(d){if(d.passengerName)passengerName.value=d.passengerName;if(d.seatNumber)seatNumber.value=d.seatNumber;if(d.bnNumber)bnNumber.value=d.bnNumber.slice(-3);setStatus(`Scanned BN ${d.bnNumber||''}`,'ok')}
function stopRow(v='',fixed=false,label='TO',needsDate=true){const row=document.createElement('div');row.className=`stop ${needsDate?'':'from-row'}`.trim();const dateCell=needsDate?'<input class="stop-date" type="date" required>':'';row.innerHTML=fixed?`<div class="stop-title">${label}</div>${dateCell}<div class="airport-code" data-code="${v}">${v}</div><button class="danger" type="button" hidden>−</button>`:`<div class="stop-title">${label}</div>${dateCell}<input class="stop-code" value="${v}" maxlength="3" required><button class="danger" type="button">−</button>`;row.querySelector('button').onclick=()=>{row.remove();validateItinerary()};const codeInput=row.querySelector('.stop-code');if(codeInput)codeInput.oninput=e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z]/g,'').slice(0,3);validateItinerary()};const dateInput=row.querySelector('.stop-date');if(dateInput)dateInput.onchange=validateItinerary;itineraryEl.appendChild(row)}
stopRow('LAX',true,'From',false);stopRow('PVG',true,'TO',false);stopRow('',false,'TO');addStop.onclick=()=>stopRow('',false,'TO');
function attachmentRow(){const row=document.createElement('div');row.className='attachment-row';row.innerHTML='<input class="attachment-file" type="file" accept="image/*"><button class="danger" type="button">−</button>';row.querySelector('button').onclick=()=>row.remove();attachmentsEl.appendChild(row)}
attachmentRow();addAttachment.onclick=attachmentRow;
function values(){return [...itineraryEl.querySelectorAll('.stop-code,.airport-code')].map(i=>(i.value||i.dataset.code||'').trim().toUpperCase()).filter(Boolean)}
function itineraryDates(){return [...itineraryEl.querySelectorAll('.stop-date')].map(i=>i.value)}
function readFile(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve({name:file.name,type:file.type,data:String(reader.result).split(',')[1]||''});reader.onerror=()=>reject(reader.error);reader.readAsDataURL(file)})}
async function attachments(){const files=[...attachmentsEl.querySelectorAll('.attachment-file')].map(i=>i.files?.[0]).filter(Boolean);return Promise.all(files.map(readFile))}
function dateValue(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function validatePassport(){passErr.textContent='';if(!passportExpiry.value)return false;const min=new Date();min.setMonth(min.getMonth()+3);const exp=new Date(`${passportExpiry.value}T00:00:00Z`);if(exp<min){passErr.textContent='Passport must be valid for at least 3 months.';return false}return true}
function validateItinerary(){const fields=[...itineraryEl.querySelectorAll('input')];fields.forEach(i=>i.classList.remove('invalid'));const v=values();itinErr.textContent='';const dateFields=[...itineraryEl.querySelectorAll('.stop-date')];const emptyDate=dateFields.find(i=>!i.value);if(emptyDate){emptyDate.classList.add('invalid');itinErr.textContent='Please select dates for each destination stop.';return false}const outOfOrder=dateFields.find((field,index)=>index>0&&field.value<dateFields[index-1].value);if(outOfOrder){outOfOrder.classList.add('invalid');itinErr.textContent='Destination dates must be in chronological order.';return false}const finalDate=dateFields.at(-1);const maxFinal=new Date();maxFinal.setDate(maxFinal.getDate()+12);const maxFinalValue=dateValue(maxFinal);if(finalDate&&finalDate.value>=maxFinalValue){finalDate.classList.add('invalid');itinErr.textContent='Final destination date is over 10 days.';return false}const last=v[v.length-1]||'';const middleRows=[...itineraryEl.querySelectorAll('.stop')].slice(1,-1);const bad=[];middleRows.forEach(row=>{const code=(row.querySelector('.stop-code')?.value||row.querySelector('.airport-code')?.dataset.code||'').trim().toUpperCase();if(code&&!allowedChina.includes(code)){bad.push(code);row.querySelector('.stop-code')?.classList.add('invalid')}});if(bad.length){itinErr.textContent=`Not in whitelist: ${bad.join(', ')}`;return false}if(!last||allowedChina.includes(last)||last==='USA'||usAirports.includes(last)){itineraryEl.querySelectorAll('.stop-code').forEach((i,idx,arr)=>{if(idx===arr.length-1)i.classList.add('invalid')});itinErr.textContent='Final destination must be a third-country airport outside China and the United States.';return false}return true}passportExpiry.onchange=validatePassport;bnNumber.oninput=e=>{e.target.value=e.target.value.replace(/\D/g,'').slice(-3)};
form.onsubmit=async e=>{e.preventDefault();if(!validatePassport()|!validateItinerary())return;try{setStatus('Submitting...');const payload={passengerName:passengerName.value.trim(),seatNumber:seatNumber.value.trim().toUpperCase(),bnNumber:bnNumber.value.trim(),nationalityCode:nationalityCode.value,passportExpiry:passportExpiry.value,itinerary:values(),itineraryDates:itineraryDates(),attachments:await attachments()};const res=await fetch(`${apiBase}/transit-240`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||'Submit failed');setStatus('Submitted.','ok');show('240 record submitted.','Success')}catch(err){setStatus(err.message,'err');show(err.message,'Error')}};
start.onclick=async()=>{try{if(!window.ZXingBrowser)throw new Error('ZXing library did not load.');const Reader=ZXingBrowser.BrowserPDF417Reader||ZXingBrowser.BrowserMultiFormatReader;const reader=new Reader();controls=await reader.decodeFromConstraints({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false},preview,(result)=>{if(!result||scanBusy)return;scanBusy=true;fillScan(parseScan(result.getText()));setTimeout(()=>scanBusy=false,1600)});setStatus('Scanning')}catch(err){setStatus(err.message,'err');show(err.message)}};stop.onclick=()=>{controls?.stop();controls=null;setStatus('Stopped.')};
</script></body></html>
