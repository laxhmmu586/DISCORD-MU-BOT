<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-label="Static high-resolution above-cloud sky background with no aircraft">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#031020"/>
      <stop offset="0.28" stop-color="#092943"/>
      <stop offset="0.50" stop-color="#2d5a7a"/>
      <stop offset="0.66" stop-color="#b98d7f"/>
      <stop offset="0.82" stop-color="#5e3c5b"/>
      <stop offset="1" stop-color="#06101d"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="20%" cy="68%" r="44%">
      <stop offset="0" stop-color="#ffc58f" stop-opacity="0.72"/>
      <stop offset="0.28" stop-color="#ed9368" stop-opacity="0.25"/>
      <stop offset="0.72" stop-color="#315f8a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coolGlow" cx="82%" cy="28%" r="52%">
      <stop offset="0" stop-color="#4ea6d6" stop-opacity="0.32"/>
      <stop offset="0.5" stop-color="#164567" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#06101d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloudLight" cx="36%" cy="24%" r="85%">
      <stop offset="0" stop-color="#fff5e8"/>
      <stop offset="0.58" stop-color="#cad5e4"/>
      <stop offset="1" stop-color="#7f99b7"/>
    </radialGradient>
    <filter id="softCloud" x="-20%" y="-40%" width="140%" height="200%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.018" numOctaves="4" seed="586" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="48" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="wisps" x="-10%" y="-20%" width="120%" height="160%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.04" numOctaves="3" seed="901"/>
      <feDisplacementMap in="SourceGraphic" scale="32"/>
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#020a12" stop-opacity="0.30"/>
      <stop offset="0.42" stop-color="#020a12" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#020a12" stop-opacity="0.72"/>
    </linearGradient>
  </defs>

  <rect width="3840" height="2160" fill="url(#sky)"/>
  <rect width="3840" height="2160" fill="url(#sunGlow)"/>
  <rect width="3840" height="2160" fill="url(#coolGlow)"/>

  <g filter="url(#wisps)" opacity="0.36" fill="#e8f4ff">
    <ellipse cx="650" cy="515" rx="680" ry="64"/>
    <ellipse cx="1780" cy="430" rx="840" ry="72" opacity="0.52"/>
    <ellipse cx="3020" cy="610" rx="760" ry="66" opacity="0.42"/>
  </g>

  <g filter="url(#softCloud)" fill="url(#cloudLight)">
    <ellipse cx="140" cy="1540" rx="650" ry="200" opacity="0.82"/>
    <ellipse cx="620" cy="1490" rx="780" ry="250" opacity="0.95"/>
    <ellipse cx="1120" cy="1585" rx="760" ry="240" opacity="0.88"/>
    <ellipse cx="1660" cy="1495" rx="900" ry="285" opacity="0.92"/>
    <ellipse cx="2240" cy="1580" rx="820" ry="250" opacity="0.90"/>
    <ellipse cx="2840" cy="1510" rx="900" ry="280" opacity="0.86"/>
    <ellipse cx="3440" cy="1610" rx="780" ry="245" opacity="0.84"/>
    <ellipse cx="760" cy="1780" rx="1280" ry="300" opacity="0.76"/>
    <ellipse cx="2040" cy="1840" rx="1380" ry="330" opacity="0.82"/>
    <ellipse cx="3260" cy="1830" rx="1260" ry="310" opacity="0.78"/>
  </g>

  <g filter="url(#softCloud)" fill="#f9efe2" opacity="0.38">
    <ellipse cx="330" cy="1360" rx="480" ry="118"/>
    <ellipse cx="1350" cy="1320" rx="520" ry="126"/>
    <ellipse cx="2490" cy="1365" rx="560" ry="132"/>
    <ellipse cx="3470" cy="1390" rx="430" ry="112"/>
  </g>

  <rect width="3840" height="2160" fill="#020a12" opacity="0.18"/>
  <rect width="3840" height="2160" fill="url(#vignette)"/>
</svg>
