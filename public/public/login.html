<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MUFC Login</title>
    <style>
      :root {
        --bg: #020a12;
        --panel: rgba(6, 20, 34, 0.72);
        --line: rgba(176, 216, 255, 0.24);
        --text: #f3f7fb;
        --muted: #98a8b8;
        --blue: #58a7ff;
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      body {
        position: relative;
        isolation: isolate;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: transparent;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        pointer-events: none;
      }

      body::before {
        inset: 0;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 22rem),
          linear-gradient(90deg, rgba(0, 0, 0, 0.24), transparent 34%, transparent 66%, rgba(0, 0, 0, 0.36));
        z-index: -1;
      }

      body::after {
        inset: -6vmax;
        background: url("assets/space-earth-night-4k.svg") center / cover no-repeat;
        transform-origin: 50% 82%;
        animation: slowEarthTurn 96s linear infinite alternate;
        z-index: -2;
      }

      @keyframes slowEarthTurn {
        from {
          transform: scale(1.04) rotate(-0.75deg) translate3d(-1.2%, 0, 0);
        }
        to {
          transform: scale(1.08) rotate(0.75deg) translate3d(1.2%, -0.6%, 0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body::after {
          animation: none;
          transform: scale(1.05);
        }
      }

      .login-card {
        position: relative;
        z-index: 1;
        width: min(360px, calc(100vw - 40px));
        padding: 28px;
        border: 1px solid var(--line);
        background: linear-gradient(150deg, rgba(9, 28, 48, 0.78), rgba(2, 12, 22, 0.66));
        box-shadow: 0 30px 110px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(18px);
        animation: fadeUp 560ms ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }

      .brand svg {
        width: 25px;
        height: 25px;
        color: #8bbcff;
      }

      .brand strong {
        font-size: 30px;
        line-height: 1;
        letter-spacing: 4px;
      }

      .subhead {
        margin: 8px 0 22px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.8px;
      }

      .field {
        display: block;
        margin-bottom: 12px;
      }

      .field input {
        width: 100%;
        height: 42px;
        border: 1px solid rgba(210, 231, 255, 0.2);
        border-radius: 0;
        padding: 0 13px;
        outline: 0;
        background: rgba(227, 237, 251, 0.96);
        color: #071327;
        font: inherit;
        font-size: 12px;
      }

      .field input:focus {
        border-color: rgba(88, 167, 255, 0.9);
        box-shadow: 0 0 0 3px rgba(88, 167, 255, 0.18);
      }

      .login-button {
        width: 100%;
        height: 44px;
        margin-top: 4px;
        border: 1px solid rgba(88, 167, 255, 0.72);
        border-radius: 0;
        background: linear-gradient(180deg, #3376ff, #245fe6);
        color: white;
        font: inherit;
        font-size: 13px;
        font-weight: 900;
        cursor: pointer;
      }

      .login-button:hover:not(:disabled) {
        background: linear-gradient(180deg, #4382ff, #2d67ee);
      }

      .login-button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .login-status {
        min-height: 18px;
        margin: 12px 0 0;
        color: #ffb4ae;
        font-size: 12px;
        line-height: 1.5;
      }

      .login-status.is-info {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="login-card" aria-label="Login">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 13.5h18M10 4l4 9-4 7M5.5 8.5l2.5 5-2.5 4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <strong>MUFC</strong>
      </div>
      <p class="subhead">Internal Access Only</p>
      <form id="login-form" method="post" autocomplete="on" novalidate>
        <label class="field">
          <input id="email" name="email" type="email" autocomplete="username" aria-label="Email" required />
        </label>
        <label class="field">
          <input id="password" name="password" type="password" autocomplete="current-password" aria-label="Password" required />
        </label>
        <button class="login-button" type="submit">Login</button>
        <p class="login-status is-info" role="status" aria-live="polite">Connecting to Firebase...</p>
      </form>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script>
      const form = document.querySelector("#login-form");
      const emailInput = document.querySelector("#email");
      const passwordInput = document.querySelector("#password");
      const submitButton = document.querySelector(".login-button");
      const statusText = document.querySelector(".login-status");

      function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.classList.toggle("is-info", !isError);
      }

      const APP_ENTRY_KEY = "mufc_allow_app_entry";

      function allowAppEntry() {
        sessionStorage.setItem(APP_ENTRY_KEY, String(Date.now()));
      }

      function getRedirectTarget() {
        const params = new URLSearchParams(window.location.search);
        const rawNext = params.get("next") || "index.html";
        try {
          const url = new URL(rawNext, window.location.href);
          if (url.origin === window.location.origin) {
            return url.href;
          }
        } catch (error) {
          // Fall back to the app home page when the next URL is invalid.
        }
        return new URL("index.html", window.location.href).href;
      }

      function friendlyAuthError(error) {
        switch (error?.code) {
          case "auth/invalid-email":
            return "Email format is invalid.";
          case "auth/invalid-credential":
          case "auth/user-not-found":
          case "auth/wrong-password":
            return "Email or password is incorrect.";
          case "auth/too-many-requests":
            return "Too many attempts. Please wait and try again.";
          case "auth/network-request-failed":
            return "Cannot reach Firebase. Please check the network and try again.";
          default:
            return error?.message || "Firebase login failed. Please try again.";
        }
      }

      function enableForm() {
        submitButton.disabled = false;
        setStatus("Ready to sign in.");
      }

      if (!window.firebase?.apps?.length || !window.firebase?.auth) {
        submitButton.disabled = true;
        setStatus("Firebase is not connected. Open this page from Firebase Hosting and redeploy if this continues.", true);
      } else {
        const auth = firebase.auth();
        let forceLogin = new URLSearchParams(window.location.search).has("forceLogin");
        auth.onAuthStateChanged(async (user) => {
          if (user && !forceLogin) {
            allowAppEntry();
            window.location.replace(getRedirectTarget());
            return;
          }
          if (user && forceLogin) {
            forceLogin = false;
            await auth.signOut();
          }
          enableForm();
        });

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          forceLogin = false;
          submitButton.disabled = true;
          setStatus("Signing in...");
          try {
            await auth.signInWithEmailAndPassword(emailInput.value.trim(), passwordInput.value);
          } catch (error) {
            submitButton.disabled = false;
            setStatus(friendlyAuthError(error), true);
          }
        });
      }
    </script>
  </body>
</html>
