<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MUFC Login</title>
    <style>
      :root {
        --bg: #020a12;
        --panel: rgba(6, 20, 34, 0.72);
        --line: rgba(176, 216, 255, 0.24);
        --text: #f3f7fb;
        --muted: #98a8b8;
        --blue: #58a7ff;
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #01050b;
        isolation: isolate;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: url("assets/earth-night-background.png");
        background-position: center;
        background-repeat: no-repeat;
        background-size: max(100vw, 177.78vh) auto;
        filter: saturate(1.08) contrast(1.08);
        transform: translate3d(0, 0, 0) scale(1.018);
        transform-origin: 64% 62%;
        animation: orbitalDrift 72s ease-in-out infinite alternate;
        backface-visibility: hidden;
        will-change: transform;
        z-index: -2;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 72% 58%, rgba(66, 151, 255, 0.2), transparent 24rem),
          radial-gradient(circle at 50% 110%, rgba(15, 75, 122, 0.28), transparent 34rem),
          linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 22rem),
          linear-gradient(90deg, rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.18) 48%, rgba(0, 0, 0, 0.42) 100%),
          linear-gradient(115deg, rgba(3, 10, 18, 0.18), rgba(1, 5, 10, 0.5));
        z-index: -1;
      }

      @keyframes orbitalDrift {
        from {
          transform: translate3d(-0.35vw, -0.15vh, 0) scale(1.018) rotate(-0.05deg);
        }
        to {
          transform: translate3d(0.35vw, 0.25vh, 0) scale(1.032) rotate(0.18deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body::before {
          animation: none;
          transform: translate3d(0, 0, 0) scale(1.018);
        }
      }

      .login-card {
        position: relative;
        z-index: 1;
        width: min(360px, calc(100vw - 40px));
        padding: 28px;
        border: 1px solid var(--line);
        background: linear-gradient(150deg, rgba(9, 28, 48, 0.78), rgba(2, 12, 22, 0.66));
        box-shadow: 0 30px 110px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(18px);
        animation: fadeUp 560ms ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }

      .brand svg {
        width: 25px;
        height: 25px;
        color: #8bbcff;
      }

      .brand strong {
        font-size: 30px;
        line-height: 1;
        letter-spacing: 4px;
      }

      .subhead {
        margin: 8px 0 22px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.8px;
      }

      .field {
        display: block;
        margin-bottom: 12px;
      }

      .field input {
        width: 100%;
        height: 42px;
        border: 1px solid rgba(210, 231, 255, 0.2);
        border-radius: 0;
        padding: 0 13px;
        outline: 0;
        background: rgba(227, 237, 251, 0.96);
        color: #071327;
        font: inherit;
        font-size: 12px;
      }

      .field input:focus {
        border-color: rgba(88, 167, 255, 0.9);
        box-shadow: 0 0 0 3px rgba(88, 167, 255, 0.18);
      }

      .password-field {
        position: relative;
      }

      .password-field input {
        padding-right: 48px;
      }

      .password-toggle {
        position: absolute;
        top: 50%;
        right: 9px;
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        transform: translateY(-50%);
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #3b4c72;
        cursor: pointer;
      }

      .password-toggle:hover,
      .password-toggle:focus-visible {
        background: rgba(88, 167, 255, 0.16);
        color: #142047;
        outline: 0;
      }

      .password-toggle svg {
        width: 20px;
        height: 20px;
      }

      .password-toggle .eye-off {
        display: none;
      }

      .password-toggle[aria-pressed="true"] .eye-on {
        display: none;
      }

      .password-toggle[aria-pressed="true"] .eye-off {
        display: block;
      }

      .login-button {
        width: 100%;
        height: 44px;
        margin-top: 4px;
        border: 1px solid rgba(88, 167, 255, 0.72);
        border-radius: 0;
        background: linear-gradient(180deg, #3376ff, #245fe6);
        color: white;
        font: inherit;
        font-size: 13px;
        font-weight: 900;
        cursor: pointer;
      }

      .login-button:hover:not(:disabled) {
        background: linear-gradient(180deg, #4382ff, #2d67ee);
      }

      .login-button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .login-status {
        min-height: 18px;
        margin: 12px 0 0;
        color: #ffb4ae;
        font-size: 12px;
        line-height: 1.5;
      }

      .login-status.is-info {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="login-card" aria-label="Login">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 13.5h18M10 4l4 9-4 7M5.5 8.5l2.5 5-2.5 4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <strong>MUFC</strong>
      </div>
      <p class="subhead">Internal Access Only</p>
      <form id="login-form" method="post" autocomplete="on" novalidate>
        <label class="field">
          <input id="email" name="email" type="email" autocomplete="username" aria-label="Email" required />
        </label>
        <label class="field password-field">
          <input id="password" name="password" type="password" autocomplete="current-password" aria-label="Password" required />
          <button class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
            <svg class="eye-on" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M2.5 12s3.4-6 9.5-6 9.5 6 9.5 6-3.4 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.9"/></svg>
            <svg class="eye-off" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 3l18 18" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="M10.6 6.2c.45-.12.92-.2 1.4-.2 6.1 0 9.5 6 9.5 6a17.3 17.3 0 0 1-3 3.65M6.2 7.8A17.4 17.4 0 0 0 2.5 12s3.4 6 9.5 6c1.55 0 2.9-.39 4.05-.97" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.9 9.9A3 3 0 0 0 14.1 14.1" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
          </button>
        </label>
        <button class="login-button" type="submit">Login</button>
        <p class="login-status is-info" role="status" aria-live="polite">Connecting to Firebase...</p>
      </form>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script>
      const form = document.querySelector("#login-form");
      const emailInput = document.querySelector("#email");
      const passwordInput = document.querySelector("#password");
      const submitButton = document.querySelector(".login-button");
      const passwordToggle = document.querySelector(".password-toggle");
      const statusText = document.querySelector(".login-status");

      function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.classList.toggle("is-info", !isError);
      }

      passwordToggle.addEventListener("click", () => {
        const shouldShow = passwordInput.type === "password";
        passwordInput.type = shouldShow ? "text" : "password";
        passwordToggle.setAttribute("aria-pressed", String(shouldShow));
        passwordToggle.setAttribute("aria-label", shouldShow ? "Hide password" : "Show password");
        passwordInput.focus();
      });

      const APP_ENTRY_KEY = "mufc_allow_app_entry";
      const AUTH_SESSION_STARTED_KEY = "mufc_auth_session_started_at";
      const AUTH_LAST_ACTIVITY_KEY = "mufc_auth_last_activity_at";

      function authStorage() {
        return window.localStorage || window.sessionStorage;
      }

      function allowAppEntry() {
        const now = String(Date.now());
        authStorage().setItem(APP_ENTRY_KEY, now);
        authStorage().setItem(AUTH_SESSION_STARTED_KEY, now);
        authStorage().setItem(AUTH_LAST_ACTIVITY_KEY, now);
      }

      function getRedirectTarget() {
        const next = new URLSearchParams(window.location.search).get("next");
        if (next && next.startsWith("/") && !next.startsWith("//")) return new URL(next, window.location.origin).href;
        return new URL("index.html", window.location.href).href;
      }

      function friendlyAuthError(error) {
        switch (error?.code) {
          case "auth/invalid-email":
            return "Email format is invalid.";
          case "auth/invalid-credential":
          case "auth/user-not-found":
          case "auth/wrong-password":
            return "Email or password is incorrect.";
          case "auth/too-many-requests":
            return "Too many attempts. Please wait and try again.";
          case "auth/network-request-failed":
            return "Cannot reach Firebase. Please check the network and try again.";
          default:
            return error?.message || "Firebase login failed. Please try again.";
        }
      }

      function enableForm() {
        submitButton.disabled = false;
        setStatus("Ready to sign in.");
      }

      if (!window.firebase?.apps?.length || !window.firebase?.auth) {
        submitButton.disabled = true;
        setStatus("Firebase is not connected. Open this page from Firebase Hosting and redeploy if this continues.", true);
      } else {
        const auth = firebase.auth();
        let forceLogin = new URLSearchParams(window.location.search).has("forceLogin");
        let interactiveLogin = false;
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});
        auth.onAuthStateChanged(async (user) => {
          if (user && !forceLogin) {
            allowAppEntry();
            window.location.replace(getRedirectTarget(user));
            return;
          }
          if (user && forceLogin) {
            forceLogin = false;
            await auth.signOut();
          }
          enableForm();
        });

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          forceLogin = false;
          interactiveLogin = true;
          submitButton.disabled = true;
          setStatus("Signing in...");
          try {
            await auth.signInWithEmailAndPassword(emailInput.value.trim(), passwordInput.value);
          } catch (error) {
            interactiveLogin = false;
            submitButton.disabled = false;
            setStatus(friendlyAuthError(error), true);
          }
        });
      }
    </script>
  </body>
</html>
