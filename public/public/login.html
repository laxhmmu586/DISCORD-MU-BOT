<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    MUFC Login
  </title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;
      padding: 0;

      background: #0f172a;

      color: white;

      font-family:
        Arial,
        sans-serif;

      min-height: 100vh;

      display: flex;

      justify-content: center;
    }

    .container {

      width: 100%;

      max-width: 460px;

      padding: 20px;
    }

    .title {

      font-size: 30px;

      font-weight: bold;

      margin-bottom: 6px;
    }

    .subtitle {

      color: #94a3b8;

      font-size: 14px;

      margin-bottom: 24px;

      line-height: 1.5;
    }

    .login-card {

      background: #111827;

      border-radius: 20px;

      padding: 20px;

      box-shadow:
        0 0 25px rgba(0,0,0,0.35);

      margin-top: 60px;
    }

    input {

      width: 100%;

      padding: 14px;

      margin-bottom: 14px;

      border: none;

      border-radius: 14px;

      background: #1e293b;

      color: white;

      font-size: 15px;
    }

    button {

      border: none;

      background: #2563eb;

      color: white;

      border-radius: 14px;

      padding: 14px;

      font-size: 15px;

      cursor: pointer;

      width: 100%;
    }

    button:hover {

      background: #1d4ed8;
    }

    .error {

      display: none;

      background: #7f1d1d;

      border-radius: 12px;

      padding: 12px;

      margin-top: 15px;

      font-size: 14px;
    }


    body {
      background:
        radial-gradient(circle at 12% 6%, rgba(37,99,235,.18), transparent 26rem),
        radial-gradient(circle at 94% 0%, rgba(20,184,166,.13), transparent 24rem),
        linear-gradient(135deg, #06101e 0%, #061827 52%, #041320 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      align-items: center;
    }

    .container { max-width: 500px; }

    .login-card {
      margin-top: 0;
      padding: 34px;
      border: 1px solid rgba(77,112,148,.54);
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(13,34,56,.92), rgba(7,24,39,.92));
      box-shadow: 0 28px 70px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(14px);
    }

    .title {
      font-size: 36px;
      letter-spacing: .8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .title::before {
      content: '';
      width: 44px;
      height: 14px;
      border-radius: 999px 999px 999px 0;
      background: linear-gradient(90deg, #f8fafc, #7dd3fc);
      box-shadow: 0 0 24px rgba(125,211,252,.32);
      transform: skewX(-18deg);
    }

    .eyebrow {
      color:#7dd3fc;
      font-size:11px;
      font-weight:900;
      letter-spacing:2.8px;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .subtitle { color:#a7b4c6; margin-bottom:28px; text-transform:uppercase; letter-spacing:.8px; }

    input {
      background: rgba(7,24,39,.86);
      border: 1px solid rgba(77,112,148,.58);
      border-radius: 12px;
      padding: 15px 16px;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    input:focus {
      border-color: rgba(96,165,250,.8);
      box-shadow: 0 0 0 3px rgba(96,165,250,.16);
      background: rgba(10,29,49,.98);
    }

    button {
      margin-top: 4px;
      border: 1px solid rgba(96,165,250,.58);
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      font-weight: 900;
      letter-spacing: .2px;
      box-shadow: 0 16px 34px rgba(37,99,235,.24);
    }

    button:hover { background: linear-gradient(135deg, #3b82f6, #2563eb); }

    .error {
      border: 1px solid rgba(248,113,113,.45);
      background: rgba(127,29,29,.58);
      color: #fecaca;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="login-card">

      <div class="eyebrow">MUFC OPERATIONS</div>

      <div class="title">
        SY Search
      </div>

      <div class="subtitle">
        Internal access for today's SY flight console.
      </div>

      <input
        id="email"
        type="email"
        placeholder="Email"
      >

      <input
        id="password"
        type="password"
        placeholder="Password"
      >

      <button onclick="login()">
        Login
      </button>

      <div
        id="msg"
        class="error"
      ></div>

    </div>

  </div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  setPersistence,
  browserSessionPersistence
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

  apiKey: "AIzaSyAWsXBuQJTBmNKi6gLgnkZUZ4OfK1IRuXo",

  authDomain: "china-eastern.firebaseapp.com",

  projectId: "china-eastern",

  storageBucket: "china-eastern.firebasestorage.app",

  messagingSenderId: "30017158772",

  appId: "1:30017158772:web:874a69fdb75b8d3d315b21",

  measurementId: "G-22T9MHC42Y"
};

const app =
  initializeApp(firebaseConfig);

const auth =
  getAuth(app);

function getRedirectPage() {
  return "index.html";
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = getRedirectPage();
  }
});

window.login = async function () {

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value.trim();

  const msg =
    document.getElementById("msg");

  try {

    msg.style.display = "none";

    await setPersistence(
      auth,
      browserSessionPersistence
    );

    const userCredential =
      await signInWithEmailAndPassword(
        auth,
        email,
        password
      );

    window.location.href =
      getRedirectPage();

  } catch (error) {

    msg.innerText =
      error.message;

    msg.style.display =
      "block";
  }
};

</script>

</body>
</html>
