<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MUFC Login</title>
    <style>
      :root {
        --bg: #020a12;
        --panel: rgba(6, 20, 34, 0.72);
        --line: rgba(176, 216, 255, 0.24);
        --text: #f3f7fb;
        --muted: #98a8b8;
        --blue: #58a7ff;
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 70% 18%, rgba(18, 91, 104, 0.24), transparent 34rem),
          radial-gradient(circle at 48% 56%, rgba(21, 48, 82, 0.28), transparent 34rem),
          linear-gradient(115deg, #071327 0%, #04121e 48%, #020b12 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 22rem),
          linear-gradient(90deg, rgba(0, 0, 0, 0.24), transparent 34%, transparent 66%, rgba(0, 0, 0, 0.36));
      }

      .login-card {
        position: relative;
        z-index: 1;
        width: min(360px, calc(100vw - 40px));
        padding: 28px;
        border: 1px solid var(--line);
        background: linear-gradient(150deg, rgba(9, 28, 48, 0.78), rgba(2, 12, 22, 0.66));
        box-shadow: 0 30px 110px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(18px);
        animation: fadeUp 560ms ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }

      .brand svg {
        width: 25px;
        height: 25px;
        color: #8bbcff;
      }

      .brand strong {
        font-size: 30px;
        line-height: 1;
        letter-spacing: 4px;
      }

      .subhead {
        margin: 8px 0 22px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.8px;
      }

      .field {
        display: block;
        margin-bottom: 12px;
      }

      .field input {
        width: 100%;
        height: 42px;
        border: 1px solid rgba(210, 231, 255, 0.2);
        border-radius: 0;
        padding: 0 13px;
        outline: 0;
        background: rgba(227, 237, 251, 0.96);
        color: #071327;
        font: inherit;
        font-size: 12px;
      }

      .field input:focus {
        border-color: rgba(88, 167, 255, 0.9);
        box-shadow: 0 0 0 3px rgba(88, 167, 255, 0.18);
      }

      .login-button {
        width: 100%;
        height: 44px;
        margin-top: 4px;
        border: 1px solid rgba(88, 167, 255, 0.72);
        border-radius: 0;
        background: linear-gradient(180deg, #3376ff, #245fe6);
        color: white;
        font: inherit;
        font-size: 13px;
        font-weight: 900;
        cursor: pointer;
      }

      .login-button:hover {
        background: linear-gradient(180deg, #4382ff, #2d67ee);
      }
    </style>
  </head>
  <body>
    <main class="login-card" aria-label="Login">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 13.5h18M10 4l4 9-4 7M5.5 8.5l2.5 5-2.5 4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <strong>MUFC</strong>
      </div>
      <p class="subhead">Internal Access Only</p>
      <label class="field">
        <input type="email" value="lake@mu.com" aria-label="Email" />
      </label>
      <label class="field">
        <input type="password" value="password" aria-label="Password" />
      </label>
      <button class="login-button" type="button">Login</button>
    </main>
  </body>
</html>
