<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    MUFC Login
  </title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;
      padding: 0;

      background: #0f172a;

      color: white;

      font-family:
        Arial,
        sans-serif;

      min-height: 100vh;

      display: flex;

      justify-content: center;
    }

    .container {

      width: 100%;

      max-width: 460px;

      padding: 20px;
    }

    .title {

      font-size: 30px;

      font-weight: bold;

      margin-bottom: 6px;
    }

    .subtitle {

      color: #94a3b8;

      font-size: 14px;

      margin-bottom: 24px;

      line-height: 1.5;
    }

    .login-card {

      background: #111827;

      border-radius: 20px;

      padding: 20px;

      box-shadow:
        0 0 25px rgba(0,0,0,0.35);

      margin-top: 60px;
    }

    input {

      width: 100%;

      padding: 14px;

      margin-bottom: 14px;

      border: none;

      border-radius: 14px;

      background: #1e293b;

      color: white;

      font-size: 15px;
    }

    button {

      border: none;

      background: #2563eb;

      color: white;

      border-radius: 14px;

      padding: 14px;

      font-size: 15px;

      cursor: pointer;

      width: 100%;
    }

    button:hover {

      background: #1d4ed8;
    }

    .error {

      display: none;

      background: #7f1d1d;

      border-radius: 12px;

      padding: 12px;

      margin-top: 15px;

      font-size: 14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="login-card">

      <div class="title">
        MUFC
      </div>

      <div class="subtitle">
        Internal Access Only
      </div>

      <input
        id="email"
        type="email"
        placeholder="Email"
      >

      <input
        id="password"
        type="password"
        placeholder="Password"
      >

      <button onclick="login()">
        Login
      </button>

      <div
        id="msg"
        class="error"
      ></div>

    </div>

  </div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  setPersistence,
  browserSessionPersistence
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

  apiKey: "AIzaSyAWsXBuQJTBmNKi6gLgnkZUZ4OfK1IRuXo",

  authDomain: "china-eastern.firebaseapp.com",

  projectId: "china-eastern",

  storageBucket: "china-eastern.firebasestorage.app",

  messagingSenderId: "30017158772",

  appId: "1:30017158772:web:874a69fdb75b8d3d315b21",

  measurementId: "G-22T9MHC42Y"
};

const app =
  initializeApp(firebaseConfig);

const auth =
  getAuth(app);

const LOUNGE_UID = "HEZseqRWLSbZrAV8BLBcEc7yJwe2";

function getRedirectPage(user) {
  return user?.uid === LOUNGE_UID ? "lounge.html" : "index.html";
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = getRedirectPage(user);
  }
});

window.login = async function () {

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value.trim();

  const msg =
    document.getElementById("msg");

  try {

    msg.style.display = "none";

    await setPersistence(
      auth,
      browserSessionPersistence
    );

    const userCredential =
      await signInWithEmailAndPassword(
        auth,
        email,
        password
      );

    window.location.href =
      getRedirectPage(userCredential.user);

  } catch (error) {

    msg.innerText =
      error.message;

    msg.style.display =
      "block";
  }
};

</script>

</body>
</html>
