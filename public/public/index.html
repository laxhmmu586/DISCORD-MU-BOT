<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    MUFC System
  </title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;
      padding: 0;

      background: #0f172a;

      color: white;

      font-family:
        Arial,
        sans-serif;

      min-height: 100vh;

      display: flex;

      justify-content: center;
    }

    .container {

      width: 100%;

      max-width: 640px;

      padding: 20px;
    }

    .title {

      font-size: 30px;

      font-weight: bold;

      margin-bottom: 6px;
    }

    .subtitle {

      color: #94a3b8;

      font-size: 14px;

      margin-bottom: 24px;

      line-height: 1.5;
    }

    .card {

      background: #111827;

      border-radius: 20px;

      padding: 20px;

      box-shadow:
        0 0 25px rgba(0,0,0,0.35);
    }
    input {

      width: 100%;

      padding: 14px;

      margin-bottom: 14px;

      border: none;

      border-radius: 14px;

      background: #1e293b;

      color: white;

      font-size: 15px;
    }

    button {

      border: none;

      background: #2563eb;

      color: white;

      border-radius: 14px;

      padding: 14px;

      font-size: 15px;

      cursor: pointer;
    }

    button:hover {

      background: #1d4ed8;
    }

    .search-box {

      display: flex;

      gap: 10px;

      margin-bottom: 20px;
    }

    .search-box input {

      margin-bottom: 0;
    }

    .search-box button {

      min-width: 100px;
    }

    #mainApp {

      display: none;
    }

    #card {

      display: none;
    }

    .flight {

      font-size: 24px;

      font-weight: bold;

      margin-bottom: 18px;
    }

    .name {

      font-size: 28px;

      font-weight: bold;

      margin-bottom: 10px;
    }

    .seat {

      color: #cbd5e1;

      margin-bottom: 22px;

      font-size: 15px;
    }

    .divider {

      height: 1px;

      background: rgba(255,255,255,0.08);

      margin:
        18px 0;
    }

    .section {

      margin-bottom: 18px;
    }
    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .grid-two .section {
      margin-bottom: 0;
    }

    .label {

      color: #60a5fa;

      text-transform: uppercase;

      font-size: 11px;

      letter-spacing: 1px;

      margin-bottom: 6px;
    }

    .value {

      white-space: pre-line;

      line-height: 1.6;

      font-size: 16px;
    }

    .yes {

      color: #22c55e;

      font-weight: bold;
    }

    .no {

      color: #ef4444;

      font-weight: bold;
    }

    .error {

      display: none;

      background: #7f1d1d;

      border-radius: 12px;

      padding: 12px;

      margin-top: 15px;

      font-size: 14px;
    }
    .chd-toggle-btn {
      width: auto;
      background: #1d4ed8;
      padding: 6px 14px;
      border-radius: 999px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
      border: none;
    }
    .chd-toggle-btn.is-good {
      background: #16a34a;
    }
    .chd-toggle-btn.is-bad {
      background: #dc2626;
    }
    .chd-toggle-btn.is-review {
      background: #eab308;
      color: #0f172a;
    }
    .chd-toggle-btn.is-disabled {
      background: #16a34a;
      opacity: 1;
      cursor: pointer;
      pointer-events: auto;
    }
    .sy-toggle-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      padding-bottom: 4px;
    }
    .sy-toggle-row::-webkit-scrollbar { height: 6px; }
    .sy-toggle-row::-webkit-scrollbar-thumb { background: rgba(148,163,184,.55); border-radius: 999px; }
    .sy-toggle-row .chd-toggle-btn { flex: 0 0 auto; white-space: nowrap; }
    .chd-summary {
      margin-top: 10px;
      color: #fca5a5;
      font-size: 14px;
    }
    .chd-list {
      margin-top: 8px;
      white-space: pre-line;
      font-size: 13px;
      line-height: 1.5;
      color: #e2e8f0;
    }
    .bn-highlight {
      color: #fde047;
      font-weight: 700;
    }
    .govaqq-details-title {
      margin-top: 8px;
      color: #60a5fa;
      font-size: 14px;
      font-weight: 700;
    }
    .govaqq-result-title {
      margin-top: 4px;
      color: #60a5fa;
      font-size: 14px;
      font-weight: 700;
    }
    .govaqq-stats {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 12px;
      row-gap: 4px;
      align-items: baseline;
      font-size: 12px;
      line-height: 1.5;
      color: #e2e8f0;
    }
    .govaqq-stats .stat-label {
      color: #cbd5e1;
    }
    .govaqq-stats .stat-value {
      min-width: 20px;
      text-align: right;
      font-weight: 700;
      color: #ffffff;
    }
    .govaqq-stats .stat-value.is-danger {
      color: #ef4444;
    }
    #govAqqSection .chd-list {
      border:1px solid rgba(148,163,184,.22);
      border-radius:14px;
      padding:10px 12px;
      background:linear-gradient(145deg, rgba(15,23,42,.96), rgba(30,41,59,.88));
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      white-space:pre-line;
    }
    #govAqqSection .govaqq-stats {
      border:1px solid rgba(148,163,184,.2);
      border-radius:14px;
      padding:10px 12px;
      background:rgba(15,23,42,.78);
    }
    #govAqqList.chd-list { border:none; border-radius:0; padding:0; background:transparent; box-shadow:none; }
    .govaqq-issue-groups { display:flex; flex-direction:column; gap:10px; min-width:0; }
    .govaqq-issue-group { width:100%; box-sizing:border-box; border:1px solid rgba(148,163,184,.18); border-radius:12px; padding:8px; background:rgba(15,23,42,.55); }
    .govaqq-issue-title { color:#93c5fd; font-size:15px; font-weight:900; margin-bottom:10px; display:flex; justify-content:space-between; gap:8px; }
    .govaqq-issue-grid { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:6px; }
    .govaqq-issue-detail { display:none; flex-direction:column; gap:10px; }

    .auth-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #1e293b;
      color: #cbd5e1;
      font-size: 13px;
    }

    .auth-bar strong {
      color: #ffffff;
      font-weight: 600;
    }

    .logout-btn {
      padding: 8px 12px;
      font-size: 11px;
      border-radius: 10px;
      background: #334155;
    }

    .logout-btn:hover {
      background: #475569;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 10px;
    }

    .app-header .title {
      margin-bottom: 0;
    }

    .help-btn {
      padding: 7px 11px;
      font-size: 11px;
      border-radius: 999px;
      background: #334155;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .help-btn:hover {
      background: #475569;
    }

    .help-panel {
      display: none;
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.55;
    }

    .password-page { margin-top: 16px; }
    .password-card { background:#0b1833; border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:20px; }
    .password-card input { width:100%; background:#1f2a44; border:1px solid #3b4661; border-radius:10px; color:#fff; padding:10px; margin-bottom:12px; }
    .password-actions { display:flex; gap:10px; }

    .flight-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .flight-row .flight {
      margin-bottom: 0;
    }

    .doc-icon-btn {
      display: none;
      padding: 4px 8px;
      font-size: 22px;
      line-height: 1;
      border-radius: 10px;
      background: transparent;
    }

    .doc-icon-btn:hover {
      background: #1e293b;
    }

    .doc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
      font-size: 14px;
      line-height: 1.35;
    }

    .doc-item span {
      display: block;
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 2px;
    }

    .doc-item b {
      color: white;
      font-weight: 600;
    }


    .bn-link {
      color: #ffffff;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .bn-link:hover {
      color: #93c5fd;
    }

    .detail-card {
      display: none;
      background: #111827;
      border-radius: 20px;
      padding: 18px 20px;
      margin-top: 16px;
      box-shadow: 0 0 25px rgba(0,0,0,0.35);
    }

    .detail-title {
      color: #60a5fa;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .detail-content {
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 14px;
      color: #e5e7eb;
      word-break: break-word;
    }

    .mini-btn {
      padding: 8px 12px;
      font-size: 11px;
      border-radius: 10px;
      background: #334155;
    }
    .mini-btn:hover {
      background: #475569;
    }

  
    .sy-layout { margin-top: 8px; }
    .sy-row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .sy-row-full { grid-template-columns: 1fr; }
    .sy-cell .label { margin-bottom: 4px; }
    .sy-label-row { display:flex; align-items:center; gap:6px; }
    .sales-report-trigger { display:none; cursor:pointer; font-size:15px; line-height:1; }
    .sales-report-pop {
      display:none; position:absolute; z-index:1000; margin-top:6px; background:#102042; border:1px solid rgba(147,197,253,.45);
      border-radius:10px; padding:8px; min-width:150px; box-shadow:0 8px 18px rgba(0,0,0,.35);
    }
    .sales-download-btn { background:#1d4ed8; border-radius:9px; padding:6px 10px; font-size:12px; width:100%; }
    .sales-download-btn:disabled { background:#475569; cursor:not-allowed; }
    .wch-btn { background:#16a34a; color:#ffffff; }
    .membership-btn { background:#16a34a; color:#ffffff; }
    .membership-summary { color: #86efac; }
    .membership-list {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.5;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      overflow-x: hidden;
    }
    .membership-group-title {
      color: #bbf7d0;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .membership-row {
      display: grid;
      width: 100%;
      grid-template-columns: 56px minmax(120px, 1fr) 40px 28px minmax(0, 1fr);
      gap: 8px;
      align-items: baseline;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .membership-row .member-bn { color: #fde047; font-weight: 700; }
    .membership-row .member-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .membership-row .member-seat { text-align: center; }
    .membership-row .member-cabin { text-align: center; color: #93c5fd; font-weight: 700; }
    .membership-row .member-ff {
      min-width: 0;
      text-align: right;
      justify-self: end;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media (max-width: 768px) {
      .membership-row {
        grid-template-columns: 56px minmax(90px, 1fr) 40px 24px;
        gap: 6px;
      }
      .membership-row .member-name {
        min-width: 70px;
      }
      .membership-row .member-ff {
        grid-column: 2 / -1;
        justify-self: start;
        text-align: left;
      }
    }
    .membership-empty { color: #94a3b8; }
    .uniform-list {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.5;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      overflow-x: hidden;
    }
    #chdList.uniform-list, #wchList.uniform-list { overflow: visible; }
    .uniform-row {
      display: grid;
      width: 100%;
      gap: 8px;
      align-items: baseline;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .uniform-row.wch { grid-template-columns: 56px minmax(120px, 1fr) 48px minmax(72px, .8fr); }
    .uniform-row.chd { grid-template-columns: 56px minmax(120px, 1fr) minmax(72px, .8fr) minmax(88px, 1fr); }
    .uniform-bn { color: #fde047; font-weight: 700; }
    .uniform-name, .uniform-extra, .uniform-status { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .uniform-seat, .uniform-codes { text-align: center; }
    .uniform-codes { color: #93c5fd; font-weight: 700; }
    .wchc-code { color: #ef4444; font-weight: 800; }


    .clickable { cursor: pointer; }
    .back-btn { background:none; border:none; color:#93c5fd; cursor:pointer; padding:0; margin-bottom:8px; }
    .bag-detail-card { margin-top: 12px; border:none; border-radius:0; padding:0; display:flex; flex-direction:column; align-items:flex-end; }
    .bag-table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .bag-table { width:100%; border-collapse:collapse; margin-top:6px; table-layout: fixed; }
    .bag-table th, .bag-table td { border:1px solid #334155; padding:10px 12px; text-align:left; font-size:15px; vertical-align: top; }
    .bag-table th { background: #16243b; color: #dbeafe; font-weight: 700; white-space: nowrap; word-break: normal; }
    .bag-table td { background: #0f1b31; white-space: normal; word-break: break-word; overflow-wrap:anywhere; }

    .bag-table.rush-table col:nth-child(1),
    .bag-table.rush-table col:nth-child(2),
    .bag-table.rush-table col:nth-child(3),
    .bag-table.rush-table col:nth-child(4) { width: 25%; }
    .bag-table.rush-table th, .bag-table.rush-table td { white-space: nowrap; word-break: normal; overflow-wrap: normal; }

    .bag-table.notload-table col:nth-child(1) { width: 31%; }
    .bag-table.notload-table col:nth-child(2) { width: 10%; }
    .bag-table.notload-table col:nth-child(3) { width: 59%; }
    .bag-table.notload-table th:nth-child(2), .bag-table.notload-table td:nth-child(2) { text-align:center; }
    .audit-icon-btn { border:none; background:transparent; color:#8fb8ff; cursor:pointer; font-size:18px; line-height:1; padding:2px 4px; }
    .action-menu-wrap { position:relative; display:none; }
    .action-menu-btn { border:none; background:transparent; color:#cbd5e1; cursor:pointer; font-size:24px; line-height:1; padding:2px 7px; border-radius:10px; }
    .action-menu-btn:hover, .action-menu-btn.is-open { background:#1e293b; color:#ffffff; }
    .action-menu-pop { display:none; position:absolute; right:0; top:calc(100% + 8px); z-index:1200; min-width:178px; padding:6px; border:1px solid rgba(148,163,184,.24); border-radius:14px; background:#0f172a; box-shadow:0 18px 40px rgba(0,0,0,.38); }
    .action-menu-pop.is-open { display:block; }
    .action-menu-item { width:100%; display:block; padding:10px 12px; border-radius:10px; background:transparent; color:#e2e8f0; text-align:left; font-size:13px; }
    .action-menu-item:hover { background:#1e293b; color:#ffffff; }
    .seatmap-summary { display:flex; justify-content:space-between; align-items:flex-end; gap:12px; flex-wrap:wrap; margin-top:8px; }
    .seatmap-legend { display:flex; flex-wrap:wrap; gap:8px; color:#cbd5e1; font-size:11px; }
    .seatmap-legend-item { display:inline-flex; align-items:center; gap:5px; }
    .seatmap-legend-dot { width:12px; height:12px; border-radius:4px; border:1px solid rgba(255,255,255,.25); display:inline-block; }
    .seatmap-wrap { margin-top:14px; overflow:auto; max-height:720px; padding:12px 8px 18px; border:1px solid rgba(148,163,184,.16); border-radius:18px; background:linear-gradient(180deg, rgba(15,23,42,.9), rgba(2,6,23,.75)); }
    .seatmap-cabin-title { margin:14px auto 8px; max-width:440px; color:#93c5fd; font-size:12px; font-weight:900; letter-spacing:.8px; text-transform:uppercase; text-align:center; }
    .seatmap-galley { margin:8px auto; max-width:440px; border:1px dashed rgba(251,146,60,.55); border-radius:10px; padding:6px 10px; color:#fed7aa; background:rgba(154,52,18,.18); font-size:11px; font-weight:900; text-align:center; text-transform:uppercase; letter-spacing:.8px; }
    .seatmap-row { display:grid; grid-template-columns:34px repeat(12, 30px); justify-content:center; gap:4px; margin-bottom:4px; align-items:center; }
    .seatmap-row.is-first { grid-template-columns:34px repeat(12, 30px); }
    .seatmap-row-label { color:#94a3b8; font-size:11px; font-weight:800; text-align:right; padding-right:4px; }
    .seatmap-seat { position:relative; width:30px; height:30px; border-radius:8px; border:1px solid rgba(148,163,184,.24); background:rgba(30,41,59,.82); color:#94a3b8; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; cursor:default; }
    .seatmap-seat.is-empty { opacity:.42; }
    .seatmap-seat.is-occupied { background:#1d4ed8; border-color:#60a5fa; color:#fff; }
    .seatmap-seat.is-selected { background:#f59e0b; border-color:#fde68a; color:#111827; }
    .seatmap-seat.is-wch { background:#0891b2; border-color:#67e8f9; color:#ecfeff; }
    .seatmap-seat.is-child { background:#7c3aed; border-color:#c4b5fd; color:#fff; }
    .seatmap-seat.is-crew { background:#16a34a; border-color:#86efac; color:#fff; }
    .seatmap-seat.is-multi { box-shadow:0 0 0 2px #ef4444 inset; }
    .seatmap-seat small { position:absolute; right:2px; bottom:1px; font-size:8px; line-height:1; opacity:.95; }
    .seatmap-aisle, .seatmap-space { min-height:1px; }
    .seatmap-aisle { border-left:1px solid rgba(148,163,184,.16); align-self:stretch; justify-self:center; width:1px; }
    .seatmap-space.is-wide { grid-column:span 8; }
    .seatmap-detail { margin-top:12px; color:#cbd5e1; font-size:12px; line-height:1.5; text-align:center; }
    @media (max-width: 768px) {
      .action-menu-pop { right:-4px; }
      .seatmap-row, .seatmap-row.is-first { grid-template-columns:28px repeat(12, 26px); gap:3px; }
      .seatmap-seat { width:26px; height:26px; border-radius:7px; font-size:9px; }
    }
    .audit-summary-bar { display:flex; justify-content:space-between; align-items:flex-end; gap:12px; margin-top:8px; }
    .audit-summary-main { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; width:100%; }
    .audit-summary-subtitle { color:#94a3b8; font-size:12px; font-weight:600; text-align:right; white-space:nowrap; margin-left:auto; }
    .audit-workspace { --audit-detail-width:360px; margin-top:14px; display:grid; grid-template-columns:minmax(0, 1fr) minmax(340px, var(--audit-detail-width)); gap:14px; align-items:start; overflow:visible; width:calc(100% + var(--audit-detail-width) + 14px); padding-bottom:4px; }
    .audit-workspace.no-detail { grid-template-columns:minmax(0, 1fr); width:100%; }
    .govaqq-workspace { grid-template-columns:minmax(0, 1fr) minmax(340px, var(--audit-detail-width)); }
    .govaqq-workspace.no-detail { grid-template-columns:minmax(0, 1fr); width:100%; }
    .audit-list { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); grid-template-rows:repeat(100, auto); grid-auto-flow:column; gap:6px; max-height:620px; overflow:auto; padding:2px 4px 8px 2px; align-content:start; }
    .audit-list-row { width:100%; min-width:0; border:1px solid rgba(148,163,184,.2); border-radius:10px; padding:5px 7px; background:rgba(15,23,42,.86); color:#dbeafe; display:flex; align-items:center; justify-content:center; cursor:pointer; text-align:center; overflow:hidden; transition:background .16s ease, border-color .16s ease, transform .16s ease, box-shadow .16s ease; }
    .audit-list-row:hover, .audit-list-row.is-selected { transform:translateY(-1px); border-color:rgba(96,165,250,.7); box-shadow:0 8px 18px rgba(37,99,235,.16); }
    .audit-list-row.audit-pass { border-color:rgba(34,197,94,.75); background:rgba(20,83,45,.82); }

  <script>
    window.MU_API_BASE = 'https://api.mufcapp.net';

    let docPanelOpen = false;
    let currentPassengerData = null;
    let currentSyBagSheet = null;
    let checkinPanelOpen = false;
    let currentResultMode = 'NONE';
    let chdPanelOpen = false;
    let govAqqPanelOpen = false;
    let wchPanelOpen = false;
    let membershipPanelOpen = false;
    let currentGovAqqStatus = 'ok';
    let currentSyFlightNo = '';
    let currentSyFlightDate = '';
    window.currentUser = null;
    let hasAutoLoadedSyToday = false;
    let currentBnAudit = [];
    let currentSeatMapRecords = [];

        function resolveApiBase() {
      const fromWindow = window.MU_API_BASE || '';
      const fromStorage = localStorage.getItem('mu_api_base') || '';

      const normalizedWindow = fromWindow.trim().replace(/\/$/, '');
      const normalizedStorage = fromStorage.trim().replace(/\/$/, '');

      if (normalizedWindow) return normalizedWindow;
      if (normalizedStorage) return normalizedStorage;

      return '';
    }

    function promptAndSaveApiBase() {
      const input = window.prompt(
        '未检测到后端地址。请输入机器人后端域名（例如 https://api.mufcapp.net ）',
        'https://'
      );
      if (!input) return '';
      const normalized = input.trim().replace(/\/$/, '');
      if (!/^https?:\/\//i.test(normalized)) return '';
      localStorage.setItem('mu_api_base', normalized);
      return normalized;
    }


    function escapeHtml(value) {
      return (value || '')
        .toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getRawRecordText(data) {
      const possibleFields = [
        data?.rawRecord,
        data?.fullRecord,
        data?.record,
        data?.raw,
        data?.rawText,
        data?.originalText,
        data?.passengerRecord,
        data?.latestRecord,
        data?.sourceRecord,
        data?.sourceText,
        data?.log
      ];

      return possibleFields
        .filter(Boolean)
        .map(x => Array.isArray(x) ? x.join('\n') : x.toString())
        .join('\n');
    }

    function normalizeDetailLine(line) {
      return (line || '')
        .toString()
        .replace(/[\u001c-\u001f]/g, '')
        .trimEnd();
    }

    function dedupeLines(lines) {
      return [...new Set((lines || []).filter(Boolean))];
    }
    function setSectionLabel(sectionId, text) {
      const section = document.getElementById(sectionId);
      if (!section) return;
      const label = section.querySelector('.label');
      if (label) label.innerText = text;
    }

    function parseCheckinGroups(data) {
      const psmLines = dedupeLines((data?.psmLines || [])
        .map(normalizeDetailLine)
        .filter(line => /^PSM\b/i.test(line)));

      const ckinLines = dedupeLines((data?.ckinLines || [])
        .map(normalizeDetailLine)
        .filter(line => /^CKIN\b/i.test(line)));

      const operationHistoryLines = dedupeLines((data?.operationHistoryLines || [])
        .map(normalizeDetailLine)
        .filter(line => /^[A-Z]{2,3}\s+[A-Z]{3}\d{5,}\s+AGT\d+\/\d{2}[A-Z]{3}\d{4}/i.test(line)));

      const detailLines = [
        ...psmLines,
        ...ckinLines,
        ...operationHistoryLines
      ];

      if (!detailLines.length) {
        return [];
      }

      return [{
        header: 'Check-in Details',
        detailLines
      }];
    }

    function toggleCheckinPanel() {
      const list = document.getElementById('checkinDetailList');

      if (!currentPassengerData) return;

      checkinPanelOpen = !checkinPanelOpen;

      if (!checkinPanelOpen) {
        list.innerHTML = '';
        return;
      }

      const canViewCheckin =
        currentPassengerData?.permissions?.canViewCheckinDetails;
      const canView240 =
        currentPassengerData?.permissions?.canView240Info;

      const groups =
        canViewCheckin
          ? parseCheckinGroups(currentPassengerData)
          : [];
      const cards = [];

      if (groups.length) {
        cards.push(...groups.map(group => `
        <div class="detail-card" style="display:block;">
          <div class="detail-title">${escapeHtml(group.header)}</div>
          <div class="detail-content">${escapeHtml(group.detailLines.join('\n'))}</div>
        </div>
      `));
      }

      const extra =
        canView240
          ? (
            currentPassengerData?.info240 ||
            currentPassengerData?.info240Data ||
            currentPassengerData?.extra240 ||
            null
          )
          : null;
      if (extra && Object.values(extra).some(Boolean)) {
        const extraLines = [
          extra.passportCountry ? `Passport Country: ${extra.passportCountry}` : '',
          extra.passportExpiry ? `Passport Expiry: ${extra.passportExpiry}` : '',
          extra.leaveChinaAt ? `Leave China At: ${extra.leaveChinaAt}` : '',
          extra.destination ? `Destination: ${extra.destination}` : '',
          extra.agentSubmitter ? `Agent Submit: ${extra.agentSubmitter}` : ''
        ].filter(Boolean);

        if (extraLines.length) {
          cards.push(`
            <div class="detail-card" style="display:block;">
              <div class="detail-title">240 info</div>
              <div class="detail-content">${escapeHtml(extraLines.join('\n'))}</div>
            </div>
          `);
        }
      }

      if (!cards.length) {
        list.innerHTML = '';
        checkinPanelOpen = false;
        return;
      }

      list.innerHTML = cards.join('');
    }

    
    function closeSyActionMenu() {
      const menu = document.getElementById('syActionMenu');
      const btn = document.getElementById('syActionMenuBtn');
      if (menu) menu.classList.remove('is-open');
      if (btn) {
        btn.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    }

    function toggleSyActionMenu(event) {
      if (event) event.stopPropagation();
      const menu = document.getElementById('syActionMenu');
      const btn = document.getElementById('syActionMenuBtn');
      if (!menu || !btn) return;
      const willOpen = !menu.classList.contains('is-open');
      menu.classList.toggle('is-open', willOpen);
      btn.classList.toggle('is-open', willOpen);
      btn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
    }

    function openSyMenuAction(action) {
      closeSyActionMenu();
      if (action === 'security') showBnAuditPage();
      if (action === 'seatmap') showSeatMapPage();
    }

    document.addEventListener('click', (event) => {
      if (!event.target.closest?.('#syActionMenuWrap')) closeSyActionMenu();
    });

    function hideSyAuxLayouts() {
      closeSyActionMenu();
      setDisplayById('syBagDetailLayout', 'none');
      setDisplayById('syAuditLayout', 'none');
    }

    function showSyFlightCard() {
      if (currentResultMode !== 'SY') {
        setDisplayById('syLayout', 'none');

    function escapeAttr(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
    function emojiByStatus(status) {
      if (status === 'pass') return '✅';
      if (status === 'review') return '⚠️';
      if (status === 'fail') return '❌';
      return '⚪';
    }
    function reasonFor(row, key) {
      if (!row) return '';
      if (key === 'api') return row.apiReason || '';
      if (key === 'tk') return row.tkReason || '';
      if (key === 'visa') return row.visaReason || '';
      if (key === 'bag') return row.bagReason || '';
      return '';
    }
    function buildStatusDot(status, reason, key) {
      const emoji = emojiByStatus(status);
      if (status === 'pass' || !reason) return `<span class="status-dot">${emoji}</span>`;
      const safeReason = escapeAttr(reason);
      return `<span class="status-dot has-reason" data-reason="${safeReason}" data-key="${key}" title="${safeReason}">${emoji}</span>`;
    }
    function statusText(status) {
      if (status === 'pass') return 'Pass';
      if (status === 'review') return 'Warning';
      if (status === 'fail') return 'Fail';
      return 'Pending';
    }
    function statusClass(status) {
      if (status === 'pass') return 'pass';
      if (status === 'review') return 'review';
      if (status === 'fail') return 'fail';
      return 'empty';
    }
    function auditItemsForRow(row) {
      return [
        { key: 'api', label: 'API', status: row?.apiStatus || '', reason: reasonFor(row, 'api') },
        { key: 'tk', label: 'TK', status: row?.tkStatus || '', reason: reasonFor(row, 'tk') },
        { key: 'visa', label: 'VISA', status: row?.visaStatus || '', reason: reasonFor(row, 'visa') },
        { key: 'bag', label: 'BAG', status: row?.bagStatus || '', reason: reasonFor(row, 'bag') }
      ];
    }
    function auditDisplayClass(item) {
      if (!item?.status) return 'empty';
      if (item.status === 'pass') return 'pass';
      if (item.status === 'fail') return 'fail';
      if (item.key === 'bag' && item.status === 'review') return 'bag-review';
      if ((item.key === 'api' || item.key === 'tk') && item.status === 'review') return 'fail';
      if (item.status === 'review') return 'review';
      return 'empty';
    }
    function overallAuditStatus(items) {
      if (!items.some((item) => item.status)) return 'empty';
      if (items.some((item) => item.status === 'fail' || ((item.key === 'api' || item.key === 'tk') && item.status === 'review'))) return 'fail';
      if (items.some((item) => item.key === 'visa' && item.status === 'review')) return 'warning';
      if (items.some((item) => item.key === 'bag' && item.status === 'review')) return 'bag-review';
      if (items.some((item) => item.status === 'review')) return 'warning';
      if (items.every((item) => item.status === 'pass')) return 'pass';
      return 'warning';
    }
    function auditOverallLabel(overall) {
      if (overall === 'empty') return 'Pending';
      if (overall === 'bag-review') return 'Bag Review';
      return statusText(overall === 'warning' ? 'review' : overall);
    }
    function auditPassReason(label) {
      if (label === 'API') return 'API cleared: no timeout, GOV fail, expiry, reswipe, or agent review flag';
      if (label === 'TK') return 'Ticket check passed; ticket number detail was not returned for this record';
      if (label === 'VISA') return 'VISA check passed; passport/destination detail was not returned for this record';
      if (label === 'BAG') return 'BAG check passed; allowance and destination detail was not returned for this record';
      return 'Check passed by current audit rule';
    }
    function buildAuditCard(bn, row, expanded = false) {

      const itemBadges = items.map((item) => `<div class="audit-mini-status ${auditDisplayClass(item)}">${escapeHtmlText(item.label)} ${emojiByStatus(item.status)}</div>`).join('');
      const details = items.map((item) => {
        const reason = item.reason || (item.status === 'pass' ? auditPassReason(item.label) : 'No data yet');
        const reasonClass = item.reason || item.status === 'pass' ? '' : ' empty';
        return `<div class="audit-detail-item">
          <span class="audit-detail-name">${escapeHtmlText(item.label)}</span>
          <span>${emojiByStatus(item.status)}</span>

      return `<div class="audit-card audit-${overall}${expanded ? ' is-expanded' : ''}" data-bn="${escapeAttr(bn)}" role="button" tabindex="0" aria-expanded="${expanded ? 'true' : 'false'}">

    function buildAuditListRow(bn, row, selected = false) {

      return `<button type="button" class="audit-list-row audit-${overall}${selected ? ' is-selected' : ''}" data-bn="${escapeAttr(bn)}" aria-pressed="${selected ? 'true' : 'false'}">

    function formatAuditMembership(record) {

    function formatAuditInbound(inbound) {
      if (!inbound) return '';
      return `${inbound.flight || '-'} / ${inbound.date || '-'} • From ${inbound.origin || '-'}`;

    function formatAuditOutbound(outbound) {
      if (!outbound) return '';
      return `${outbound.flight || '-'} / ${outbound.date || '-'}${outbound.bn ? ` • BN${outbound.bn}` : ''}${outbound.seat ? ` • ${outbound.seat}` : ''}${outbound.status === 'DELETED' ? ' • DELETED' : ''} • To ${outbound.destination || '-'}`;

    function joinAuditValues(values) {
      return Array.isArray(values) && values.length ? values.join(', ') : '';
    }
    function buildAuditPassengerCard(bn, row) {
      const record = row?.passengerRecord || null;
      const isDeletedRecord = Boolean(record?.offloaded || record?.status === 'DELETED' || row?.offloaded);
      const overall = record && !isDeletedRecord ? overallAuditStatus(auditItemsForRow(row)) : 'empty';

      const body = fields.map(([label, value]) => {

      return `<div class="audit-card audit-record-card audit-${overall}">
        <div class="audit-card-top">

    function ensureStatusReasonPop() {

    function normalizeSeatNo(value) {
      return String(value || '').trim().toUpperCase().replace(/[^0-9A-Z]/g, '');

    function seatMapItems777300() {
      const items = [];
      const seat = (letter) => ({ type: 'seat', letter });
      const aisle = () => ({ type: 'aisle' });
      const space = (wide = false) => ({ type: 'space', wide });
      const addTitle = (title) => items.push({ type: 'title', title });
      const addGalley = (label) => items.push({ type: 'galley', label });
      const addRow = (row, cabin, cells, rowClass = '') => items.push({ type: 'row', row, cabin, cells, rowClass });
      const firstTwoTwo = [seat('A'), aisle(), seat('D'), seat('H'), aisle(), seat('L')];
      const businessOneTwoOne = [seat('A'), aisle(), space(), seat('D'), seat('H'), space(), aisle(), seat('L')];
      const economyFull = [seat('A'), seat('B'), seat('C'), aisle(), seat('D'), seat('E'), seat('F'), seat('G'), aisle(), seat('H'), seat('J'), seat('K')];
      const economyMiddleOnly = [space(), space(), space(), aisle(), seat('D'), seat('F'), seat('G'), seat('H'), aisle(), space(), space(), space()];
      const economyTwoLeft = [seat('A'), seat('C'), space(), aisle(), space(), space(), space(), space(), aisle(), space(), space(), space()];

      addTitle('First Class');
      addRow(1, 'First Class', [seat('A'), space(true), seat('L')], 'is-first');
      addRow(2, 'First Class', firstTwoTwo, 'is-first');

      addTitle('Business Class');
      [6, 7].forEach((row) => addRow(row, 'Business Class', businessOneTwoOne));
      addGalley('Galley after row 7');
      [8, 9, 10, 11, 12, 15, 16, 17, 18, 19, 20].forEach((row) => addRow(row, 'Business Class', businessOneTwoOne));

      addTitle('Economy Class - Forward');
      addRow(31, 'Economy Class - Forward', economyMiddleOnly);
      for (let row = 32; row <= 44; row += 1) addRow(row, 'Economy Class - Forward', economyFull);
      addGalley('Mid-cabin galley / no passenger seats rows 45-60');

      addTitle('Economy Class - Rear');
      for (let row = 61; row <= 69; row += 1) addRow(row, 'Economy Class - Rear', economyFull);
      for (let row = 70; row <= 74; row += 1) addRow(row, 'Economy Class - Rear', economyTwoLeft);

      return items;
    }

    function inferSeatMapType(record, row) {
      const services = [
        ...(record?.specialServices || []),
        ...(record?.specialMeals || []),
        ...(row?.codes || [])
      ].map((x) => String(x || '').toUpperCase());
      const name = String(record?.name || row?.name || '').toUpperCase();
      if (services.some((x) => /^WCH/.test(x))) return 'wch';
      if (services.includes('UM') || services.includes('CHD') || row?.hasChdCode || row?.isChild) return 'child';
      if (services.includes('CREW') || /\bCREW\b/.test(name)) return 'crew';
      if (!record?.bn && row?.source === 'seatOnly') return 'selected';
      return 'occupied';
    }

    function buildSeatMapLookup() {
      const bySeat = new Map();
      const add = (record, sourceRow = {}) => {
        const seat = normalizeSeatNo(record?.seat || sourceRow?.seat);
        if (!seat || seat === '---' || seat === '-') return;
        const bn = String(record?.bn || sourceRow?.bn || '').padStart(record?.bn || sourceRow?.bn ? 3 : 0, '0');
        const merged = { ...sourceRow, ...(record || {}), bn, seat };
        const type = inferSeatMapType(merged, sourceRow);
        const existing = bySeat.get(seat) || [];
        const sameIdx = existing.findIndex((item) => item.bn && merged.bn && item.bn === merged.bn);
        if (sameIdx >= 0) {
          existing[sameIdx] = { ...existing[sameIdx], ...merged, type: type !== 'occupied' ? type : existing[sameIdx].type };
        } else {
          existing.push({ ...merged, type });
        }
        bySeat.set(seat, existing);
      };

      (currentBnAudit || []).forEach((row) => add(row?.passengerRecord, row));
      (currentSeatMapRecords || []).forEach((record) => add(record, { source: record?.bn ? 'record' : 'seatOnly' }));

      return bySeat;
    }

    function seatMapCellClass(records) {
      if (!records?.length) return 'is-empty';
      if (records.length > 1) return `is-${records[0].type || 'occupied'} is-multi`;
      return `is-${records[0].type || 'occupied'}`;
    }

    function seatMapCellTitle(seat, records) {
      if (!records?.length) return `${seat} empty`;
      return records.map((p) => {
        const bn = p.bn ? `BN${p.bn}` : 'No BN yet';
        const name = p.name || 'UNKNOWN';
        const tags = [];
        if (p.type === 'selected') tags.push('Selected / not arrived');
        if (p.type === 'wch') tags.push('Wheelchair');
        if (p.type === 'child') tags.push('Child');
        if (p.type === 'crew') tags.push('Crew');
        return `${seat} • ${bn} • ${name}${tags.length ? ` • ${tags.join(', ')}` : ''}`;
      }).join('\n');
    }

    function renderSeatMapCell(row, cell, bySeat) {
      if (cell.type === 'aisle') return '<div class="seatmap-aisle"></div>';
      if (cell.type === 'space') return `<div class="seatmap-space${cell.wide ? ' is-wide' : ''}"></div>`;
      const seat = `${row}${cell.letter}`;
      const records = bySeat.get(seat) || [];
      const display = records[0]?.bn || (records.length ? 'SN' : cell.letter);
      const marker = records[0]?.type === 'wch' ? '♿' : records[0]?.type === 'child' ? 'CH' : records[0]?.type === 'crew' ? 'CR' : records[0]?.type === 'selected' ? 'SN' : '';
      return `<div class="seatmap-seat ${seatMapCellClass(records)}" title="${escapeAttr(seatMapCellTitle(seat, records))}">${escapeHtmlText(display)}${marker ? `<small>${escapeHtmlText(marker)}</small>` : ''}</div>`;
    }

    function renderSeatMapItem(item, bySeat) {
      if (item.type === 'title') return `<div class="seatmap-cabin-title">${escapeHtmlText(item.title)}</div>`;
      if (item.type === 'galley') return `<div class="seatmap-galley">${escapeHtmlText(item.label || 'Galley')}</div>`;
      const cells = item.cells.map((cell) => renderSeatMapCell(item.row, cell, bySeat)).join('');
      return `<div class="seatmap-row ${escapeAttr(item.rowClass || '')}"><div class="seatmap-row-label">${item.row}</div>${cells}</div>`;
    }

    function showSeatMapPage() {

    function formatRushTagValue(value) {
      const raw = String(value || '').trim().toUpperCase();
      if (!raw) return '';
      if (/^\d+$/.test(raw)) return raw.slice(-6);
      if (/^[A-Z]{2}[A-Z0-9]+$/.test(raw)) return `${raw.slice(0, 2)}${raw.slice(-6)}`;
      return raw;
    }

    function formatBagCellValue(title, colIdx, value) {
      const text = String(value || '');
      if (title === 'RUSH BAGS' && (colIdx === 0 || colIdx === 1)) {
        return formatRushTagValue(text);
      }
      if (title === 'NOT LOAD BAGS' && colIdx === 0) {
        return formatRushTagValue(text);
      }
      if (title === 'NOT LOAD BAGS' && colIdx === 1) {
        const upper = text.trim().toUpperCase();
        if (upper === 'LOADED') return '✅';
        if (upper === 'NOT LOADED') return '❌';
      }
      return text;
    }

    function buildBagSectionHtml(title, config) {
      const headers = Array.isArray(config?.headers) ? config.headers : [];
      const rows = Array.isArray(config?.rows) ? config.rows : [];
      if (!headers.length || !rows.length) return '';

      const headerRow = headers.map((header) => `<th>${escapeHtml(header)}</th>`).join('');
      const valueRows = rows.map((row) => `
        <tr>${row.map((value, colIdx) => `<td>${escapeHtml(formatBagCellValue(title, colIdx, value) || '') || '-'}</td>`).join('')}</tr>
      `).join('');

      return `
        <div class="bag-detail-card">
          <div class="detail-title" style="font-weight:700; letter-spacing:.5px;">${escapeHtml(title)}</div>
          <div class="bag-table-wrap">
            <table class="bag-table ${title === 'RUSH BAGS' ? 'rush-table' : (title === 'NOT LOAD BAGS' ? 'notload-table' : '')}">
              <colgroup>
                ${headers.map(() => '<col>').join('')}

            <thead>
              <tr>${headerRow}</tr>
            </thead>
            <tbody>
              ${valueRows}
            </tbody>
          </table>
          </div>
        </div>

    function formatChdName(name) {
      const raw = String(name || '').toUpperCase().trim();
      const parts = raw.split('/');
      const last = (parts[0] || '').slice(0, 6);
      const first = (parts[1] || '').slice(0, 6);
      return first ? `${last}/${first}` : last;
    }

    function cleanRawLine(value) {
      return (value || '')
        .toString()
        .replace(/^\s*[A-Z ]+:/i, '')
        .trim();
    }

    function firstMatch(text, regex) {
      const m = (text || '').match(regex);
      return m ? m[1] : '';
    }

    function setTextById(id, value) {
      const el = document.getElementById(id);
      if (el) el.innerText = value;

    function setDisplayById(id, value) {
      const el = document.getElementById(id);
      if (el) el.style.display = value;

    function escapeHtmlText(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

        .replace(/\n/g, '<br>');
      el.innerHTML = html;

    function buildTravelDocs(data) {
      const paxInfoRaw = cleanRawLine(data.paxInfoRaw);
      const passportRaw = cleanRawLine(data.passportRaw);

      const passportParts = passportRaw
        .split('/')
        .map(x => x.trim());

      const passportNumber =
        data.passportNumber ||
        firstMatch(passportRaw, /^([A-Z0-9]+)/i);

      const nationality =
        data.nationality ||
        firstMatch(paxInfoRaw, /^([A-Z]{3})\//i) ||
        firstMatch(passportRaw, /\/NAT\/([A-Z]{3})\//i);

      const dob =
        data.dob ||
        data.birthDate ||
        firstMatch(paxInfoRaw, /(?:\/DOB\/|\bDOB\s*[:\/-]?\s*)(\d{6,8}|\d{2}[A-Z]{3}\d{2,4}|\d{4}-\d{2}-\d{2})/i) ||
        firstMatch(passportRaw, /(?:\/DOB\/|\bDOB\s*[:\/-]?\s*)(\d{6,8}|\d{2}[A-Z]{3}\d{2,4}|\d{4}-\d{2}-\d{2})/i);

      const gender =
        data.gender ||
        firstMatch(paxInfoRaw, /(?:\/GENDER\/|\bGENDER\s*[:\/-]?\s*|\bSEX\s*[:\/-]?\s*)([A-Z])/i) ||
        firstMatch(passportRaw, /(?:\/GENDER\/|\bGENDER\s*[:\/-]?\s*|\bSEX\s*[:\/-]?\s*)([A-Z])/i);

      let expiry =
        data.passportExpiry ||
        data.expiryDate ||
        '';

      if (!expiry) {
        const natIndex = passportParts.findIndex(x => x.toUpperCase() === 'NAT');
        if (natIndex >= 0) {
          expiry = passportParts
            .slice(natIndex + 2)
            .find(x => /^\d{6}$/.test(x)) || '';
        }
      }

      const items = [
        ['Passport', passportNumber],
        ['Nationality', nationality],
        ['DOB', dob],
        ['Expiry', expiry],
        ['Gender', gender]
      ].filter(item => item[1]);

      if (!items.length) {
        return '<div class="doc-grid"><div class="doc-item"><span>Travel Docs</span><b>No travel document data</b></div></div>';
      }

      return '<div class="doc-grid">' +
        items.map(([label, value]) =>
          `<div class="doc-item"><span>${label}</span><b>${value}</b></div>`
        ).join('') +
        '</div>';
    }

    async function searchPassenger() {
      let q =
        document
          .getElementById('query')
          .value
          .trim();

      if (!q) {
        return;
      }

      const upper =
        q.toUpperCase();

      if (
        upper.startsWith('FB ')
      ) {

        q =
          q.substring(3).trim();
      }

      else if (
        upper.startsWith('RN ')
      ) {

        q =
          q.substring(3).trim();
      }

      else if (
        upper.startsWith('FSN ')
      ) {

        q =
          q.substring(4).trim();
      }

      else if (
        upper.startsWith('ETKD ')
      ) {

        q =
          q.substring(5).trim();
      }

      else if (
        upper.startsWith('FF ')
      ) {

        q =
          q.substring(3).trim();
      }

      const card =
        document.getElementById('card');

      const error =
        document.getElementById('error');

      card.style.display =
        'none';

      error.style.display =
        'none';

      checkinPanelOpen = false;
      document.getElementById('checkinDetailList').innerHTML = '';

      try {

        let apiBase = resolveApiBase();
        let endpoint =
          `${apiBase}/search?q=` +
          encodeURIComponent(q);

        const headers = {};
        if (window.currentUser) {
          const token = await window.currentUser.getIdToken();
          headers.Authorization = `Bearer ${token}`;
        }

        const res =
          await fetch(endpoint, { headers });

        const contentType =
          res.headers.get('content-type') || '';

        if (!res.ok) {
          const failText =
            await res.text();

          const maybeWrongApiBase =
            !apiBase &&
            res.status === 404 &&
            failText.toLowerCase().includes('<!doctype html');

          if (maybeWrongApiBase) {
            const configuredApiBase = promptAndSaveApiBase();
            if (configuredApiBase) {
              apiBase = configuredApiBase;
              endpoint = `${apiBase}/search?q=` + encodeURIComponent(q);
              const retryRes = await fetch(endpoint, { headers });
              if (!retryRes.ok) {
                const retryText = await retryRes.text();
                throw new Error(
                  `HTTP ${retryRes.status} ${retryRes.statusText} ${retryText.slice(0, 120)} (endpoint: ${endpoint})`
                );
              }
              const retryType = retryRes.headers.get('content-type') || '';
              if (!retryType.includes('application/json')) {
                const retryText = await retryRes.text();
                throw new Error(`Non-JSON response: ${retryText.slice(0, 120)} (endpoint: ${endpoint})`);
              }
              const retryData = await retryRes.json();
              if (retryData.error) {
                error.innerText = retryData.error;
                error.style.display = 'block';
                return;
              }
              return renderSearchResult(retryData, q);
            }
            throw new Error('API endpoint not found on current site, and no backend configured.');
          }

          throw new Error(
            `HTTP ${res.status} ${res.statusText} ${failText.slice(0, 120)} (endpoint: ${endpoint})`
          );
        }

        if (!contentType.includes('application/json')) {
          const failText =
            await res.text();

          throw new Error(
            `Non-JSON response: ${failText.slice(0, 120)} (endpoint: ${endpoint})`
          );
        }

        const data = await res.json();
        return renderSearchResult(data, q);
      } catch (err) {
        error.innerText = err?.message || 'Search failed.';
        error.style.display = 'block';
      }
    }

    function renderSearchResult(data, q) {
        const card = document.getElementById('card');
        const error = document.getElementById('error');
        const normalizedQuery =
          String(q || '').trim().toUpperCase().replace(/\s+/g, '');
        const isSYQuery =
          /^SY\+?(?:\/\d{2}[A-Z]{3})?$/.test(normalizedQuery) ||
          normalizedQuery.startsWith('SY/');

        if (data.error) {

          error.innerText =
            data.error;

          error.style.display =
            'block';
          currentResultMode = 'NONE';

          return;

        if (isSYQuery || data.sy) {

          setTextById('syGate', `${sy.gate || '-'}`);
          setTextById('syTimes', `${sy.bdt || '-'} / ${sy.sd || '-'} / ${sy.ed || '-'}`);

          currentBnAudit = Array.isArray(sy.bnAudit) ? sy.bnAudit : [];
          currentSeatMapRecords = Array.isArray(sy.seatMapRecords) ? sy.seatMapRecords : [];
          setDisplayById('syActionMenuWrap', 'block');
          setDisplayById('auditToggleBtn', 'none');
          const bagIcon = currentSyBagSheet?.hasData ? ' 🧳' : '';
          setTextById('syBagsLabel', `BAGS${bagIcon}`);
          setTextById('syBags', `${sy.bags?.[0] || '-'}`);
          const syBagsEl = document.getElementById('syBags');
          const syBagsCellEl = document.getElementById('syBagsCell');
          if (currentSyBagSheet?.hasData) {

          currentSyFlightNo = sy.flightNo || '';
          currentSyFlightDate = sy.flightDate || '';
          const salesTrigger = document.getElementById('salesReportTrigger');
          const salesPop = document.getElementById('salesReportPop');
          if (salesTrigger && salesPop) {
            salesTrigger.style.display = 'none';

          checkSalesReportAvailability(currentSyFlightNo, currentSyFlightDate);
          const chdList = Array.isArray(sy.chdList) ? sy.chdList : [];
          const noCodeList = chdList.filter((p) => !p.hasChdCode);
          setTextById('chdSummary', `CHD Total: ${chdList.length} • Missing CHD1/0: ${noCodeList.length}`);
          updateChdToggleAppearance(noCodeList.length > 0);
          const sortedChdList = [...chdList].sort((a, b) => Number(a.bn || 0) - Number(b.bn || 0));
          renderChdPanel(document.getElementById('chdList'), sortedChdList);
          chdPanelOpen = false;
          govAqqPanelOpen = false;
          wchPanelOpen = false;
          membershipPanelOpen = false;
          setDisplayById('chdSection', 'none');
          setDisplayById('govAqqSection', 'none');
          setDisplayById('wchSection', 'none');
          setDisplayById('membershipPanelSection', 'none');
          setDisplayById('syToggleRow', 'flex');
          setDisplayById('chdToggleBtn', 'inline-block');
          setDisplayById('govAqqToggleBtn', 'inline-block');
          setDisplayById('wchToggleBtn', 'inline-block');
          setDisplayById('membershipToggleBtn', 'inline-block');
          setTextById('chdToggleBtn', 'CHD List');
          setTextById('govAqqToggleBtn', 'GOV/AQQ');
          setTextById('wchToggleBtn', 'WCH');
          setTextById('membershipToggleBtn', 'Membership');
          const wchList = Array.isArray(sy.wchList) ? sy.wchList : [];
          setTextById('wchSummary', `WCH total: ${wchList.length}`);
          renderWchPanel(document.getElementById('wchList'), wchList);
          const chdByBn = new Map(chdList.filter((p) => p.bn).map((p) => [String(p.bn).padStart(3, '0'), p]));
          const wchByBn = new Map(wchList.filter((p) => p.bn).map((p) => [String(p.bn).padStart(3, '0'), p]));
          currentSeatMapRecords = currentSeatMapRecords.map((record) => {
            const bn = record?.bn ? String(record.bn).padStart(3, '0') : '';
            const chd = bn ? chdByBn.get(bn) : null;
            const wch = bn ? wchByBn.get(bn) : null;
            return {
              ...record,
              hasChdCode: chd?.hasChdCode || record?.hasChdCode,
              isChild: Boolean(chd) || record?.isChild,
              codes: wch?.codes || record?.codes || []
            };
          });

          const membershipData = sy.membershipList || {};
          const counts = membershipData.counts || {};
          setTextById('membershipSummary', `白金卡 Platinum: ${counts.platinum || 0} • 金卡 Gold: ${counts.gold || 0} • 银卡 Sliver: ${counts.silver || 0}`);
          renderMembershipPanel(document.getElementById('membershipList'), membershipData);

          const govAqq = sy.govAqq || {};
          const duplicatePassports = Array.isArray(govAqq.duplicatePassports) ? govAqq.duplicatePassports : [];
          const aqqTclBnList = Array.isArray(govAqq.aqqTclBnList) ? govAqq.aqqTclBnList : [];
          const govDtaBnList = Array.isArray(govAqq.govDtaBnList) ? govAqq.govDtaBnList : [];
          const passportExpBnList = Array.isArray(govAqq.passportExpBnList) ? govAqq.passportExpBnList : [];
          const passportCodeIssues = Array.isArray(govAqq.passportCodeIssues) ? govAqq.passportCodeIssues : [];
          const passportCodeIssueDetails = Array.isArray(govAqq.passportCodeIssueDetails) ? govAqq.passportCodeIssueDetails : [];
          const duplicateReviewPairs = Array.isArray(govAqq.duplicateReviewPairs) ? govAqq.duplicateReviewPairs : [];
          const duplicatePassportBns = duplicatePassports.flatMap((item) => Array.isArray(item.bns) ? item.bns : []);
          const similarNameBns = duplicateReviewPairs.flatMap((item) => [item.bnA, item.bnB]);
          const visibleDuplicatePassportBns = visibleGovAqqIssueBns(duplicatePassportBns);
          const visibleAqqTclBns = visibleGovAqqIssueBns(aqqTclBnList);
          const visibleGovDtaBns = visibleGovAqqIssueBns(govDtaBnList);
          const visiblePassportExpBns = visibleGovAqqIssueBns(passportExpBnList);
          const visiblePassportCodeIssues = visibleGovAqqIssueBns(passportCodeIssues);
          const hasCoreRisk =
            visibleDuplicatePassportBns.length > 0 ||
            visibleAqqTclBns.length > 0 ||
            visibleGovDtaBns.length > 0 ||
            visiblePassportExpBns.length > 0;
          const hasReviewOnly = visiblePassportCodeIssues.length > 0;
          const govStatus = hasCoreRisk ? 'risk' : (hasReviewOnly ? 'review' : 'ok');
          currentGovAqqStatus = govStatus;
          updateGovAqqToggleAppearance(govStatus);
          setTextById('govAqqToggleBtn', 'GOV/AQQ');

          setGovAqqStats([
            { label: 'Duplicate Passport', value: visibleDuplicatePassportBns.length, level: 'risk' },
            { label: 'USA TIME OUT', value: visibleAqqTclBns.length, level: 'risk' },
            { label: 'CHN GOV FAIL', value: visibleGovDtaBns.length, level: 'risk' },
            { label: 'Passport Exp', value: visiblePassportExpBns.length, level: 'risk' },
            { label: 'WEB/EDI/Reswipe BN', value: visiblePassportCodeIssues.length, level: 'review' }
          ]);

          setTextById('govAqqSummary', govStatus === 'risk' ? 'Risk found' : (govStatus === 'review' ? 'Need review' : 'All clear'));
          const resultTitleEl = document.getElementById('govAqqResultTitle');
          const detailsTitleEl = document.getElementById('govAqqDetailsTitle');
          const detailsListEl = document.getElementById('govAqqDetailsList');
          const govIssueGroups = [
            { label: 'Duplicate Passport', bns: duplicatePassportBns },
            { label: 'USA TIME OUT', bns: aqqTclBnList },
            { label: 'CHN GOV FAIL', bns: govDtaBnList },
            { label: 'Passport Exp', bns: passportExpBnList },
            { label: 'WEB/EDI/Reswipe', bns: passportCodeIssues },
            { label: 'Need review (similar name)', bns: similarNameBns }
          ];
          resultTitleEl.style.display = 'block';
          detailsTitleEl.style.display = 'none';
          renderGovAqqIssueGroups(document.getElementById('govAqqList'), detailsListEl, govIssueGroups);

          setDisplayById('docToggleBtn', 'none');
          card.style.display = 'block';
          return;
        }

        if (isSYQuery) {
          card.style.display = 'none';
          error.innerText =
            'SY query did not return SY payload.';
          error.style.display =
            'block';
          return;
        }

        currentResultMode = 'PAX';
        setDisplayById('syLayout', 'none');
        hideSyAuxLayouts();
        setDisplayById('chdSection', 'none');
        setDisplayById('govAqqSection', 'none');
        setDisplayById('govAqqDetailsTitle', 'none');
        setDisplayById('govAqqDetailsList', 'none');
        setDisplayById('syToggleRow', 'none');
        setDisplayById('chdToggleBtn', 'none');
        setDisplayById('govAqqToggleBtn', 'none');
        setDisplayById('wchToggleBtn', 'none');
        setDisplayById('wchSection', 'none');
        setDisplayById('auditToggleBtn', 'none');
        setDisplayById('syActionMenuWrap', 'none');

        if (!data.flight || !data.flightDate || !data.name) {
          error.innerText =
            'Unexpected response format. Please refresh and retry.';
          error.style.display =
            'block';
          return;
        }

        // Flight
        document.getElementById(
          'flight'
        ).innerText =
          `✈️ ${data.flight}/${data.flightDate}`;

        // Name
        document.getElementById(
          'name'
        ).innerText =
          data.name;

        currentPassengerData = data;
        checkinPanelOpen = false;
        document.getElementById('checkinDetailList').innerHTML = '';

        // Seat / BN clickable detail
        const canOpenBnDetail =
          data.permissions?.canViewCheckinDetails ||
          data.permissions?.canView240Info;
        document.getElementById('seat').innerHTML =
          canOpenBnDetail
            ? `🎫 <span class="bn-link" onclick="toggleCheckinPanel()">BN${escapeHtml(data.bn)}</span> • ${escapeHtml(data.seat)} • ${escapeHtml(data.cabin)}`
            : `🎫 BN${escapeHtml(data.bn)} • ${escapeHtml(data.seat)} • ${escapeHtml(data.cabin)}`;

        // Docs button/panel
        const docBtn = document.getElementById('docToggleBtn');
        const docSec = document.getElementById('docSection');
        const docContent = document.getElementById('docContent');
        const docsHtml = buildTravelDocs(data);

        if (data.permissions?.canViewTravelDocs && docsHtml) {
          docBtn.style.display = 'inline-block';
          docContent.innerHTML = docsHtml;
          docPanelOpen = false;
          docSec.style.display = 'none';
          docBtn.innerText = '🪪';
        } else {
          docBtn.style.display = 'none';
          docSec.style.display = 'none';
          docContent.innerHTML = '';
        }

        // Membership
        const membershipNumber = `${data.ffCarrier || ''} ${data.ffNumber || ''}`.trim();
        const membershipStatus =
          data.membershipStatus ||
          (
            data.ffTier === 'V'
              ? 'Platinum'
              : data.ffTier === 'G'
              ? 'Gold'
              : data.ffTier === 'S'
              ? 'Silver'
              : data.ffTier === 'C'
              ? 'Regular'
              : data.ffTier === '1'
              ? 'Elite'
              : data.ffTier === '2'
              ? 'Elite Plus'
              : ''
          );
        if (data.permissions?.canViewMembership && (membershipNumber || membershipStatus)) {
          setSectionLabel('membershipSection', 'Membership');

          document.getElementById(
            'membershipSection'
          ).style.display =
            'block';

          document.getElementById(
            'ff'
          ).innerText =

            membershipNumber;

          document.getElementById(
            'ffStatus'
          ).innerText =

            membershipStatus;
        }

        else {

          document.getElementById(
            'membershipSection'
          ).style.display =
            'none';
        }

        // Ticket
        if (data.permissions?.canViewTicket) {

          document.getElementById(
            'ticketSection'
          ).style.display =
            'block';

          document.getElementById(
            'ticket'
          ).innerText =
            data.ticketNumber || 'N/A';
        }

        else {

          document.getElementById(
            'ticketSection'
          ).style.display =
            'none';
        }

        // Bags
        if (data.permissions?.canViewBags && data.bagtags && data.bagtags.length) {
          setSectionLabel('bagsSection', 'Passenger Bags');

          document.getElementById(
            'bagsSection'
          ).style.display =
            'block';

          document.getElementById(
            'bags'
          ).innerText =
            data.bagtags.join('\n');
        }

        else {

          document.getElementById(
            'bagsSection'
          ).style.display =
            'none';
        }

        // Inbound
        if (data.permissions?.canViewInbound && data.inbound) {

          document.getElementById(
            'inboundSection'
          ).style.display =
            'block';

          document.getElementById(
            'inbound'
          ).innerText =

            `${data.inbound.flight || '-'} / ${data.inbound.date || '-'}\nFrom ${data.inbound.origin || '-'}`;
        }

        else {

          document.getElementById(
            'inboundSection'
          ).style.display =
            'none';
        }

        // Outbound
        if (data.permissions?.canViewOutbound && data.outbound) {

          document.getElementById(
            'outboundSection'
          ).style.display =
            'block';

          document.getElementById(
            'outbound'
          ).innerText =

            `${data.outbound.flight || '-'} / ${data.outbound.date || '-'}${data.outbound.bn ? ` • BN${data.outbound.bn}` : ''}${data.outbound.seat ? ` • ${data.outbound.seat}` : ''}${data.outbound.status === 'DELETED' ? ' • DELETED' : ''}
To ${data.outbound.destination || '-'}`
        }

        else {

          document.getElementById(
            'outboundSection'
          ).style.display =
            'none';
        }

        // Special Service
        if (data.permissions?.canViewSpecialService && data.specialServices && data.specialServices.length) {
          document.getElementById('ssrSection').style.display = 'block';
          document.getElementById('ssr').innerText = data.specialServices.join(', ');
        } else {
          document.getElementById('ssrSection').style.display = 'none';
        }

        // Special Meal
        if (data.permissions?.canViewSpecialMeals && data.specialMeals && data.specialMeals.length) {
          document.getElementById('mealSection').style.display = 'block';
          document.getElementById('meal').innerText = data.specialMeals.join(', ');
        } else {
          document.getElementById('mealSection').style.display = 'none';
        }

        // Paid Service
        if (data.permissions?.canViewPaidService && ((data.paidProductsShort && data.paidProductsShort.length) || (data.paidProducts && data.paidProducts.length))) {
          document.getElementById('paidSection').style.display = 'block';
          if (data.paidProductsShort && data.paidProductsShort.length) {
            document.getElementById('paid').innerText = data.paidProductsShort.join('\n');
          } else if (data.paidProducts && data.paidProducts.length) {
            document.getElementById('paid').innerText = data.paidProducts.join('\n');
          }
        } else {
          document.getElementById('paidSection').style.display = 'none';
        }

        const loungeSection = document.getElementById('loungeSection');
        const loungeLabel = document.getElementById('loungeLabel');
        const loungeValue = document.getElementById('lounge');
        const guestLabel = document.getElementById('guestLabel');
        const guestValue = document.getElementById('guest');
        loungeSection.style.display = 'block';
        loungeLabel.style.display = 'block';
        loungeValue.style.display = 'block';
        guestLabel.style.display = 'block';
        guestValue.style.display = 'block';
        loungeValue.innerHTML =
          data.lounge?.eligible === true
            ? '<span class="yes">✅ Eligible</span>'
            : data.permissions?.canViewLoungeAccess
            ? '<span class="no">❌ Not Eligible</span>'
            : 'N/A';
        guestValue.innerHTML =
          data.lounge?.guest === true
            ? '<span class="yes">✅ Allowed</span>'
            : data.permissions?.canViewGuestAccess
            ? '<span class="no">❌ Not Allowed</span>'
            : 'N/A';

        // Show
        card.style.display =
          'block';

      }

    // ===========================
    // Enter Key
    // ===========================
    document
      .getElementById('query')
      .addEventListener(
        'keypress',
        function(e) {

          if (e.key === 'Enter') {

            searchPassenger();
          }
        }
      );

  </script>
<script type="module">

  import { initializeApp }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

  import { getAnalytics }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

  import {
    getAuth,
    onAuthStateChanged,
    signOut,
    setPersistence,
    browserSessionPersistence,
    updatePassword
  }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAWsXBuQJTBmNKi6gLgnkZUZ4OfK1IRuXo",
    authDomain: "china-eastern.firebaseapp.com",
    projectId: "china-eastern",
    storageBucket: "china-eastern.firebasestorage.app",
    messagingSenderId: "30017158772",
    appId: "1:30017158772:web:874a69fdb75b8d3d315b21",
    measurementId: "G-22T9MHC42Y"
  };

  const app =
    initializeApp(firebaseConfig);

  getAnalytics(app);

  const auth =
    getAuth(app);

  const INACTIVITY_TIMEOUT_MS =
    15 * 60 * 1000;

  let inactivityTimer = null;

  const isPageReload =
    performance.getEntriesByType('navigation')[0]?.type === 'reload';

  function resetInactivityTimer() {
    if (!window.currentUser) return;

    clearTimeout(inactivityTimer);

    inactivityTimer = setTimeout(async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error('Auto logout failed:', error);
      }
    }, INACTIVITY_TIMEOUT_MS);
  }

  function bindInactivityEvents() {
    const events = ['click', 'keydown', 'mousemove', 'scroll', 'touchstart'];

    events.forEach((eventName) => {
      window.addEventListener(eventName, resetInactivityTimer, { passive: true });
    });
  }

  await setPersistence(
    auth,
    browserSessionPersistence
  );

  bindInactivityEvents();

  onAuthStateChanged(auth, async (user) => {
    window.currentUser = user || null;

    if (isPageReload && user) {
      try {
        await signOut(auth);
      } catch (error) {
        console.error('Reload logout failed:', error);
      }
      return;
    }

    if (!user) {

      clearTimeout(inactivityTimer);

      window.location.href =
        "login.html";

      return;
    }

    console.log(
      "Firebase Logged in:",
      user.email
    );

    const userEmailBox =
      document.getElementById("userEmail");

    if (userEmailBox) {

      userEmailBox.textContent =
        user.email;
    }

    document.getElementById("mainApp").style.display =
      "block";

    resetInactivityTimer();

    if (!hasAutoLoadedSyToday) {
      hasAutoLoadedSyToday = true;
      const queryInput = document.getElementById('query');
      if (queryInput) {
        queryInput.value = 'SY';
        searchPassenger();
      }
    }
  });


  window.openChangePasswordPage = function () {
    document.getElementById('changePasswordPage').style.display = 'block';
    document.getElementById('mainApp').querySelector('.search-box').style.display = 'none';
    document.getElementById('card').style.display = 'none';
    const errorBox = document.getElementById('error');
    errorBox.style.display = 'none';
  };

  window.closeChangePasswordPage = function () {
    document.getElementById('changePasswordPage').style.display = 'none';
    document.getElementById('mainApp').querySelector('.search-box').style.display = 'flex';
  };

  window.submitPasswordChange = async function () {
    const input = document.getElementById('changePasswordInput');
    const errorBox = document.getElementById('error');
    const newPassword = (input?.value || '').trim();

    if (!auth.currentUser) {
      errorBox.innerText = '用户未登录，无法修改密码。';
      errorBox.style.display = 'block';
      return;
    }

    if (!newPassword) {
      errorBox.innerText = '请输入新密码。';
      errorBox.style.display = 'block';
      return;
    }

    try {
      await updatePassword(auth.currentUser, newPassword);
      await signOut(auth);
      window.location.href = 'login.html';
    } catch (err) {
      errorBox.innerText = err?.message || '密码修改失败。';
      errorBox.style.display = 'block';
    }
  };

  window.logout = async function () {

    await signOut(auth);

    window.location.href =
      "login.html";
  };

</script>
