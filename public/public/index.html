<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    MUFC System
  </title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;
      padding: 0;

      background: #0f172a;

      color: white;

      font-family:
        Arial,
        sans-serif;

      min-height: 100vh;

      display: flex;

      justify-content: center;
    }

    .container {

      width: 100%;

      max-width: 460px;

      padding: 20px;
    }

    .title {

      font-size: 30px;

      font-weight: bold;

      margin-bottom: 6px;
    }

    .subtitle {

      color: #94a3b8;

      font-size: 14px;

      margin-bottom: 24px;

      line-height: 1.5;
    }

    .card {

      background: #111827;

      border-radius: 20px;

      padding: 20px;

      box-shadow:
        0 0 25px rgba(0,0,0,0.35);
    }
    input {

      width: 100%;

      padding: 14px;

      margin-bottom: 14px;

      border: none;

      border-radius: 14px;

      background: #1e293b;

      color: white;

      font-size: 15px;
    }

    button {

      border: none;

      background: #2563eb;

      color: white;

      border-radius: 14px;

      padding: 14px;

      font-size: 15px;

      cursor: pointer;
    }

    button:hover {

      background: #1d4ed8;
    }

    .search-box {

      display: flex;

      gap: 10px;

      margin-bottom: 20px;
    }

    .search-box input {

      margin-bottom: 0;
    }

    .search-box button {

      min-width: 100px;
    }

    #mainApp {

      display: none;
    }

    #card {

      display: none;
    }

    .flight {

      font-size: 24px;

      font-weight: bold;

      margin-bottom: 18px;
    }

    .name {

      font-size: 28px;

      font-weight: bold;

      margin-bottom: 10px;
    }

    .seat {

      color: #cbd5e1;

      margin-bottom: 22px;

      font-size: 15px;
    }

    .divider {

      height: 1px;

      background: rgba(255,255,255,0.08);

      margin:
        18px 0;
    }

    .section {

      margin-bottom: 18px;
    }
    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .grid-two .section {
      margin-bottom: 0;
    }

    .label {

      color: #60a5fa;

      text-transform: uppercase;

      font-size: 11px;

      letter-spacing: 1px;

      margin-bottom: 6px;
    }

    .value {

      white-space: pre-line;

      line-height: 1.6;

      font-size: 16px;
    }

    .yes {

      color: #22c55e;

      font-weight: bold;
    }

    .no {

      color: #ef4444;

      font-weight: bold;
    }

    .error {

      display: none;

      background: #7f1d1d;

      border-radius: 12px;

      padding: 12px;

      margin-top: 15px;

      font-size: 14px;
    }
    .chd-toggle-btn {
      width: auto;
      background: #1d4ed8;
      padding: 6px 14px;
      border-radius: 999px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
      border: none;
    }
    .chd-toggle-btn.is-good {
      background: #16a34a;
    }
    .chd-toggle-btn.is-bad {
      background: #dc2626;
    }
    .chd-toggle-btn.is-review {
      background: #eab308;
      color: #0f172a;
    }
    .chd-toggle-btn.is-disabled {
      background: #16a34a;
      opacity: 1;
      cursor: pointer;
      pointer-events: auto;
    }
    .sy-toggle-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      padding-bottom: 4px;
    }
    .sy-toggle-row::-webkit-scrollbar { height: 6px; }
    .sy-toggle-row::-webkit-scrollbar-thumb { background: rgba(148,163,184,.55); border-radius: 999px; }
    .sy-toggle-row .chd-toggle-btn { flex: 0 0 auto; white-space: nowrap; }
    .chd-summary {
      margin-top: 10px;
      color: #fca5a5;
      font-size: 14px;
    }
    .chd-list {
      margin-top: 8px;
      white-space: pre-line;
      font-size: 13px;
      line-height: 1.5;
      color: #e2e8f0;
    }
    .bn-highlight {
      color: #fde047;
      font-weight: 700;
    }
    .govaqq-details-title {
      margin-top: 8px;
      color: #60a5fa;
      font-size: 14px;
      font-weight: 700;
    }
    .govaqq-result-title {
      margin-top: 4px;
      color: #60a5fa;
      font-size: 14px;
      font-weight: 700;
    }
    .govaqq-stats {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 12px;
      row-gap: 4px;
      align-items: baseline;
      font-size: 12px;
      line-height: 1.5;
      color: #e2e8f0;
    }
    .govaqq-stats .stat-label {
      color: #cbd5e1;
    }
    .govaqq-stats .stat-value {
      min-width: 20px;
      text-align: right;
      font-weight: 700;
      color: #ffffff;
    }
    .govaqq-stats .stat-value.is-danger {
      color: #ef4444;
    }

    .auth-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #1e293b;
      color: #cbd5e1;
      font-size: 13px;
    }

    .auth-bar strong {
      color: #ffffff;
      font-weight: 600;
    }

    .logout-btn {
      padding: 8px 12px;
      font-size: 11px;
      border-radius: 10px;
      background: #334155;
    }

    .logout-btn:hover {
      background: #475569;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 10px;
    }

    .app-header .title {
      margin-bottom: 0;
    }

    .help-btn {
      padding: 7px 11px;
      font-size: 11px;
      border-radius: 999px;
      background: #334155;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .help-btn:hover {
      background: #475569;
    }

    .help-panel {
      display: none;
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.55;
    }

    .password-page { margin-top: 16px; }
    .password-card { background:#0b1833; border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:20px; }
    .password-card input { width:100%; background:#1f2a44; border:1px solid #3b4661; border-radius:10px; color:#fff; padding:10px; margin-bottom:12px; }
    .password-actions { display:flex; gap:10px; }

    .flight-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .flight-row .flight {
      margin-bottom: 0;
    }

    .doc-icon-btn {
      display: none;
      padding: 4px 8px;
      font-size: 22px;
      line-height: 1;
      border-radius: 10px;
      background: transparent;
    }

    .doc-icon-btn:hover {
      background: #1e293b;
    }

    .doc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
      font-size: 14px;
      line-height: 1.35;
    }

    .doc-item span {
      display: block;
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 2px;
    }

    .doc-item b {
      color: white;
      font-weight: 600;
    }


    .bn-link {
      color: #ffffff;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .bn-link:hover {
      color: #93c5fd;
    }

    .detail-card {
      display: none;
      background: #111827;
      border-radius: 20px;
      padding: 18px 20px;
      margin-top: 16px;
      box-shadow: 0 0 25px rgba(0,0,0,0.35);
    }

    .detail-title {
      color: #60a5fa;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .detail-content {
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 14px;
      color: #e5e7eb;
      word-break: break-word;
    }

    .mini-btn {
      padding: 8px 12px;
      font-size: 11px;
      border-radius: 10px;
      background: #334155;
    }
    .mini-btn:hover {
      background: #475569;
    }

  
    .sy-layout { margin-top: 8px; }
    .sy-row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .sy-row-full { grid-template-columns: 1fr; }
    .sy-cell .label { margin-bottom: 4px; }
    .sy-label-row { display:flex; align-items:center; gap:6px; }
    .sales-report-trigger { display:none; cursor:pointer; font-size:15px; line-height:1; }
    .sales-report-pop {
      display:none; position:absolute; z-index:1000; margin-top:6px; background:#102042; border:1px solid rgba(147,197,253,.45);
      border-radius:10px; padding:8px; min-width:150px; box-shadow:0 8px 18px rgba(0,0,0,.35);
    }
    .sales-download-btn { background:#1d4ed8; border-radius:9px; padding:6px 10px; font-size:12px; width:100%; }
    .sales-download-btn:disabled { background:#475569; cursor:not-allowed; }
    .wch-btn { background:#16a34a; color:#ffffff; }
    .membership-btn { background:#22c55e; color:#052e16; }
    .membership-summary { color: #86efac; }
    .membership-list {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.5;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      overflow-x: hidden;
    }
    .membership-group-title {
      color: #bbf7d0;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .membership-row {
      display: grid;
      width: 100%;
      grid-template-columns: 56px minmax(120px, 1fr) 40px 28px minmax(0, 1fr);
      gap: 8px;
      align-items: baseline;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .membership-row .member-bn { color: #fde047; font-weight: 700; }
    .membership-row .member-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .membership-row .member-seat { text-align: center; }
    .membership-row .member-cabin { text-align: center; color: #93c5fd; font-weight: 700; }
    .membership-row .member-ff {
      min-width: 0;
      text-align: right;
      justify-self: end;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .membership-empty { color: #94a3b8; }
    .uniform-list {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.5;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      overflow-x: hidden;
    }
    .uniform-row {
      display: grid;
      width: 100%;
      gap: 8px;
      align-items: baseline;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .uniform-row.wch { grid-template-columns: 56px minmax(120px, 1fr) 48px minmax(72px, .8fr); }
    .uniform-row.chd { grid-template-columns: 56px minmax(120px, 1fr) minmax(72px, .8fr) minmax(88px, 1fr); }
    .uniform-bn { color: #fde047; font-weight: 700; }
    .uniform-name, .uniform-extra, .uniform-status { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .uniform-seat, .uniform-codes { text-align: center; }
    .uniform-codes { color: #93c5fd; font-weight: 700; }
    .wchc-code { color: #ef4444; font-weight: 800; }


    .clickable { cursor: pointer; }
    .back-btn { background:none; border:none; color:#93c5fd; cursor:pointer; padding:0; margin-bottom:8px; }
    .bag-detail-card { margin-top: 12px; border:none; border-radius:0; padding:0; display:flex; flex-direction:column; align-items:flex-end; }
    .bag-table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .bag-table { width:100%; border-collapse:collapse; margin-top:6px; table-layout: fixed; }
    .bag-table th, .bag-table td { border:1px solid #334155; padding:10px 12px; text-align:left; font-size:15px; vertical-align: top; }
    .bag-table th { background: #16243b; color: #dbeafe; font-weight: 700; white-space: nowrap; word-break: normal; }
    .bag-table td { background: #0f1b31; white-space: normal; word-break: break-word; overflow-wrap:anywhere; }

    .bag-table.rush-table col:nth-child(1),
    .bag-table.rush-table col:nth-child(2),
    .bag-table.rush-table col:nth-child(3),
    .bag-table.rush-table col:nth-child(4) { width: 25%; }
    .bag-table.rush-table th, .bag-table.rush-table td { white-space: nowrap; word-break: normal; overflow-wrap: normal; }

    .bag-table.notload-table col:nth-child(1) { width: 31%; }
    .bag-table.notload-table col:nth-child(2) { width: 10%; }
    .bag-table.notload-table col:nth-child(3) { width: 59%; }
    .bag-table.notload-table th:nth-child(2), .bag-table.notload-table td:nth-child(2) { text-align:center; }
    .audit-icon-btn { border:none; background:transparent; color:#8fb8ff; cursor:pointer; font-size:18px; line-height:1; padding:2px 4px; }
    .audit-sheet { margin-top: 12px; max-height: 520px; overflow:auto; border:1px solid rgba(160,190,255,.3); border-radius:12px; }
    .audit-sheet table { width:100%; border-collapse:collapse; font-size:12px; }
    .audit-sheet th, .audit-sheet td { border:1px solid rgba(160,190,255,.2); padding:3px 4px; text-align:center; }
    .audit-sheet th { position:sticky; top:0; background:#132347; z-index:1; }
    .audit-sheet .status-dot { font-size:12px; line-height:1; }
    .audit-sheet .status-dot.has-reason { cursor:pointer; }
    .status-reason-pop {
      position: fixed;
      z-index: 9999;
      max-width: 220px;
      background: #101b34;
      color: #eaf2ff;
      border: 1px solid rgba(160,190,255,.35);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 8px 20px rgba(0,0,0,.35);
      display: none;
      pointer-events: none;
    }
    .audit-sheet th:first-child, .audit-sheet td:first-child { width: 12%; }
    .audit-sheet th:nth-child(n+2), .audit-sheet td:nth-child(n+2) { width: 11%; }
    .audit-sheet td:first-child b { color:#ffd84d; font-size:16px; letter-spacing:.3px; }

  </style>

</head>

<body>

  <div class="container">

    <!-- MAIN -->
    <div id="mainApp">

      <div class="auth-bar">
        <span>
          Logged in as:
          <strong id="userEmail"></strong>
        </span>

        <button
          class="logout-btn"
          onclick="logout()"
        >
          Logout
        </button>
      </div>

      <div class="app-header">
        <div class="title">
          MUFC
        </div>

        <button
          class="help-btn"
          onclick="openChangePasswordPage()"
        >
          Change Password
        </button>
      </div>


      <div class="search-box">

        <input
          id="query"
          placeholder="Enter Search"
        >

        <button onclick="searchPassenger()">
          Search
        </button>

      </div>

      <div
        id="error"
        class="error"
      ></div>

      <!-- CARD -->
      <div
        id="card"
        class="card"
      >
        <div class="flight-row">
          <div
            id="flight"
            class="flight"
          ></div>

          <button
            id="docToggleBtn"
            class="doc-icon-btn"
            onclick="toggleDocPanel()"
            title="Travel Docs"
          >
            🪪
          </button>
          <button id="auditToggleBtn" class="audit-icon-btn" onclick="showBnAuditPage()" title="BN Audit" style="display:none;">📋</button>
        </div>

        <div
          id="name"
          class="name"
        ></div>

        <div
          id="seat"
          class="seat"
        ></div>

        <div id="syLayout" class="sy-layout" style="display:none;">
          <div class="sy-row">
            <div class="sy-cell"><div class="label">Registration</div><div id="syAircraft" class="value"></div></div>
            <div class="sy-cell"><div class="label">GATE</div><div id="syGate" class="value"></div></div>
          </div>
          <div class="sy-row">
            <div class="sy-cell"><div class="label">BDT/SD/ED</div><div id="syTimes" class="value"></div></div>
            <div id="syBagsCell" class="sy-cell"><div id="syBagsLabel" class="label">BAGS</div><div id="syBags" class="value"></div></div>
          </div>
          <div class="sy-row sy-row-full">
            <div class="sy-cell"><div class="label">RK message</div><div id="syRk" class="value"></div></div>
          </div>
          <div class="sy-row">
            <div class="sy-cell"><div class="label">Reservation</div><div id="syRes" class="value"></div></div>
            <div class="sy-cell"><div class="label">Reservation(TKT)</div><div id="syResTkt" class="value"></div></div>
          </div>
          <div class="sy-row">
            <div class="sy-cell"><div class="label">Check-in</div><div id="syCi" class="value"></div></div>
            <div class="sy-cell">
              <div class="label sy-label-row">Check-in(TKT) <span id="salesReportTrigger" class="sales-report-trigger">💲</span></div>
              <div id="salesReportPop" class="sales-report-pop"><button id="salesDownloadBtn" class="sales-download-btn" onclick="downloadSalesReport()">💾 Download Sales Report</button></div>
              <div id="syCiTkt" class="value"></div>
            </div>
          </div>
          <div id="syToggleRow" class="sy-toggle-row" style="display:none;">
            <button id="chdToggleBtn" class="chd-toggle-btn" style="display:none;" onclick="toggleChdPanel()">CHD List</button>
            <button id="govAqqToggleBtn" class="chd-toggle-btn" style="display:none;" onclick="toggleGovAqqPanel()">GOV/AQQ</button>
            <button id="wchToggleBtn" class="chd-toggle-btn wch-btn" style="display:none;" onclick="toggleWchPanel()">WCH</button>
            <button id="membershipToggleBtn" class="chd-toggle-btn membership-btn" style="display:none;" onclick="toggleMembershipPanel()">Membership</button>
          </div>
          <div id="chdSection" style="display:none;">
            <div id="chdSummary" class="chd-summary"></div>
            <div id="chdList" class="uniform-list"></div>
          </div>
          <div id="govAqqSection" style="display:none;">
            <div id="govAqqSummary" class="chd-summary"></div>
            <div id="govAqqStats" class="govaqq-stats"></div>
            <div id="govAqqResultTitle" class="govaqq-result-title" style="display:none;">Result:</div>
            <div id="govAqqList" class="chd-list"></div>
            <div id="govAqqDetailsTitle" class="govaqq-details-title" style="display:none;">Details:</div>
            <div id="govAqqDetailsList" class="chd-list" style="display:none;"></div>
          </div>
          <div id="wchSection" style="display:none;">
            <div id="wchSummary" class="chd-summary"></div>
            <div id="wchList" class="uniform-list"></div>
          </div>
          <div id="membershipPanelSection" style="display:none;">
            <div id="membershipSummary" class="chd-summary membership-summary"></div>
            <div id="membershipList" class="membership-list"></div>
          </div>
        </div>

        <div id="syBagDetailLayout" class="sy-layout" style="display:none;">
          <button class="back-btn" onclick="showSyFlightCard()">← Back</button>
          <div id="syBagDetailContent"></div>
        </div>
        <div id="syAuditLayout" class="sy-layout" style="display:none;">
          <button class="back-btn" onclick="showSyFlightCard()">← Back</button>
          <div id="syAuditContent"></div>
        </div>

        <div
          id="docSection"
          class="section"
          style="display:none;"
        >
          <div class="divider"></div>
          <div class="label">Travel Docs</div>
          <div id="docContent" class="value"></div>
        </div>

        <div class="grid-two">
        <!-- Membership -->
        <div
          id="membershipSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Membership
          </div>

          <div
            id="ff"
            class="value"
          ></div>

          <div
            id="ffStatus"
            class="value"
          ></div>

        </div>

        <!-- Ticket -->
        <div
          id="ticketSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Ticket
          </div>

          <div
            id="ticket"
            class="value"
          ></div>

        </div>

        <!-- Bags -->
        <div
          id="bagsSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Bags
          </div>

          <div
            id="bags"
            class="value"
          ></div>

        </div>

        <!-- Inbound -->
        <div
          id="inboundSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Inbound
          </div>

          <div
            id="inbound"
            class="value"
          ></div>

        </div>

        <!-- Outbound -->
        <div
          id="outboundSection"
          class="section"
          style="display:none;"
        >

          <div class="divider"></div>

          <div class="label">
            Outbound
          </div>

    window.MU_API_BASE = 'https://api.mufcapp.net';

        function resolveApiBase() {
      const fromWindow = window.MU_API_BASE || '';
      const fromStorage = localStorage.getItem('mu_api_base') || '';

      const normalizedWindow = fromWindow.trim().replace(/\/$/, '');
      const normalizedStorage = fromStorage.trim().replace(/\/$/, '');

      if (normalizedWindow) return normalizedWindow;
      if (normalizedStorage) return normalizedStorage;

      return '';
    }

    function promptAndSaveApiBase() {
      const input = window.prompt(
        '未检测到后端地址。请输入机器人后端域名（例如 https://api.mufcapp.net ）',
        'https://'
      );
      if (!input) return '';
      const normalized = input.trim().replace(/\/$/, '');
      if (!/^https?:\/\//i.test(normalized)) return '';
      localStorage.setItem('mu_api_base', normalized);
      return normalized;
    }


    function escapeHtml(value) {
      return (value || '')
        .toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getRawRecordText(data) {
      const possibleFields = [
        data?.rawRecord,
        data?.fullRecord,
        data?.record,
        data?.raw,
        data?.rawText,
        data?.originalText,
        data?.passengerRecord,
        data?.latestRecord,
        data?.sourceRecord,
        data?.sourceText,
        data?.log
      ];

      return possibleFields
        .filter(Boolean)
        .map(x => Array.isArray(x) ? x.join('\n') : x.toString())
        .join('\n');
    }

    function normalizeDetailLine(line) {
      return (line || '')
        .toString()
        .replace(/[\u001c-\u001f]/g, '')
        .trimEnd();
    }

    function dedupeLines(lines) {
      return [...new Set((lines || []).filter(Boolean))];
    }
    function setSectionLabel(sectionId, text) {
      const section = document.getElementById(sectionId);
      if (!section) return;
      const label = section.querySelector('.label');
      if (label) label.innerText = text;
    }

    function parseCheckinGroups(data) {
      const psmLines = dedupeLines((data?.psmLines || [])
        .map(normalizeDetailLine)
        .filter(line => /^PSM\b/i.test(line)));

      const ckinLines = dedupeLines((data?.ckinLines || [])
        .map(normalizeDetailLine)
        .filter(line => /^CKIN\b/i.test(line)));

      const operationHistoryLines = dedupeLines((data?.operationHistoryLines || [])
        .map(normalizeDetailLine)
        .filter(line => /^[A-Z]{2,3}\s+[A-Z]{3}\d{5,}\s+AGT\d+\/\d{2}[A-Z]{3}\d{4}/i.test(line)));

      const detailLines = [
        ...psmLines,
        ...ckinLines,
        ...operationHistoryLines
      ];

      if (!detailLines.length) {
        return [];
      }

      return [{
        header: 'Check-in Details',
        detailLines
      }];
    }

    function toggleCheckinPanel() {
      const list = document.getElementById('checkinDetailList');

      if (!currentPassengerData) return;

      checkinPanelOpen = !checkinPanelOpen;

      if (!checkinPanelOpen) {
        list.innerHTML = '';
        return;
      }

      const canViewCheckin =
        currentPassengerData?.permissions?.canViewCheckinDetails;
      const canView240 =
        currentPassengerData?.permissions?.canView240Info;

      const groups =
        canViewCheckin
          ? parseCheckinGroups(currentPassengerData)
          : [];
      const cards = [];

      if (groups.length) {
        cards.push(...groups.map(group => `
        <div class="detail-card" style="display:block;">
          <div class="detail-title">${escapeHtml(group.header)}</div>
          <div class="detail-content">${escapeHtml(group.detailLines.join('\n'))}</div>
        </div>
      `));
      }

      const extra =
        canView240
          ? (
            currentPassengerData?.info240 ||
            currentPassengerData?.info240Data ||
            currentPassengerData?.extra240 ||
            null
          )
          : null;
      if (extra && Object.values(extra).some(Boolean)) {
        const extraLines = [
          extra.passportCountry ? `Passport Country: ${extra.passportCountry}` : '',
          extra.passportExpiry ? `Passport Expiry: ${extra.passportExpiry}` : '',
          extra.leaveChinaAt ? `Leave China At: ${extra.leaveChinaAt}` : '',
          extra.destination ? `Destination: ${extra.destination}` : '',
          extra.agentSubmitter ? `Agent Submit: ${extra.agentSubmitter}` : ''
        ].filter(Boolean);

        if (extraLines.length) {
          cards.push(`
            <div class="detail-card" style="display:block;">
              <div class="detail-title">240 info</div>
              <div class="detail-content">${escapeHtml(extraLines.join('\n'))}</div>
            </div>
          `);
        }
      }

      if (!cards.length) {
        list.innerHTML = '';
        checkinPanelOpen = false;
        return;
      }

      list.innerHTML = cards.join('');
    }

    
    function hideSyAuxLayouts() {
      setDisplayById('syBagDetailLayout', 'none');
      setDisplayById('syAuditLayout', 'none');
    }

    function showSyFlightCard() {
      if (currentResultMode !== 'SY') {
        setDisplayById('syLayout', 'none');
        hideSyAuxLayouts();
        return;
      }
      setDisplayById('syLayout', 'block');
      hideSyAuxLayouts();
    }
    function escapeAttr(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
    function emojiByStatus(status) {
      if (status === 'pass') return '✅';
      if (status === 'review') return '⚠️';
      if (status === 'fail') return '❌';
      return '⚪';
    }
    function reasonFor(row, key) {
      if (!row) return '';
      if (key === 'api') return row.apiReason || '';
      if (key === 'tk') return row.tkReason || '';
      if (key === 'visa') return row.visaReason || '';
      if (key === 'bag') return row.bagReason || '';
      return '';
    }
    function buildStatusDot(status, reason, key) {
      const emoji = emojiByStatus(status);
      if (status === 'pass' || !reason) return `<span class="status-dot">${emoji}</span>`;
      const safeReason = escapeAttr(reason);
      return `<span class="status-dot has-reason" data-reason="${safeReason}" data-key="${key}" title="${safeReason}">${emoji}</span>`;
    }
    function ensureStatusReasonPop() {
      let el = document.getElementById('statusReasonPop');
      if (!el) {
        el = document.createElement('div');
        el.id = 'statusReasonPop';
        el.className = 'status-reason-pop';
        document.body.appendChild(el);
      }
      return el;
    }
    function showStatusReason(anchor, text) {
      if (!anchor || !text) return;
      const pop = ensureStatusReasonPop();
      pop.textContent = text;
      pop.style.display = 'block';
      const rect = anchor.getBoundingClientRect();
      const popRect = pop.getBoundingClientRect();
      const top = Math.max(8, rect.top - popRect.height - 8);
      const left = Math.max(8, Math.min(window.innerWidth - popRect.width - 8, rect.left + (rect.width / 2) - (popRect.width / 2)));
      pop.style.top = `${top}px`;
      pop.style.left = `${left}px`;
    }
    function hideStatusReason() {
      const pop = document.getElementById('statusReasonPop');
      if (pop) pop.style.display = 'none';
    }
    document.addEventListener('click', hideStatusReason);
    function showBnAuditPage() {
      const byBn = new Map((currentBnAudit || []).map((x) => [x.bn, x]));
      const rows = [];
      for (let i = 1; i <= 320; i += 1) {
        const bn = String(i).padStart(3, '0');
        const row = byBn.get(bn);
        rows.push(`<tr>
          <td><b>${i}</b></td>
          <td>${buildStatusDot(row?.apiStatus, reasonFor(row, 'api'), 'api')}</td>
          <td>${buildStatusDot(row?.tkStatus, reasonFor(row, 'tk'), 'tk')}</td>
          <td>${buildStatusDot(row?.visaStatus, reasonFor(row, 'visa'), 'visa')}</td>
          <td>${buildStatusDot(row?.bagStatus, reasonFor(row, 'bag'), 'bag')}</td>
        </tr>`);
      }
      document.getElementById('syAuditContent').innerHTML = `<div class="detail-title" style="text-align:right; font-size:16px; font-weight:800; letter-spacing:.4px;">Security Check</div>
        <div class="audit-sheet"><table><thead><tr><th>BN</th><th>API</th><th>TK</th><th>VISA</th><th>BAG</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
      const content = document.getElementById('syAuditContent');
      content.querySelectorAll('.status-dot.has-reason').forEach((el) => {
        el.addEventListener('mouseenter', () => showStatusReason(el, el.dataset.reason || ''));
        el.addEventListener('mouseleave', hideStatusReason);
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const pop = ensureStatusReasonPop();
          if (pop.style.display === 'block' && pop.textContent === (el.dataset.reason || '')) {
            hideStatusReason();
            return;
          }
          showStatusReason(el, el.dataset.reason || '');
        });
      });
      setDisplayById('syLayout', 'none');
      setDisplayById('syBagDetailLayout', 'none');
      setDisplayById('syAuditLayout', 'block');
    }

    function formatRushTagValue(value) {
      const raw = String(value || '').trim().toUpperCase();
      if (!raw) return '';
      if (/^\d+$/.test(raw)) return raw.slice(-6);
      if (/^[A-Z]{2}[A-Z0-9]+$/.test(raw)) return `${raw.slice(0, 2)}${raw.slice(-6)}`;
      return raw;
    }

    function formatBagCellValue(title, colIdx, value) {
      const text = String(value || '');
      if (title === 'RUSH BAGS' && (colIdx === 0 || colIdx === 1)) {
        return formatRushTagValue(text);
      }
      if (title === 'NOT LOAD BAGS' && colIdx === 0) {
        return formatRushTagValue(text);
      }
      if (title === 'NOT LOAD BAGS' && colIdx === 1) {
        const upper = text.trim().toUpperCase();
        if (upper === 'LOADED') return '✅';
        if (upper === 'NOT LOADED') return '❌';
      }
      return text;
    }

    function buildBagSectionHtml(title, config) {
      const headers = Array.isArray(config?.headers) ? config.headers : [];
      const rows = Array.isArray(config?.rows) ? config.rows : [];
      if (!headers.length || !rows.length) return '';

      const headerRow = headers.map((header) => `<th>${escapeHtml(header)}</th>`).join('');
      const valueRows = rows.map((row) => `
        <tr>${row.map((value, colIdx) => `<td>${escapeHtml(formatBagCellValue(title, colIdx, value) || '') || '-'}</td>`).join('')}</tr>
      `).join('');

      return `
        <div class="bag-detail-card">
          <div class="detail-title" style="font-weight:700; letter-spacing:.5px;">${escapeHtml(title)}</div>
          <div class="bag-table-wrap">
            <table class="bag-table ${title === 'RUSH BAGS' ? 'rush-table' : (title === 'NOT LOAD BAGS' ? 'notload-table' : '')}">
              <colgroup>
                ${headers.map(() => '<col>').join('')}
              </colgroup>
            <thead>
              <tr>${headerRow}</tr>
            </thead>
            <tbody>
              ${valueRows}
            </tbody>
          </table>
          </div>
        </div>
      `;
    }

    function showSyBagDetailCard() {
      if (!currentSyBagSheet || !currentSyBagSheet.hasData) return;
      const rushRows = currentSyBagSheet.rushBags?.rows || (currentSyBagSheet.rushBags?.columns ? [currentSyBagSheet.rushBags.columns] : []);
      const notLoadRows = currentSyBagSheet.notLoadBags?.rows || (currentSyBagSheet.notLoadBags?.columns ? [currentSyBagSheet.notLoadBags.columns] : []);
      const sections = [];
      if (rushRows.length) {
        sections.push(buildBagSectionHtml('RUSH BAGS', {
          headers: ['RUSH #', 'ORIG #', 'TO', 'AKE'],
          rows: rushRows.map((row) => row.slice(0, 4))
        }));
      }
      if (notLoadRows.length) {
        sections.push(buildBagSectionHtml('NOT LOAD BAGS', {
          headers: ['TAG #', 'ST', 'RMK'],
          rows: notLoadRows
        }));
      }
      document.getElementById('syBagDetailContent').innerHTML = sections.join('');
      setDisplayById('syLayout', 'none');
      setDisplayById('syBagDetailLayout', 'block');
    }

    async function checkSalesReportAvailability(flightNo, flightDate) {
      const trigger = document.getElementById('salesReportTrigger');
      if (!trigger || !flightNo || !flightDate) return;
      trigger.style.display = 'none';
      try {
        const apiBase = resolveApiBase();
        const res = await fetch(`${apiBase}/sales-report/meta?flightNo=${encodeURIComponent(flightNo)}&flightDate=${encodeURIComponent(flightDate)}`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.available) trigger.style.display = 'inline';
      } catch (e) {}
    }
    async function downloadSalesReport() {
      if (!currentSyFlightNo || !currentSyFlightDate) return;
      const apiBase = resolveApiBase();
      const link = `${apiBase}/sales-report/download?flightNo=${encodeURIComponent(currentSyFlightNo)}&flightDate=${encodeURIComponent(currentSyFlightDate)}`;
      window.open(link, '_blank');
    }

    function formatChdName(name) {
      const raw = String(name || '').toUpperCase().trim();
      const parts = raw.split('/');
      const last = (parts[0] || '').slice(0, 6);
      const first = (parts[1] || '').slice(0, 6);
      return first ? `${last}/${first}` : last;
    }

    function cleanRawLine(value) {
      return (value || '')
        .toString()
        .replace(/^\s*[A-Z ]+:/i, '')
        .trim();
    }

    function firstMatch(text, regex) {
      const m = (text || '').match(regex);
      return m ? m[1] : '';
    }

    function setTextById(id, value) {
      const el = document.getElementById(id);
      if (el) el.innerText = value;
    }

    function setDisplayById(id, value) {
      const el = document.getElementById(id);
      if (el) el.style.display = value;

    function escapeHtmlText(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderBnHighlightedText(el, text) {
      if (!el) return;
      const escaped = escapeHtmlText(text);
      const html = escaped
        .replace(/(BN\d{3})/g, '<span class="bn-highlight">$1</span>')
        .replace(/\n/g, '<br>');
      el.innerHTML = html;
    }
    function renderMembershipPanel(el, membershipList) {
      if (!el) return;
      const m = membershipList || {};
      const groups = [
        { title: '白金卡 Platinum', rows: Array.isArray(m.platinum) ? m.platinum : [] },
        { title: '金卡 Gold', rows: Array.isArray(m.gold) ? m.gold : [] },
        { title: '银卡 Sliver', rows: Array.isArray(m.silver) ? m.silver : [] }
      ];
      const toRowHtml = (p) => {
        const bn = escapeHtmlText(`BN${p.bn || '---'}`);
        const name = escapeHtmlText(p.name || '-');
        const seat = escapeHtmlText(p.seat || '-');
        const cabin = escapeHtmlText(p.cabin || '-');
        const ff = escapeHtmlText(`${p.ffCarrier || ''}${p.ffNumber || ''}` || '-');
        return `<div class="membership-row">
          <span class="member-bn">${bn}</span>
          <span class="member-name">${name}</span>
          <span class="member-seat">${seat}</span>
          <span class="member-cabin">${cabin}</span>
          <span class="member-ff">${ff}</span>
        </div>`;
      };
      el.innerHTML = groups.map((g) => {
        const body = g.rows.length
          ? g.rows.map(toRowHtml).join('')
          : '<div class="membership-empty">None</div>';
        return `<div class="membership-group">
          <div class="membership-group-title">${escapeHtmlText(g.title)}</div>
          ${body}
        </div>`;
      }).join('');
    }
    function renderWchPanel(el, rows) {
      if (!el) return;
      const data = Array.isArray(rows) ? rows : [];
      if (!data.length) {
        el.innerHTML = '<div class="membership-empty">No WCHR/WCHS/WCHC found.</div>';
        return;
      }
      el.innerHTML = data.map((p) => `
        <div class="uniform-row wch">
          <span class="uniform-bn">BN${escapeHtmlText(p.bn || '---')}</span>
          <span class="uniform-name">${escapeHtmlText(p.name || '-')}</span>
          <span class="uniform-seat">${escapeHtmlText(p.seat || '-')}</span>
          <span class="uniform-codes">${Array.isArray(p.codes)
            ? p.codes.map((code) => {
                const safe = escapeHtmlText(code || '');
                return String(code || '').toUpperCase() === 'WCHC'
                  ? `<span class="wchc-code">${safe}</span>`
                  : safe;
              }).join('/')
            : 'WCH'}</span>
        </div>
      `).join('');
    }
    function renderChdPanel(el, rows) {
      if (!el) return;
      const data = Array.isArray(rows) ? rows : [];
      if (!data.length) {
        el.innerHTML = '<div class="membership-empty">No CHD passenger found by DOB rule (age 2-11).</div>';
        return;
      }
      el.innerHTML = data.map((p) => `
        <div class="uniform-row chd">
          <span class="uniform-bn">BN${escapeHtmlText(p.bn || '---')}</span>
          <span class="uniform-name">${escapeHtmlText(formatChdName(p.name || '-'))}</span>
          <span class="uniform-extra">${escapeHtmlText(p.dob || '-')}</span>
          <span class="uniform-status">${p.hasChdCode ? 'CHD1/0 ✅' : 'CHD1/0 ❌'}</span>
        </div>
      `).join('');
    }

    function setGovAqqStats(stats) {
      const el = document.getElementById('govAqqStats');
      if (!el) return;
      el.innerHTML = (stats || []).map((row) => {
        const label = escapeHtmlText(row.label || '');
        const value = escapeHtmlText(String(row.value ?? '0'));
        const isDanger = row.level === 'risk' && Number(row.value || 0) > 0;
        const isReview = row.level === 'review' && Number(row.value || 0) > 0;
        const dangerCls = isDanger ? ' is-danger' : '';
        const badge = isDanger ? '🔴 ' : (isReview ? '🟡 ' : '🟢 ');
        return `<div class="stat-label">${badge}${label}</div><div class="stat-value${dangerCls}">${value}</div>`;
      }).join('');
    }

    function buildTravelDocs(data) {
      const paxInfoRaw = cleanRawLine(data.paxInfoRaw);
      const passportRaw = cleanRawLine(data.passportRaw);

      const passportParts = passportRaw
        .split('/')
        .map(x => x.trim());

      const passportNumber =
        data.passportNumber ||
        firstMatch(passportRaw, /^([A-Z0-9]+)/i);

      const nationality =
        data.nationality ||
        firstMatch(paxInfoRaw, /^([A-Z]{3})\//i) ||
        firstMatch(passportRaw, /\/NAT\/([A-Z]{3})\//i);

      const dob =
        data.dob ||
        data.birthDate ||
        firstMatch(paxInfoRaw, /(?:\/DOB\/|\bDOB\s*[:\/-]?\s*)(\d{6,8}|\d{2}[A-Z]{3}\d{2,4}|\d{4}-\d{2}-\d{2})/i) ||
        firstMatch(passportRaw, /(?:\/DOB\/|\bDOB\s*[:\/-]?\s*)(\d{6,8}|\d{2}[A-Z]{3}\d{2,4}|\d{4}-\d{2}-\d{2})/i);

      const gender =
        data.gender ||
        firstMatch(paxInfoRaw, /(?:\/GENDER\/|\bGENDER\s*[:\/-]?\s*|\bSEX\s*[:\/-]?\s*)([A-Z])/i) ||
        firstMatch(passportRaw, /(?:\/GENDER\/|\bGENDER\s*[:\/-]?\s*|\bSEX\s*[:\/-]?\s*)([A-Z])/i);

      let expiry =
        data.passportExpiry ||
        data.expiryDate ||
        '';

      if (!expiry) {
        const natIndex = passportParts.findIndex(x => x.toUpperCase() === 'NAT');
        if (natIndex >= 0) {
          expiry = passportParts
            .slice(natIndex + 2)
            .find(x => /^\d{6}$/.test(x)) || '';
        }
      }

      const items = [
        ['Passport', passportNumber],
        ['Nationality', nationality],
        ['DOB', dob],
        ['Expiry', expiry],
        ['Gender', gender]
      ].filter(item => item[1]);

      if (!items.length) {
        return '<div class="doc-grid"><div class="doc-item"><span>Travel Docs</span><b>No travel document data</b></div></div>';
      }

      return '<div class="doc-grid">' +
        items.map(([label, value]) =>
          `<div class="doc-item"><span>${label}</span><b>${value}</b></div>`
        ).join('') +
        '</div>';
    }

    async function searchPassenger() {
      let q =
        document
          .getElementById('query')
          .value
          .trim();

      if (!q) {
        return;
      }

      const upper =
        q.toUpperCase();

      if (
        upper.startsWith('FB ')
      ) {

        q =
          q.substring(3).trim();
      }

      else if (
        upper.startsWith('RN ')
      ) {

        q =
          q.substring(3).trim();
      }

      else if (
        upper.startsWith('FSN ')
      ) {

        q =
          q.substring(4).trim();
      }

      else if (
        upper.startsWith('ETKD ')
      ) {

        q =
          q.substring(5).trim();
      }

      else if (
        upper.startsWith('FF ')
      ) {

        q =
          q.substring(3).trim();
      }

      const card =
        document.getElementById('card');

      const error =
        document.getElementById('error');

      card.style.display =
        'none';

      error.style.display =
        'none';

      checkinPanelOpen = false;
      document.getElementById('checkinDetailList').innerHTML = '';

      try {

        let apiBase = resolveApiBase();
        let endpoint =
          `${apiBase}/search?q=` +
          encodeURIComponent(q);

        const headers = {};
        if (window.currentUser) {
          const token = await window.currentUser.getIdToken();
          headers.Authorization = `Bearer ${token}`;
        }

        const res =
          await fetch(endpoint, { headers });

        const contentType =
          res.headers.get('content-type') || '';

        if (!res.ok) {
          const failText =
            await res.text();

          const maybeWrongApiBase =
            !apiBase &&
            res.status === 404 &&
            failText.toLowerCase().includes('<!doctype html');

          if (maybeWrongApiBase) {
            const configuredApiBase = promptAndSaveApiBase();
            if (configuredApiBase) {
              apiBase = configuredApiBase;
              endpoint = `${apiBase}/search?q=` + encodeURIComponent(q);
              const retryRes = await fetch(endpoint, { headers });
              if (!retryRes.ok) {
                const retryText = await retryRes.text();
                throw new Error(
                  `HTTP ${retryRes.status} ${retryRes.statusText} ${retryText.slice(0, 120)} (endpoint: ${endpoint})`
                );
              }
              const retryType = retryRes.headers.get('content-type') || '';
              if (!retryType.includes('application/json')) {
                const retryText = await retryRes.text();
                throw new Error(`Non-JSON response: ${retryText.slice(0, 120)} (endpoint: ${endpoint})`);
              }
              const retryData = await retryRes.json();
              if (retryData.error) {
                error.innerText = retryData.error;
                error.style.display = 'block';
                return;
              }
              return renderSearchResult(retryData, q);
            }
            throw new Error('API endpoint not found on current site, and no backend configured.');
          }

          throw new Error(
            `HTTP ${res.status} ${res.statusText} ${failText.slice(0, 120)} (endpoint: ${endpoint})`
          );
        }

        if (!contentType.includes('application/json')) {
          const failText =
            await res.text();

          throw new Error(
            `Non-JSON response: ${failText.slice(0, 120)} (endpoint: ${endpoint})`
          );
        }

        const data = await res.json();
        return renderSearchResult(data, q);
      } catch (err) {
        error.innerText = err?.message || 'Search failed.';
        error.style.display = 'block';
      }
    }

            ? '<span class="no">❌ Not Allowed</span>'
            : 'N/A';

        // Show
        card.style.display =

      }

<script type="module">

  import { initializeApp }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

  import { getAnalytics }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

  import {
    getAuth,
    onAuthStateChanged,
    signOut,
    setPersistence,
    browserSessionPersistence,
    updatePassword
  }
  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAWsXBuQJTBmNKi6gLgnkZUZ4OfK1IRuXo",
    authDomain: "china-eastern.firebaseapp.com",
    projectId: "china-eastern",
    storageBucket: "china-eastern.firebasestorage.app",
    messagingSenderId: "30017158772",
    appId: "1:30017158772:web:874a69fdb75b8d3d315b21",
    measurementId: "G-22T9MHC42Y"
  };

  const app =
    initializeApp(firebaseConfig);

  getAnalytics(app);

  const auth =
    getAuth(app);

  const INACTIVITY_TIMEOUT_MS =
    15 * 60 * 1000;

  let inactivityTimer = null;

  const isPageReload =
    performance.getEntriesByType('navigation')[0]?.type === 'reload';

  function resetInactivityTimer() {
    if (!window.currentUser) return;

    clearTimeout(inactivityTimer);

    inactivityTimer = setTimeout(async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error('Auto logout failed:', error);
      }
    }, INACTIVITY_TIMEOUT_MS);
  }

  function bindInactivityEvents() {
    const events = ['click', 'keydown', 'mousemove', 'scroll', 'touchstart'];

    events.forEach((eventName) => {
      window.addEventListener(eventName, resetInactivityTimer, { passive: true });
    });
  }

  await setPersistence(
    auth,
    browserSessionPersistence
  );

  bindInactivityEvents();

  onAuthStateChanged(auth, async (user) => {
    window.currentUser = user || null;

    if (isPageReload && user) {
      try {
        await signOut(auth);
      } catch (error) {
        console.error('Reload logout failed:', error);
      }
      return;
    }

    if (!user) {

      clearTimeout(inactivityTimer);

      window.location.href =
        "login.html";

      return;
    }

    console.log(
      "Firebase Logged in:",
      user.email
    );

    const userEmailBox =
      document.getElementById("userEmail");

    if (userEmailBox) {

      userEmailBox.textContent =
        user.email;
    }

    document.getElementById("mainApp").style.display =
      "block";

    resetInactivityTimer();

    if (!hasAutoLoadedSyToday) {
      hasAutoLoadedSyToday = true;
      const queryInput = document.getElementById('query');
      if (queryInput) {
        queryInput.value = 'SY';
        searchPassenger();
      }
    }
  });


  window.openChangePasswordPage = function () {
    document.getElementById('changePasswordPage').style.display = 'block';
    document.getElementById('mainApp').querySelector('.search-box').style.display = 'none';
    document.getElementById('card').style.display = 'none';
    const errorBox = document.getElementById('error');
    errorBox.style.display = 'none';
  };

  window.closeChangePasswordPage = function () {
    document.getElementById('changePasswordPage').style.display = 'none';
    document.getElementById('mainApp').querySelector('.search-box').style.display = 'flex';
  };

  window.submitPasswordChange = async function () {
    const input = document.getElementById('changePasswordInput');
    const errorBox = document.getElementById('error');
    const newPassword = (input?.value || '').trim();

    if (!auth.currentUser) {
      errorBox.innerText = '用户未登录，无法修改密码。';
      errorBox.style.display = 'block';
      return;
    }

    if (!newPassword) {
      errorBox.innerText = '请输入新密码。';
      errorBox.style.display = 'block';
      return;
    }

    try {
      await updatePassword(auth.currentUser, newPassword);
      await signOut(auth);
      window.location.href = 'login.html';
    } catch (err) {
      errorBox.innerText = err?.message || '密码修改失败。';
      errorBox.style.display = 'block';
    }
  };

  window.logout = async function () {

    await signOut(auth);

    window.location.href =
      "login.html";
  };

</script>
