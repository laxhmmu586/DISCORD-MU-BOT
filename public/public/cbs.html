<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CBS Cases</title>
  <style>
    :root { --bg:#f4f8fb; --ink:#172033; --muted:#667085; --brand:#123a73; --line:#d7e1ec; --panel:#fff; --ok:#087443; }
    * { box-sizing:border-box; }
    html[lang="en"] .zh, html[lang="zh"] .en { display:none; }
    body { margin:0; font-family:Inter,Arial,"Noto Sans SC",sans-serif; background:linear-gradient(135deg,#eaf4ff,#fdfefe); color:var(--ink); }
    header { position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center; gap:16px; padding:18px clamp(18px,4vw,52px); background:rgba(255,255,255,.92); border-bottom:1px solid var(--line); backdrop-filter:blur(12px); }
    .brand { font-weight:900; color:var(--brand); letter-spacing:.08em; text-decoration:none; }
    .wrap { width:min(1180px,94vw); margin:28px auto 56px; display:grid; gap:24px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:22px; box-shadow:0 18px 42px rgba(22,48,76,.08); padding:24px; }
    h1,h2 { margin:0 0 10px; }
    p { line-height:1.65; }
    .muted { color:var(--muted); }
    .actions { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    button,a.button { border:0; border-radius:999px; padding:12px 18px; font-weight:850; cursor:pointer; background:var(--brand); color:white; text-decoration:none; }
    .lang-toggle { border:1px solid var(--line); background:#e8eef7; color:var(--brand); }
    button.secondary,a.secondary { background:#e8eef7; color:var(--brand); }
    button.danger { background:#b42318; }
    .case-summary { cursor:pointer; }
    .case-summary:hover { background:#f7fbff; }
    .status { min-height:24px; font-weight:800; }
    .status.err { color:#b42318; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th,td { padding:10px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; }
    th { color:var(--muted); font-size:12px; text-transform:uppercase; }
    .pill { display:inline-flex; border-radius:999px; padding:4px 10px; font-weight:850; background:#eef4ff; color:#1849a9; }
    .pill.closed { background:#dcfae6; color:#067647; }
    .case-update { display:grid; gap:12px; margin-top:18px; padding:18px; border-radius:18px; background:#073c45; color:#fff; }
    .update-mode-actions { display:flex; flex-wrap:wrap; gap:10px; }
    .update-mode-actions button { border-radius:0; border:1px solid rgba(125,200,255,.55); background:rgba(33,92,139,.72); }
    .update-mode-actions button.is-active { background:#123a73; }
    .case-update-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px 16px; }
    .case-update label { display:grid; gap:6px; color:#bdd0dc; font-size:12px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    .case-update .wide { grid-column:1/-1; }
    .case-update textarea { min-height:86px; resize:vertical; }
    .detail-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px 18px; margin-bottom:12px; }
    .detail-grid p { margin:0; }
    input,textarea { width:100%; border:1px solid var(--line); border-radius:12px; padding:10px 12px; background:#fff; color:var(--ink); font:inherit; }
    @media (max-width:840px){ .case-update-grid,.detail-grid{grid-template-columns:1fr}.case-update{min-width:0} table{display:block;overflow-x:auto;white-space:nowrap} }
  </style>
</head>
<body>
  <header><a class="brand" href="index.html">MUFC</a><span></span><button class="lang-toggle" id="language-toggle" type="button">中文</button></header>
  <main class="wrap">
    <section class="card">
      <div class="actions">
        <div><h1><span class="en">All Cases</span><span class="zh">所有案件</span></h1></div>
        <div class="actions"><button class="secondary" id="refresh-cases" type="button"><span class="en">Refresh</span><span class="zh">刷新</span></button></div>
      </div>
      <div id="cases-output"><p class="muted">Loading cases...</p></div>
    </section>
  </main>
  <script>
    const apiBase = (window.MU_API_BASE || 'https://api.mufcapp.net').replace(/\/$/, '');
    const casesOutput = document.querySelector('#cases-output');
    const refreshCases = document.querySelector('#refresh-cases');
    const languageToggle = document.querySelector('#language-toggle');
    function setLanguage(lang) {
      document.documentElement.lang = lang;
      languageToggle.textContent = lang === 'en' ? '中文' : 'English';
      loadCases();
    }
    languageToggle.addEventListener('click', () => setLanguage(document.documentElement.lang === 'en' ? 'zh' : 'en'));
    function label(en, zh) { return document.documentElement.lang === 'en' ? en : zh; }
    function escapeHtml(value) { return String(value || '').replace(/[&<>'"]/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
    async function parseJson(res) { const text = await res.text(); try { return JSON.parse(text); } catch { throw new Error(`API returned non-JSON (${res.status}). Please check API base: ${apiBase}`); } }
    function inferCaseType(row) {
      const explicit = String(row?.caseType || '').trim().toUpperCase();
      if (explicit) return explicit;
      if (row?.dprDamageLevel || row?.dprBagInfo || row?.dprInnerDamage) return 'DPR';
      if (row?.ahlBagDescription || row?.ahlBagBrandTag || row?.ahlFeatures || row?.ahlOtherFeatures) return 'AHL';
      return '';
    }
    function renderValue(value) { return value == null || value === '' ? '-' : value; }
    function detailRows(row) {
      const caseType = inferCaseType(row);
      return [
        [label('Case Number', '编号'), row.caseNumber],
        [label('Case Type', '类型'), caseType],
        [label('Status', '状态'), row.status],
        [label('Passenger Name', '旅客姓名'), row.passengerName],
        [label('Email', '邮箱'), row.email],
        [label('Phone', '电话'), row.phone],
        [label('Ticket Number', '机票号码'), row.ticketNumber],
        [label('Class Of Travel', '舱位等级'), row.classOfTravel],
        [label('Origin', '始发地'), row.departureOrigin],
        [label('Flight Route', '行李航程'), row.flightRoute],
        [label('Bag Tag', '行李牌'), row.bagTag],
        [label('Destination on Bags', '行李牌目的地'), row.destinationOnBags],
        [label('Permanent Address', '住址'), row.permanentAddress],
        [label('Temporary Address Available', '是否有临时地址'), row.addressAvailable],
        [label('Temporary Address Valid Until', '临时地址有效期至'), row.temporaryAddressValidUntil],
        [label('Temporary Address', '临时地址'), row.temporaryAddress],
        [label('AHL Bag Description', 'AHL行李描述'), row.ahlBagDescription],
        [label('AHL Bag Brand Tag', 'AHL行李品牌牌'), row.ahlBagBrandTag],
        [label('AHL Bag Type', 'AHL行李类型'), row.ahlBagType],
        [label('AHL Features', 'AHL特征'), row.ahlFeatures],
        [label('AHL Other Features', 'AHL其他特征'), row.ahlOtherFeatures],
        [label('AHL Contents', 'AHL包内物品'), row.ahlContents],
        [label('DPR Damage Level', 'DPR破损程度'), row.dprDamageLevel],
        [label('DPR Bag Info', 'DPR行李信息'), row.dprBagInfo],
        [label('DPR Bag Type', 'DPR行李类型'), row.dprBagType],
        [label('DPR Inner Damage', 'DPR内物破损'), row.dprInnerDamage],
        [label('Contents Details', '包内物品详情'), row.contentsDetails],
        [label('Issue Date', '填写日期'), row.issueDate],
        [label('Passenger Signature', '旅客签字'), row.passengerSignature],
        [label('Submit Date', '提交日期'), row.submittedAt],
        [label('Updated At', '更新时间'), row.updatedAt],
        [label('Update Note', '更新备注'), row.updateNote]
      ];
    }
    function updateFormHtml(row, mode = 'rush') {
      if (!row.caseNumber) return `<p class="status err">${label('A case number is required in column A before this row can be updated.', 'A列需要有Case Number后才能更新。')}</p>`;
      const active = ['rush', 'location', 'shipping'].includes(mode) ? mode : 'rush';
      const input = (title, name, attrs = 'required') => `<label><span>${escapeHtml(title)}</span><input name="${escapeHtml(name)}" ${attrs} /></label>`;
      const fields = active === 'rush'
        ? [
            input('Rush tag number', 'rushTagNumber'),
            input('Rush to where?', 'rushToWhere'),
            input('AKE number?', 'akeNumber'),
            input('Option: World Tracer file #', 'worldTracerFileNumber', ''),
            `<label class="wide"><span>Comment</span><textarea name="comment"></textarea></label>`
          ].join('')
        : active === 'location'
          ? [input('Bag location', 'location'), `<label class="wide"><span>Comment</span><textarea name="comment"></textarea></label>`].join('')
          : [input('Tracking number', 'trackingNumber'), input('Shipping to where?', 'shippingTo'), `<label class="wide"><span>Comment</span><textarea name="comment"></textarea></label>`].join('');
      return `<form class="case-update" data-case="${escapeHtml(row.caseNumber)}" data-update-mode="${escapeHtml(active)}">
        <h2>${label('Update', '更新')}</h2>
        <div class="update-mode-actions">
          <button type="button" data-cbs-update-mode="rush" class="${active === 'rush' ? 'is-active' : ''}">RUSH</button>
          <button type="button" data-cbs-update-mode="location" class="${active === 'location' ? 'is-active' : ''}">BAG LOCATION UPDATE</button>
          <button type="button" data-cbs-update-mode="shipping" class="${active === 'shipping' ? 'is-active' : ''}">SHIPPING</button>
        </div>
        <div class="case-update-grid">${fields}</div>
        <div class="actions"><button type="submit">${label('Update', '更新')}</button></div>
      </form>`;
    }
    async function loadCases() {
      casesOutput.innerHTML = '<p class="muted">Loading cases...</p>';
      try {
        const res = await fetch(`${apiBase}/cbs-cases`);
        const data = await parseJson(res);
        if (!res.ok) throw new Error(data.error || 'Case loading failed');
        const rows = data.rows || [];
        window._cbsRows = rows;
        if (!rows.length) { casesOutput.innerHTML = '<p class="muted">No cases yet.</p>'; return; }
        casesOutput.innerHTML = `<table><thead><tr><th>${label('Case Number', '编号')}</th><th>${label('Case Type', '类型')}</th><th>${label('Bag Tag', '行李牌')}</th></tr></thead><tbody>${rows.map((row, index) => {
          const detailKey = row.caseNumber || `row-${row.rowNumber || index}`;
          const caseNumberLabel = row.caseNumber || label('Missing case number', '缺少编号');
          const caseType = inferCaseType(row);
          const details = detailRows(row);
          return `<tr class="case-summary" data-toggle-case="${escapeHtml(detailKey)}"><td><button class="secondary" type="button">${escapeHtml(caseNumberLabel)}</button></td><td>${escapeHtml(caseType || '-')}</td><td>${escapeHtml(row.bagTag || '-')}</td></tr><tr class="case-detail" data-detail-case="${escapeHtml(detailKey)}" hidden><td colspan="3"><div class="detail-grid">${details.map(([key, value]) => `<p><strong>${escapeHtml(key)}:</strong> ${escapeHtml(renderValue(value))}</p>`).join('')}</div>${updateFormHtml(row)}</td></tr>`;
        }).join('')}</tbody></table>`;
      } catch (error) { casesOutput.innerHTML = `<p class="status err">${escapeHtml(error.message)}</p>`; }
    }
    casesOutput.addEventListener('submit', async (event) => {
      const updateForm = event.target.closest('.case-update');
      if (!updateForm) return;
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(updateForm).entries());
      payload.type = updateForm.dataset.updateMode || 'rush';
      await updateCase(updateForm.dataset.case, payload);
    });
    casesOutput.addEventListener('click', async (event) => {
      const modeButton = event.target.closest('[data-cbs-update-mode]');
      if (modeButton) {
        const form = modeButton.closest('.case-update');
        const detail = modeButton.closest('.case-detail');
        const caseNumber = form?.dataset.case;
        const currentRow = (window._cbsRows || []).find((row) => row.caseNumber === caseNumber) || { caseNumber };
        form.outerHTML = updateFormHtml(currentRow, modeButton.dataset.cbsUpdateMode);
        if (detail) detail.hidden = false;
        return;
      }
      const summary = event.target.closest('[data-toggle-case]');
      if (!summary) return;
      const detail = Array.from(casesOutput.querySelectorAll('[data-detail-case]')).find((item) => item.dataset.detailCase === summary.dataset.toggleCase);
      if (detail) detail.hidden = !detail.hidden;
    });
    async function updateCase(caseNumber, payload) {
      casesOutput.style.opacity = '.65';
      try {
        const res = await fetch(`${apiBase}/cbs-cases/${encodeURIComponent(caseNumber)}/update`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const data = await parseJson(res);
        if (!res.ok) throw new Error(data.error || 'Update failed');
        await loadCases();
      } catch (error) { alert(error.message); } finally { casesOutput.style.opacity = '1'; }
    }
    refreshCases.addEventListener('click', loadCases);
    setLanguage('en');
  </script>
</body>
</html>
