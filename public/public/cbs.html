<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CBS Cases</title>
  <style>
    :root { --bg:#f4f8fb; --ink:#172033; --muted:#667085; --brand:#123a73; --line:#d7e1ec; --panel:#fff; --ok:#087443; }
    * { box-sizing:border-box; }
    html[lang="en"] .zh, html[lang="zh"] .en { display:none; }
    body { margin:0; font-family:Inter,Arial,"Noto Sans SC",sans-serif; background:linear-gradient(135deg,#eaf4ff,#fdfefe); color:var(--ink); }
    header { position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center; gap:16px; padding:18px clamp(18px,4vw,52px); background:rgba(255,255,255,.92); border-bottom:1px solid var(--line); backdrop-filter:blur(12px); }
    .brand { font-weight:900; color:var(--brand); letter-spacing:.08em; text-decoration:none; }
    .wrap { width:min(1180px,94vw); margin:28px auto 56px; display:grid; gap:24px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:22px; box-shadow:0 18px 42px rgba(22,48,76,.08); padding:24px; }
    h1,h2 { margin:0 0 10px; }
    p { line-height:1.65; }
    .muted { color:var(--muted); }
    .missing-alert-wrap { display:flex; justify-content:flex-end; }
    .missing-alert { display:inline-flex; border:0; border-radius:999px; padding:12px 22px; background:var(--brand); color:#fff; font-weight:950; letter-spacing:.04em; box-shadow:none; animation:none; }
    .missing-alert.is-active { background:#d92d20; box-shadow:0 0 0 0 rgba(217,45,32,.55); animation:missingPulse 1s infinite; }
    .missing-alert.is-complete { background:var(--ok); box-shadow:none; animation:none; }
    @keyframes missingPulse { 0%{box-shadow:0 0 0 0 rgba(217,45,32,.55)} 70%{box-shadow:0 0 0 14px rgba(217,45,32,0)} 100%{box-shadow:0 0 0 0 rgba(217,45,32,0)} }
    .search-field { min-width:260px; max-width:360px; }
    .case-toolbar { display:flex; flex-wrap:nowrap; gap:10px; align-items:center; }
    .missing-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:flex-start; max-width:100%; }
    .missing-actions button { padding:10px 14px; white-space:normal; }
    .case-link-button { padding:0; border-radius:0; background:transparent; color:var(--brand); font-weight:900; text-decoration:underline; }
    .missing-report-table { table-layout:auto; }
    .missing-report-table th:last-child,.missing-report-table td:last-child { width:230px; min-width:230px; }
    .actions { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    button,a.button { border:0; border-radius:999px; padding:12px 18px; font-weight:850; cursor:pointer; background:var(--brand); color:white; text-decoration:none; }
    .lang-toggle { border:1px solid var(--line); background:#e8eef7; color:var(--brand); }
    button.secondary,a.secondary { background:#e8eef7; color:var(--brand); }
    button.danger { background:#b42318; }
    .case-summary { cursor:pointer; }
    .case-summary:hover { background:#f7fbff; }
    .status { min-height:24px; font-weight:800; }
    .status.err { color:#b42318; }
    table { width:100%; border-collapse:collapse; table-layout:fixed; font-size:13px; }
    th,td { padding:8px 10px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; }
    th { color:var(--muted); font-size:12px; text-transform:uppercase; }
    .pill { display:inline-flex; border-radius:999px; padding:4px 10px; font-weight:850; background:#eef4ff; color:#1849a9; }
    .pill.closed { background:#dcfae6; color:#067647; }
    .tracking-cell { text-align:center; color:var(--muted); font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
    .tracking-line { --dot:#12b76a; display:flex; align-items:flex-start; justify-content:center; gap:0; min-width:0; }
    .tracking-step { position:relative; display:grid; justify-items:center; gap:6px; min-width:92px; color:#98a2b3; }
    .tracking-step:not(:last-child)::after { content:""; position:absolute; top:11px; left:calc(50% + 15px); width:calc(100% - 30px); height:3px; border-radius:999px; background:#d7e1ec; }
    .tracking-step.is-done, .tracking-step.is-active { color:var(--brand); }
    .tracking-step.is-done:not(:last-child)::after { background:var(--dot); }
    .tracking-dot { position:relative; z-index:1; width:24px; height:24px; border-radius:999px; border:5px solid #e4e7ec; background:#98a2b3; box-shadow:0 0 0 5px rgba(152,162,179,.08); }
    .tracking-step.is-done .tracking-dot, .tracking-step.is-active .tracking-dot { border-color:#b7f7cd; background:var(--dot); box-shadow:0 0 0 6px rgba(18,183,106,.12); }
    .tracking-label { font-size:10px; line-height:1.2; white-space:nowrap; }
    .tracking-cell .tracking-line { min-width:0; }
    .tracking-cell .tracking-step { min-width:58px; }
    .tracking-cell .tracking-step:not(:last-child)::after { left:calc(50% + 12px); width:calc(100% - 24px); }
    .tracking-cell .tracking-dot { width:20px; height:20px; border-width:4px; }
    .tracking-cell .tracking-label { font-size:9px; }
    .tracking-time { margin-top:-4px; font-size:9px; color:var(--muted); letter-spacing:0; }
    .tracking-detail { margin:14px 0 20px; padding:20px; border-radius:22px; background:linear-gradient(160deg,#07324a,#064640); color:#fff; box-shadow:inset 0 0 0 1px rgba(125,211,252,.35); }
    .tracking-detail h2 { margin:0 0 6px; font-size:34px; letter-spacing:.03em; color:#fff; }
    .tracking-detail .muted { color:#b8d7df; margin:0 0 20px; }
    .tracking-events { display:grid; gap:18px; }
    .tracking-event { display:grid; grid-template-columns:110px 1fr; gap:24px; position:relative; }
    .tracking-event::before { content:""; position:absolute; left:23px; top:26px; bottom:-28px; width:4px; border-radius:999px; background:#d8eff7; }
    .tracking-event:last-child::before { display:none; }
    .tracking-event-time { position:relative; display:grid; grid-template-columns:46px 1fr; gap:10px; color:#fff; font-weight:900; }
    .tracking-event-time::before { content:""; width:16px; height:16px; margin:4px auto 0; border-radius:999px; background:#12b76a; border:5px solid #e7f8ef; box-shadow:0 0 0 1px rgba(255,255,255,.6); }
    .tracking-event-date { display:block; color:#b8d7df; font-size:11px; font-weight:800; }
    .tracking-event-title { margin:0 0 8px; color:#fff; font-weight:950; font-size:16px; }
    .tracking-event-card { display:grid; gap:8px; padding:12px 14px; border:1px solid rgba(216,239,247,.22); border-radius:10px; background:rgba(255,255,255,.13); }
    .tracking-event-field { display:grid; grid-template-columns:150px 1fr; gap:10px; }
    .tracking-event-field b { color:#b8d7df; text-transform:uppercase; font-size:11px; letter-spacing:.04em; }
    .case-info-panel { margin:0 0 18px; padding:18px; border:1px solid var(--line); border-radius:18px; background:#fbfdff; }
    .case-info-panel h2 { color:var(--brand); margin-bottom:14px; }
    .detail-actions { margin:6px 0 16px; justify-content:flex-end; }
    .update-note-box { margin:0 0 14px; padding:12px 14px; border-radius:14px; background:#eef4ff; color:var(--brand); font-weight:850; white-space:pre-wrap; }
    .case-update { display:grid; gap:14px; margin-top:18px; padding:18px; border:1px dashed var(--line); border-radius:20px; background:#fbfdff; box-shadow:inset 0 1px 0 rgba(255,255,255,.7); }
    .case-update h2 { color:var(--brand); }
    .update-mode-actions { display:flex; flex-wrap:wrap; gap:10px; }
    .update-mode-actions button { border-radius:999px; border:1px solid #bfd3eb; background:#e8eef7; color:var(--brand); }
    .update-mode-actions button.is-active { border-color:var(--brand); background:var(--brand); color:#fff; }
    .case-update-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px 16px; }
    .case-update label { display:grid; gap:6px; color:var(--muted); font-size:12px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    .case-update .wide { grid-column:1/-1; }
    .case-update textarea { min-height:86px; resize:vertical; }
    .case-update .actions { justify-content:flex-start; }
    .detail-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px 18px; margin-bottom:12px; }
    .detail-grid p { margin:0; }
    input,textarea { width:100%; border:1px solid var(--line); border-radius:12px; padding:10px 12px; background:#fff; color:var(--ink); font:inherit; }
    @media (max-width:840px){ .case-update-grid,.detail-grid{grid-template-columns:1fr}.tracking-event{grid-template-columns:86px 1fr;gap:12px}.tracking-event-card{font-size:12px}.tracking-event-field{grid-template-columns:1fr}.case-update{min-width:0} table{display:block;overflow-x:auto;white-space:nowrap} }
  </style>
</head>
<body>
  <header><a class="brand" href="index.html">MUFC</a><span></span><button class="lang-toggle" id="language-toggle" type="button">中文</button></header>
  <main class="wrap">
    <div class="missing-alert-wrap"><button class="missing-alert" id="missing-report-alert" type="button">MISSING BAG REPORT</button></div>
    <section class="card" id="cases-card">
      <div class="actions">
        <div><h1><span class="en">All Cases</span><span class="zh">所有案件</span></h1></div>
        <div class="case-toolbar"><input class="search-field" id="case-search" placeholder="Search case / bag tag / passenger" /><button class="secondary" id="refresh-cases" type="button"><span class="en">Refresh</span><span class="zh">刷新</span></button></div>
      </div>
      <div id="cases-output"><p class="muted">Loading cases...</p></div>
    </section>
    <section class="card" id="missing-report-card" hidden>
      <div class="actions"><div><h1>MISSING BAG REPORT</h1><p class="muted">MU rows imported from Early Bag Storage missed bag email.</p></div><button class="secondary" id="back-to-cases" type="button">Back to Cases</button></div>
      <div id="missing-report-output"><p class="muted">Loading missing bags...</p></div>
    </section>
  </main>
  <script>
    const apiBase = (window.MU_API_BASE || 'https://api.mufcapp.net').replace(/\/$/, '');
    const casesOutput = document.querySelector('#cases-output');
    const casesCard = document.querySelector('#cases-card');
    const caseSearch = document.querySelector('#case-search');
    const missingAlert = document.querySelector('#missing-report-alert');
    const missingReportCard = document.querySelector('#missing-report-card');
    const missingReportOutput = document.querySelector('#missing-report-output');
    const backToCases = document.querySelector('#back-to-cases');
    const refreshCases = document.querySelector('#refresh-cases');
    const languageToggle = document.querySelector('#language-toggle');
    function setLanguage(lang) {
      document.documentElement.lang = lang;
      languageToggle.textContent = lang === 'en' ? '中文' : 'English';
      loadCases();
    }
    languageToggle.addEventListener('click', () => setLanguage(document.documentElement.lang === 'en' ? 'zh' : 'en'));
    function label(en, zh) { return document.documentElement.lang === 'en' ? en : zh; }
    function escapeHtml(value) { return String(value || '').replace(/[&<>'"]/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
    async function parseJson(res) { const text = await res.text(); try { return JSON.parse(text); } catch { throw new Error(`API returned non-JSON (${res.status}). Please check API base: ${apiBase}`); } }
    function inferCaseType(row) {
      const explicit = String(row?.caseType || '').trim().toUpperCase();
      if (explicit) return explicit;
      if (row?.dprDamageLevel || row?.dprBagInfo || row?.dprInnerDamage) return 'DPR';
      if (row?.ahlBagDescription || row?.ahlBagBrandTag || row?.ahlFeatures || row?.ahlOtherFeatures) return 'AHL';
      return '';
    }
    function hasValue(value) { return value != null && String(value).trim() !== ''; }
    function renderValue(value) { return hasValue(value) ? value : '-'; }
    const TRACKING_STAGES = [
      { key:'create', text:'Create' },
      { key:'worldtracer', text:'WorldTracer' },
      { key:'rush', text:'Rush' },
      { key:'location', text:'Location' },
      { key:'shipping', text:'Shipping' },
      { key:'closed', text:'Closed' }
    ];
    function parseStoredUpdateEvents(row) {
      return (Array.isArray(row?.updateEvents) ? row.updateEvents : []).map((event) => ({
        key: trackingKeyFromText(event.key || event.status || event.title),
        title: event.title || `Update ${event.status || 'Case'}`,
        at: event.at || event.updatedAt || '',
        fields: Array.isArray(event.fields) ? event.fields : [],
        note: event.note || ''
      }));
    }
    function parseUpdateNoteEvents(row) {
      const note = String(row?.updateNote || '').trim();
      const events = [];
      if (row?.caseNumber) {
        const hiddenCreateLabels = new Set([label('Status', '状态'), label('Updated At', '更新时间')]);
        const createFields = detailRows(row)
          .filter(([key, value]) => hasValue(value) && !hiddenCreateLabels.has(key));
        events.push({ key:'create', title:'Create Case', at:row.submittedAt || row.issueDate || '', fields:createFields });
      }
      const storedEvents = parseStoredUpdateEvents(row);
      if (storedEvents.length) return events.concat(storedEvents);
      if (!note || /^case created$/i.test(note)) {
        const statusKey = trackingKeyFromText(row?.status);
        if (statusKey !== 'create') {
          const title = TRACKING_STAGES.find((stage) => stage.key === statusKey)?.text || row.status || 'Update';
          events.push({ key:statusKey, title:`Update ${title}`, at:row.updatedAt || '', fields:[[label('Status', '状态'), row.status]] });
        }
        return events;
      }
      const timestampedParts = note.match(/\[[^\]]+\]\s*[^\[]+/g);
      const parts = (timestampedParts || note.split(/\s*\|\|\s*|\n+/)).map((item) => item.trim()).filter(Boolean);
      parts.forEach((part) => {
        const match = part.match(/^\[([^\]]+)\]\s*(.*)$/);
        const at = match ? match[1] : (row.updatedAt || '');
        const body = match ? match[2] : part;
        if (/^case created$/i.test(body) || /^Created from Missing Bag Report row\b/i.test(body)) return;
        events.push(updateEventFromText(body, at));
      });
      return events;
    }
    function updateEventFromText(text, at = '') {
      const pieces = String(text || '').split('|').map((item) => item.trim()).filter(Boolean);
      const type = (pieces.shift() || 'Update').trim();
      const key = trackingKeyFromText(type);
      const stageName = TRACKING_STAGES.find((stage) => stage.key === key)?.text || type;
      const title = key === 'create' ? type : `Update ${stageName}`;
      const fields = pieces.map((piece) => {
        const split = piece.split(/:\s*/);
        return split.length > 1 ? [split.shift(), split.join(': ')] : [label('Detail', '详情'), piece];
      });
      return { key, title, at, fields:fields.length ? fields : [[label('Detail', '详情'), text]] };
    }
    function trackingKeyFromText(value) {
      const text = String(value || '').toLowerCase();
      if (/close/.test(text)) return 'closed';
      if (/ship/.test(text)) return 'shipping';
      if (/location/.test(text)) return 'location';
      if (/rush/.test(text)) return 'rush';
      if (/world\s*tracer|worldtracer/.test(text)) return 'worldtracer';
      return 'create';
    }
    function trackingStage(row) {
      const events = parseUpdateNoteEvents(row);
      return events[events.length - 1] || { key:'create', title:'Create' };
    }
    function trackingHtml(row) {
      const events = parseUpdateNoteEvents(row);
      const visibleEvents = events.filter((event, index) => index === 0 || event.key !== events[index - 1]?.key || event.title !== events[index - 1]?.title);
      return `<div class="tracking-line">${visibleEvents.map((event, index) => {
        const state = index < visibleEvents.length - 1 ? 'is-done' : 'is-active';
        const stageText = TRACKING_STAGES.find((stage) => stage.key === event.key)?.text || event.title || 'Update';
        const time = formatEventTime(event.at).time;
        const timeHtml = time !== '--:--' ? `<span class="tracking-time">${escapeHtml(time)}</span>` : '';
        return `<span class="tracking-step ${state}"><span class="tracking-dot"></span><span class="tracking-label">${escapeHtml(stageText)}</span>${timeHtml}</span>`;
      }).join('')}</div>`;
    }
    function formatEventTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return { time:'--:--', date:'' };
      return { time:date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', hour12:false }), date:date.toLocaleDateString() };
    }
    function trackingDetailHtml(row) {
      const events = parseUpdateNoteEvents(row);
      if (!events.length) return '';
      return `<section class="tracking-detail"><h2>${escapeHtml(row.caseNumber || 'CASE')}</h2><p class="muted">${escapeHtml(inferCaseType(row) || 'CBS Case')} Tracking</p><div class="tracking-events">${events.map((event) => {
        const time = formatEventTime(event.at);
        const eventFields = (event.fields || []).length ? event.fields : (event.note ? [[label('Detail', '详情'), event.note]] : []);
        const fields = eventFields.map(([key, value]) => `<div class="tracking-event-field"><b>${escapeHtml(key)}</b><span>${escapeHtml(renderValue(value))}</span></div>`).join('');
        return `<article class="tracking-event"><div class="tracking-event-time"><span>${escapeHtml(time.time)}<span class="tracking-event-date">${escapeHtml(time.date)}</span></span></div><div><h3 class="tracking-event-title">${escapeHtml(event.title)}</h3><div class="tracking-event-card">${fields}</div></div></article>`;
      }).join('')}</div></section>`;
    }
    function detailRows(row) {
      const caseType = inferCaseType(row);
      return [
        [label('Case Number', '编号'), row.caseNumber],
        [label('Case Type', '类型'), caseType],
        [label('Status', '状态'), row.status],
        [label('Passenger Name', '旅客姓名'), row.passengerName],
        [label('Email', '邮箱'), row.email],
        [label('Phone', '电话'), row.phone],
        [label('Ticket Number', '机票号码'), row.ticketNumber],
        [label('Class Of Travel', '舱位等级'), row.classOfTravel],
        [label('Origin', '始发地'), row.departureOrigin],
        [label('Flight Route', '行李航程'), row.flightRoute],
        [label('Bag Tag', '行李牌'), row.bagTag],
        [label('Destination on Bags', '行李牌目的地'), row.destinationOnBags],
        [label('Permanent Address', '住址'), row.permanentAddress],
        [label('Temporary Address Available', '是否有临时地址'), row.addressAvailable],
        [label('Temporary Address Valid Until', '临时地址有效期至'), row.temporaryAddressValidUntil],
        [label('Temporary Address', '临时地址'), row.temporaryAddress],
        [label('AHL Bag Description', 'AHL行李描述'), row.ahlBagDescription],
        [label('AHL Bag Brand Tag', 'AHL行李品牌牌'), row.ahlBagBrandTag],
        [label('AHL Bag Type', 'AHL行李类型'), row.ahlBagType],
        [label('AHL Features', 'AHL特征'), row.ahlFeatures],
        [label('AHL Other Features', 'AHL其他特征'), row.ahlOtherFeatures],
        [label('AHL Contents', 'AHL包内物品'), row.ahlContents],
        [label('DPR Damage Level', 'DPR破损程度'), row.dprDamageLevel],
        [label('DPR Bag Info', 'DPR行李信息'), row.dprBagInfo],
        [label('DPR Bag Type', 'DPR行李类型'), row.dprBagType],
        [label('DPR Inner Damage', 'DPR内物破损'), row.dprInnerDamage],
        [label('Contents Details', '包内物品详情'), row.contentsDetails],
        [label('Issue Date', '填写日期'), row.issueDate],
        [label('Passenger Signature', '旅客签字'), row.passengerSignature],
        [label('Submit Date', '提交日期'), row.submittedAt],
        [label('Updated At', '更新时间'), row.updatedAt]
      ];
    }
    function originalFormDetailRows(row) {
      const caseType = inferCaseType(row);
      return [
        [label('Case Type', '类型'), caseType],
        [label('Passenger Name', '旅客姓名'), row.passengerName],
        [label('Email', '邮箱'), row.email],
        [label('Phone', '电话'), row.phone],
        [label('Ticket Number', '机票号码'), row.ticketNumber],
        [label('Class Of Travel', '舱位等级'), row.classOfTravel],
        [label('Origin', '始发地'), row.departureOrigin],
        [label('Flight Route', '行李航程'), row.flightRoute],
        [label('Bag Tag', '行李牌'), row.bagTag],
        [label('Destination on Bags', '行李牌目的地'), row.destinationOnBags],
        [label('Permanent Address', '住址'), row.permanentAddress],
        [label('Temporary Address Available', '是否有临时地址'), row.addressAvailable],
        [label('Temporary Address Valid Until', '临时地址有效期至'), row.temporaryAddressValidUntil],
        [label('Temporary Address', '临时地址'), row.temporaryAddress],
        [label('AHL Bag Description', 'AHL行李描述'), row.ahlBagDescription],
        [label('AHL Bag Brand Tag', 'AHL行李品牌牌'), row.ahlBagBrandTag],
        [label('AHL Bag Type', 'AHL行李类型'), row.ahlBagType],
        [label('AHL Features', 'AHL特征'), row.ahlFeatures],
        [label('AHL Other Features', 'AHL其他特征'), row.ahlOtherFeatures],
        [label('AHL Contents', 'AHL包内物品'), row.ahlContents],
        [label('DPR Damage Level', 'DPR破损程度'), row.dprDamageLevel],
        [label('DPR Bag Info', 'DPR行李信息'), row.dprBagInfo],
        [label('DPR Bag Type', 'DPR行李类型'), row.dprBagType],
        [label('DPR Inner Damage', 'DPR内物破损'), row.dprInnerDamage],
        [label('Contents Details', '包内物品详情'), row.contentsDetails],
        [label('Issue Date', '填写日期'), row.issueDate],
        [label('Passenger Signature', '旅客签字'), row.passengerSignature]
      ];
    }
    function isOriginalFormCase(row) {
      return !/^Created from Missing Bag Report row\b/i.test(String(row?.updateNote || '')) && (hasValue(row?.email) || hasValue(row?.phone) || hasValue(row?.passengerSignature));
    }
    function updateFormHtml(row, mode = 'worldtracer') {
      if (!row.caseNumber) return `<p class="status err">${label('A case number is required in column A before this row can be updated.', 'A列需要有Case Number后才能更新。')}</p>`;
      const active = ['worldtracer', 'rush', 'location', 'shipping', 'closed'].includes(mode) ? mode : 'worldtracer';
      const input = (title, name, attrs = 'required') => `<label><span>${escapeHtml(title)}</span><input name="${escapeHtml(name)}" ${attrs} /></label>`;
      const fields = active === 'worldtracer'
        ? input('File number', 'fileNumber')
        : active === 'rush'
          ? [
              input('Rush tag number', 'rushTagNumber'),
              input('Rush to where?', 'rushToWhere'),
              input('AKE number?', 'akeNumber'),
              input('Option: World Tracer file #', 'worldTracerFileNumber', ''),
              `<label class="wide"><span>Comment</span><textarea name="comment"></textarea></label>`
            ].join('')
          : active === 'location'
          ? [input('Bag location', 'location'), `<label class="wide"><span>Comment</span><textarea name="comment"></textarea></label>`].join('')
          : active === 'shipping'
          ? [input('Tracking number', 'trackingNumber'), input('Shipping to where?', 'shippingTo'), `<label class="wide"><span>Comment</span><textarea name="comment"></textarea></label>`].join('')
          : `<label class="wide"><span>Comment</span><textarea name="comment" placeholder="Optional close note"></textarea></label>`;
      return `<form class="case-update" data-case="${escapeHtml(row.caseNumber)}" data-update-mode="${escapeHtml(active)}">
        <h2>${label('Update', '更新')}</h2>
        <div class="update-mode-actions">
          <button type="button" data-cbs-update-mode="worldtracer" class="${active === 'worldtracer' ? 'is-active' : ''}">WORLDTRACER</button>
          <button type="button" data-cbs-update-mode="rush" class="${active === 'rush' ? 'is-active' : ''}">RUSH</button>
          <button type="button" data-cbs-update-mode="location" class="${active === 'location' ? 'is-active' : ''}">BAG LOCATION UPDATE</button>
          <button type="button" data-cbs-update-mode="shipping" class="${active === 'shipping' ? 'is-active' : ''}">SHIPPING</button>
          <button type="button" data-cbs-update-mode="closed" class="${active === 'closed' ? 'is-active' : ''}">CASE CLOSE</button>
        </div>
        <div class="case-update-grid">${fields}</div>
        <div class="actions"><button type="submit">${label('Update', '更新')}</button></div>
      </form>`;
    }
    function isClosedCase(row) { return /close/i.test(String(row?.status || '')); }
    function rowSearchText(row) { return Object.values(row || {}).join(' ').toLowerCase(); }
    function sortedCaseRows(rows) {
      return [...rows].sort((a, b) => {
        const closedDelta = Number(isClosedCase(a)) - Number(isClosedCase(b));
        if (closedDelta) return closedDelta;
        const aTime = Date.parse(a.submittedAt || a.submitDate || '') || 0;
        const bTime = Date.parse(b.submittedAt || b.submitDate || '') || 0;
        return bTime - aTime;
      });
    }
    function displayBagTag(row) {
      return row?.bagTag || String(row?.updateNote || '').match(/\bBag tag:\s*([^|]+)/i)?.[1]?.trim() || '';
    }
    function revealCase(caseNumber) {
      const normalized = String(caseNumber || '').trim();
      if (!normalized) return;
      casesCard.hidden = false;
      missingReportCard.hidden = true;
      window._selectedCbsCase = normalized;
      if (caseSearch) caseSearch.value = '';
      renderCases();
      const summary = Array.from(casesOutput.querySelectorAll('[data-toggle-case]')).find((item) => item.dataset.toggleCase === normalized);
      const detail = Array.from(casesOutput.querySelectorAll('[data-detail-case]')).find((item) => item.dataset.detailCase === normalized);
      if (detail) detail.hidden = false;
      (summary || detail)?.scrollIntoView({ behavior:'smooth', block:'center' });
    }
    function renderCases() {
      const query = String(caseSearch?.value || '').trim().toLowerCase();
      const selectedCase = String(window._selectedCbsCase || '').trim();
      const sourceRows = selectedCase ? (window._cbsRows || []).filter((row) => String(row.caseNumber || '').trim() === selectedCase) : (window._cbsRows || []);
      const rows = sortedCaseRows(sourceRows).filter((row) => !query || rowSearchText(row).includes(query));
      if (!rows.length) { casesOutput.innerHTML = '<p class="muted">No matching cases.</p>'; return; }
      casesOutput.innerHTML = `<table><colgroup><col style="width:220px"><col style="width:120px"><col style="width:280px"><col></colgroup><thead><tr><th>${label('Case Number', '编号')}</th><th>${label('Case Type', '类型')}</th><th>${label('Bag Tag', '行李牌')}</th><th class="tracking-cell">Tracking</th></tr></thead><tbody>${rows.map((row, index) => {
        const detailKey = row.caseNumber || `row-${row.rowNumber || index}`;
        const caseNumberLabel = row.caseNumber || label('Missing case number', '缺少编号');
        const caseType = inferCaseType(row);
        const details = (isOriginalFormCase(row) ? originalFormDetailRows(row) : detailRows(row)).filter(([, value]) => hasValue(value));
        const backHtml = selectedCase ? `<div class="actions detail-actions"><button class="secondary" type="button" data-back-all-cases>${label('Back to all cases', '返回所有案件')}</button></div>` : '';
        const detailHtml = details.length ? `<section class="case-info-panel"><h2>${label('Case Information', '案件信息')}</h2><div class="detail-grid">${details.map(([key, value]) => `<p><strong>${escapeHtml(key)}:</strong> ${escapeHtml(renderValue(value))}</p>`).join('')}</div></section>` : '';
        return `<tr class="case-summary" data-toggle-case="${escapeHtml(detailKey)}"><td><button class="secondary" type="button">${escapeHtml(caseNumberLabel)}</button></td><td>${escapeHtml(caseType || '-')}</td><td>${escapeHtml(displayBagTag(row) || '-')}</td><td class="tracking-cell">${trackingHtml(row)}</td></tr><tr class="case-detail" data-detail-case="${escapeHtml(detailKey)}" ${selectedCase ? '' : 'hidden'}><td colspan="4">${backHtml}${trackingDetailHtml(row)}${detailHtml}${updateFormHtml(row)}</td></tr>`;
      }).join('')}</tbody></table>`;
    }
    async function loadCases() {
      casesOutput.innerHTML = '<p class="muted">Loading cases...</p>';
      try {
        const res = await fetch(`${apiBase}/cbs-cases`);
        const data = await parseJson(res);
        if (!res.ok) throw new Error(data.error || 'Case loading failed');
        window._cbsRows = data.rows || [];
        renderCases();
      } catch (error) { casesOutput.innerHTML = `<p class="status err">${escapeHtml(error.message)}</p>`; }
    }
    function renderMissingReports(rows = []) {
      const isComplete = (row) => Boolean(row.acknowledgedAt || row.linkedCaseUpdated);
      const openRows = rows.filter((row) => !isComplete(row));
      missingAlert.classList.toggle('is-active', openRows.length > 0);
      missingAlert.classList.toggle('is-complete', rows.length > 0 && openRows.length === 0);
      if (!rows.length) { missingReportOutput.innerHTML = '<p class="muted">No MU missing bag rows found.</p>'; return; }
      missingReportOutput.innerHTML = `<table class="missing-report-table"><thead><tr><th>Bag Tag</th><th>Passenger</th><th>Destination</th><th>Airline</th><th>Source</th><th>Case</th><th>Status</th><th></th></tr></thead><tbody>${rows.map((row) => {
        const linkedCaseNumber = row.linkedCaseNumber || row.caseNumber || '';
        const status = row.acknowledgedAt ? 'Acknowledged' : (linkedCaseNumber ? (row.linkedCaseUpdated ? 'Updated' : 'Needs Update') : 'Open');
        const caseHtml = linkedCaseNumber
          ? `<button class="case-link-button" type="button" data-link-case="${escapeHtml(linkedCaseNumber)}">${escapeHtml(linkedCaseNumber)}</button>`
          : '-';
        const actionHtml = linkedCaseNumber
          ? ''
          : `<div class="missing-actions"><button type="button" data-create-missing-case="${escapeHtml(row.rowNumber)}" data-missing-bag-tag="${escapeHtml(row.bagTag)}">Create CASE</button><button class="secondary" type="button" data-ack-missing="${escapeHtml(row.rowNumber)}">Acknowledge</button></div>`;
        return `<tr><td>${escapeHtml(row.bagTag)}</td><td>${escapeHtml(row.passengerName)}</td><td>${escapeHtml(row.destination)}</td><td>${escapeHtml(row.airline)}</td><td>${escapeHtml(row.sourceAttachment || row.sourceEmailDate)}</td><td>${caseHtml}</td><td>${escapeHtml(status)}</td><td>${row.acknowledgedAt ? '' : actionHtml}</td></tr>`;
      }).join('')}</tbody></table>`;
    }
    async function loadMissingReports(sync = true) {
      try {
        const res = await fetch(`${apiBase}/cbs-missing-bags?sync=${sync ? 'true' : 'false'}`);
        const data = await parseJson(res);
        if (!res.ok) throw new Error(data.error || 'Missing bag report loading failed');
        window._missingReportLoaded = true;
        window._missingBagRows = data.rows || [];
        renderMissingReports(window._missingBagRows);
      } catch (error) {
        missingAlert.classList.remove('is-active', 'is-complete');
        missingReportOutput.innerHTML = `<p class="status err">${escapeHtml(error.message)}</p>`;
      }
    }
    casesOutput.addEventListener('submit', async (event) => {
      const updateForm = event.target.closest('.case-update');
      if (!updateForm) return;
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(updateForm).entries());
      payload.type = updateForm.dataset.updateMode || 'worldtracer';
      await updateCase(updateForm.dataset.case, payload);
    });
    casesOutput.addEventListener('click', async (event) => {
      const modeButton = event.target.closest('[data-cbs-update-mode]');
      if (modeButton) {
        const form = modeButton.closest('.case-update');
        const detail = modeButton.closest('.case-detail');
        const caseNumber = form?.dataset.case;
        const currentRow = (window._cbsRows || []).find((row) => row.caseNumber === caseNumber) || { caseNumber };
        form.outerHTML = updateFormHtml(currentRow, modeButton.dataset.cbsUpdateMode);
        if (detail) detail.hidden = false;
        return;
      }
      if (event.target.closest('[data-back-all-cases]')) {
        window._selectedCbsCase = '';
        if (caseSearch) caseSearch.value = '';
        renderCases();
        return;
      }
      const summary = event.target.closest('[data-toggle-case]');
      if (!summary) return;
      window._selectedCbsCase = summary.dataset.toggleCase;
      if (caseSearch) caseSearch.value = '';
      renderCases();
    });
    async function updateCase(caseNumber, payload) {
      casesOutput.style.opacity = '.65';
      try {
        const res = await fetch(`${apiBase}/cbs-cases/${encodeURIComponent(caseNumber)}/update`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const data = await parseJson(res);
        if (!res.ok) throw new Error(data.error || 'Update failed');
        window._selectedCbsCase = caseNumber;
        await loadCases();
        if (window._missingReportLoaded || !missingReportCard.hidden) await loadMissingReports(false);
      } catch (error) { alert(error.message); } finally { casesOutput.style.opacity = '1'; }
    }
    caseSearch?.addEventListener('input', renderCases);
    missingAlert?.addEventListener('click', async () => { casesCard.hidden = true; missingReportCard.hidden = false; await loadMissingReports(true); });
    backToCases?.addEventListener('click', () => { missingReportCard.hidden = true; casesCard.hidden = false; });
    missingReportOutput?.addEventListener('click', async (event) => {
      const linkButton = event.target.closest('[data-link-case]');
      if (linkButton) {
        revealCase(linkButton.dataset.linkCase);
        return;
      }
      const createButton = event.target.closest('[data-create-missing-case]');
      const ackButton = event.target.closest('[data-ack-missing]');
      const button = createButton || ackButton;
      if (!button) return;
      button.disabled = true;
      const originalText = button.textContent;
      button.textContent = createButton ? 'Creating...' : 'Acknowledging...';
      try {
        const rowNumber = createButton ? createButton.dataset.createMissingCase : ackButton.dataset.ackMissing;
        const action = createButton ? 'create-case' : 'acknowledge';
        const fetchOptions = createButton
          ? { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ bagTag: createButton.dataset.missingBagTag || '' }) }
          : { method:'POST' };
        const res = await fetch(`${apiBase}/cbs-missing-bags/${encodeURIComponent(rowNumber)}/${action}`, fetchOptions);
        const data = await parseJson(res);
        if (!res.ok) throw new Error(data.error || (createButton ? 'Create case failed' : 'Acknowledge failed'));
        await loadMissingReports(false);
        await loadCases();
      } catch (error) { alert(error.message); } finally { button.disabled = false; button.textContent = originalText; }
    });
    refreshCases.addEventListener('click', async () => { await loadCases(); });
    setLanguage('en');
  </script>
</body>
</html>
