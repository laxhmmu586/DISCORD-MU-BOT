<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MUFC Notes</title>
  <style>
    :root { --bg:#f5f7fb; --ink:#172033; --muted:#667085; --brand:#123a73; --line:#d7e1ec; --panel:#fff; --accent:#7c3aed; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,Arial,"Noto Sans SC",sans-serif; background:linear-gradient(135deg,#eef5ff,#fff); color:var(--ink); }
    header { position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:14px; padding:16px clamp(16px,4vw,46px); background:rgba(255,255,255,.94); border-bottom:1px solid var(--line); backdrop-filter:blur(12px); }
    .brand { font-weight:950; letter-spacing:.08em; color:var(--brand); text-decoration:none; }
    nav { display:flex; gap:10px; flex-wrap:wrap; }
    nav a, button, .button { border:0; border-radius:999px; padding:10px 15px; font-weight:850; background:#e8eef7; color:var(--brand); text-decoration:none; cursor:pointer; }
    button.primary, .button.primary { background:var(--brand); color:#fff; }
    button.danger { background:#fee4e2; color:#b42318; }
    main { width:min(1280px,95vw); margin:24px auto 48px; display:grid; grid-template-columns:270px 320px minmax(0,1fr); gap:16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:22px; box-shadow:0 18px 42px rgba(22,48,76,.08); padding:18px; min-width:0; }
    h1,h2,h3 { margin:0 0 10px; }
    p { line-height:1.55; }
    .muted { color:var(--muted); }
    .stack { display:grid; gap:10px; }
    .section-list,.page-list { display:grid; gap:8px; max-height:62vh; overflow:auto; padding-right:4px; }
    .item { width:100%; border-radius:14px; text-align:left; background:#f4f7fb; color:var(--ink); display:flex; justify-content:space-between; gap:8px; align-items:center; }
    .item.is-active { background:#efe7ff; color:#5b21b6; box-shadow:inset 4px 0 0 var(--accent); }
    .item small { color:var(--muted); font-weight:750; }
    label { display:grid; gap:6px; color:var(--muted); font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
    input, textarea, select { width:100%; border:1px solid var(--line); border-radius:14px; padding:11px 12px; font:inherit; color:var(--ink); background:#fff; }
    textarea { min-height:330px; resize:vertical; line-height:1.5; font-family:"Cascadia Mono","SFMono-Regular",Consolas,monospace; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .note-view { white-space:pre-wrap; border:1px solid var(--line); border-radius:18px; background:#fbfdff; padding:18px; min-height:260px; line-height:1.6; }
    .source { border-left:4px solid var(--accent); background:#faf7ff; }
    @media (max-width:980px){ main{grid-template-columns:1fr}.section-list,.page-list{max-height:none} }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">MUFC</a>
    <nav aria-label="Primary navigation"><a href="index.html">Home</a><a href="cbs.html">CBS</a><a href="notes.html">NOTES</a></nav>
  </header>
  <main>
    <aside class="card stack">
      <div><h1>NOTES</h1><p class="muted">把 OneNote 内容一条一条放进这里，保存在本机浏览器。</p></div>
      <a class="button primary" target="_blank" rel="noopener" href="https://1drv.ms/o/c/f5e6db55afa655a4/IgCS_Pe2zMyfRKX4Tavw3trQASm8xGCuC6pz4DWN5xN8Y-0?e=1z2Kjr">Open OneNote source</a>
      <section class="card source"><h3>How to use</h3><p class="muted">先 Add Section，再 Add Page，把 OneNote 页面内容复制进 Content，点 Save。</p></section>
      <div class="toolbar"><h2>Sections</h2><button class="primary" id="add-section" type="button">Add Section</button></div>
      <div class="section-list" id="section-list"></div>
    </aside>
    <section class="card stack">
      <div class="toolbar"><h2 id="section-title">Pages</h2><button class="primary" id="add-page" type="button">Add Page</button></div>
      <input id="note-search" type="search" placeholder="Search notes" />
      <div class="page-list" id="page-list"></div>
    </section>
    <section class="card stack">
      <div class="toolbar"><div><h2 id="page-heading">Select a page</h2><p class="muted" id="page-meta">Create notes from the left panels.</p></div><button class="danger" id="delete-page" type="button">Delete Page</button></div>
      <label>Title<input id="note-title" placeholder="GO SHOW" /></label>
      <label>Section<input id="note-section" placeholder="CODE" /></label>
      <label>Content<textarea id="note-content" placeholder="Paste OneNote content here..."></textarea></label>
      <div class="toolbar"><button class="primary" id="save-note" type="button">Save Note</button><span class="muted" id="note-status"></span></div>
      <h3>Preview</h3><div class="note-view" id="note-preview"></div>
    </section>
  </main>
  <script>
    const NOTES_KEY = 'mufc_notes_v1';
    const LAST_ACTIVITY_KEY = 'mufc_auth_last_activity_at';
    const SESSION_LIMIT_MS = 60 * 60 * 1000;
    const sourceSeed = [{ id: crypto.randomUUID(), section: 'CODE', title: 'GO SHOW', content: 'GSY1 (GSJ1)\nPA YPVG#1XIA/LAKE,URES\n\nAPI 1/PAXLST    input passport information\nPA 1            Checkin\nBC 1            print boarding pass\n\nGO SHOW INAD OVERDATE\nGOSHOW FIRST\nPULLOVER TICKET\nPA #1,OVR/DATE,ET3', updatedAt: new Date().toISOString() }];
    let notes = loadNotes();
    let selectedSection = notes[0]?.section || 'CODE';
    let selectedId = notes[0]?.id || '';
    const sectionList = document.querySelector('#section-list');
    const pageList = document.querySelector('#page-list');
    const noteSearch = document.querySelector('#note-search');
    const sectionTitle = document.querySelector('#section-title');
    const pageHeading = document.querySelector('#page-heading');
    const pageMeta = document.querySelector('#page-meta');
    const noteTitle = document.querySelector('#note-title');
    const noteSection = document.querySelector('#note-section');
    const noteContent = document.querySelector('#note-content');
    const notePreview = document.querySelector('#note-preview');
    const noteStatus = document.querySelector('#note-status');
    function touchSession(){ sessionStorage.setItem(LAST_ACTIVITY_KEY, String(Date.now())); }
    function checkSession(){ const last = Number(sessionStorage.getItem(LAST_ACTIVITY_KEY) || 0); if (!last || Date.now() - last >= SESSION_LIMIT_MS) window.location.replace('login.html?forceLogin=1'); }
    ['pointerdown','keydown','touchstart','scroll'].forEach((eventName) => window.addEventListener(eventName, touchSession, { passive:true }));
    setInterval(checkSession, 60 * 1000); checkSession(); touchSession();
    function loadNotes(){ try { const saved = JSON.parse(localStorage.getItem(NOTES_KEY) || '[]'); return Array.isArray(saved) && saved.length ? saved : sourceSeed; } catch { return sourceSeed; } }
    function saveNotes(){ localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); }
    function escapeHtml(value){ return String(value || '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
    function sections(){ return [...new Set(notes.map((note) => note.section || 'General'))].sort((a,b) => a.localeCompare(b)); }
    function selectedNote(){ return notes.find((note) => note.id === selectedId) || notes.find((note) => note.section === selectedSection) || null; }
    function render(){
      const query = noteSearch.value.trim().toLowerCase();
      sectionList.innerHTML = sections().map((section) => `<button class="item ${section === selectedSection ? 'is-active' : ''}" data-section="${escapeHtml(section)}" type="button"><span>${escapeHtml(section)}</span><small>${notes.filter((note) => note.section === section).length}</small></button>`).join('');
      const pages = notes.filter((note) => note.section === selectedSection && (!query || `${note.title} ${note.content}`.toLowerCase().includes(query)));
      sectionTitle.textContent = `${selectedSection} Pages`;
      pageList.innerHTML = pages.length ? pages.map((note) => `<button class="item ${note.id === selectedId ? 'is-active' : ''}" data-page="${note.id}" type="button"><span>${escapeHtml(note.title || 'Untitled')}</span><small>${new Date(note.updatedAt || Date.now()).toLocaleDateString()}</small></button>`).join('') : '<p class="muted">No pages in this section.</p>';
      const note = selectedNote();
      if (note) { selectedId = note.id; noteTitle.value = note.title || ''; noteSection.value = note.section || selectedSection; noteContent.value = note.content || ''; pageHeading.textContent = note.title || 'Untitled'; pageMeta.textContent = `Section: ${note.section || 'General'}`; notePreview.innerHTML = escapeHtml(note.content || ''); }
      else { noteTitle.value = ''; noteSection.value = selectedSection; noteContent.value = ''; pageHeading.textContent = 'New page'; pageMeta.textContent = `Section: ${selectedSection}`; notePreview.innerHTML = ''; }
    }
    sectionList.addEventListener('click', (event) => { const button = event.target.closest('[data-section]'); if (!button) return; selectedSection = button.dataset.section; selectedId = notes.find((note) => note.section === selectedSection)?.id || ''; render(); });
    pageList.addEventListener('click', (event) => { const button = event.target.closest('[data-page]'); if (!button) return; selectedId = button.dataset.page; render(); });
    noteSearch.addEventListener('input', render);
    noteContent.addEventListener('input', () => { notePreview.innerHTML = escapeHtml(noteContent.value); });
    document.querySelector('#add-section').addEventListener('click', () => { const name = prompt('Section name / 分区名称'); if (!name) return; selectedSection = name.trim(); selectedId = ''; render(); });
    document.querySelector('#add-page').addEventListener('click', () => { const note = { id: crypto.randomUUID(), section: selectedSection || 'General', title: 'New Page', content: '', updatedAt: new Date().toISOString() }; notes.unshift(note); selectedId = note.id; saveNotes(); render(); });
    document.querySelector('#save-note').addEventListener('click', () => { let note = notes.find((item) => item.id === selectedId); if (!note) { note = { id: crypto.randomUUID() }; notes.unshift(note); selectedId = note.id; } note.title = noteTitle.value.trim() || 'Untitled'; note.section = noteSection.value.trim() || 'General'; note.content = noteContent.value; note.updatedAt = new Date().toISOString(); selectedSection = note.section; saveNotes(); noteStatus.textContent = 'Saved'; setTimeout(() => noteStatus.textContent = '', 1500); render(); });
    document.querySelector('#delete-page').addEventListener('click', () => { if (!selectedId || !confirm('Delete this page?')) return; notes = notes.filter((note) => note.id !== selectedId); selectedId = notes.find((note) => note.section === selectedSection)?.id || notes[0]?.id || ''; selectedSection = notes.find((note) => note.id === selectedId)?.section || selectedSection; saveNotes(); render(); });
    render();
  </script>
</body>
</html>
